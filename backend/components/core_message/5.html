<!--
  Component: cm_playful_001
  Type: core_message
  Aesthetic: Playful Light
  Obsession: Bouncing Words
  Tone: warm, joyful, celebratory
  Occasion: both
  Variables: --RECIPIENT_NAME-- --MESSAGE_MAIN-- --MESSAGE_LINE_2-- --MESSAGE_LINE_3--
-->
<style>
  .cmp001-root {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
  }

  .cmp001-bg-blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.13;
    background: var(--accent);
    filter: blur(0px);
  }

  .cmp001-blob-1 {
    width: clamp(220px, 38vw, 480px);
    height: clamp(220px, 38vw, 480px);
    top: -10%;
    left: -8%;
  }

  .cmp001-blob-2 {
    width: clamp(180px, 28vw, 360px);
    height: clamp(180px, 28vw, 360px);
    bottom: -8%;
    right: -6%;
    background: var(--primary);
    opacity: 0.09;
  }

  .cmp001-blob-3 {
    width: clamp(100px, 14vw, 200px);
    height: clamp(100px, 14vw, 200px);
    top: 55%;
    left: 10%;
    background: var(--primary);
    opacity: 0.07;
  }

  .cmp001-dots {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .cmp001-dot {
    position: absolute;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
  }

  .cmp001-name-tag {
    position: relative;
    z-index: 2;
    font-family: var(--font-heading);
    font-size: clamp(0.7rem, 1.8vw, 1rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    margin-bottom: clamp(10px, 2vh, 22px);
  }

  .cmp001-message-wrap {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 clamp(20px, 6vw, 80px);
    max-width: 860px;
  }

  .cmp001-word-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(6px, 1.2vw, 16px);
    margin-bottom: clamp(8px, 1.5vh, 18px);
    line-height: 1.2;
  }

  .cmp001-word {
    display: inline-block;
    font-family: var(--font-heading);
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 900;
    color: var(--text);
    opacity: 0;
    transform: translateY(60px) rotate(-6deg) scale(0.7);
    cursor: default;
    user-select: none;
    transition: color 0.2s ease;
    position: relative;
  }

  .cmp001-word:hover {
    color: var(--accent);
  }

  .cmp001-word.cmp001-accent-word {
    color: var(--accent);
    -webkit-text-stroke: 1px var(--accent);
  }

  .cmp001-line-2 {
    font-size: clamp(1.1rem, 3vw, 2.2rem);
    font-weight: 400;
    color: var(--text);
    opacity: 0.75;
  }

  .cmp001-line-3 {
    font-size: clamp(0.9rem, 2.2vw, 1.6rem);
    color: var(--text);
    opacity: 0.5;
    font-style: italic;
  }

  .cmp001-divider {
    position: relative;
    z-index: 2;
    width: clamp(40px, 8vw, 90px);
    height: 3px;
    background: var(--accent);
    border-radius: 10px;
    margin: clamp(12px, 2.5vh, 28px) auto;
    opacity: 0;
    transform: scaleX(0);
  }

  .cmp001-float-chars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .cmp001-char {
    position: absolute;
    font-family: var(--font-heading);
    font-weight: 900;
    color: var(--primary);
    opacity: 0;
    user-select: none;
    pointer-events: none;
  }

  .cmp001-cursor-ring {
    position: fixed;
    width: 36px;
    height: 36px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.3s;
    mix-blend-mode: difference;
  }
</style>
<div class="cmp001-root" id="cmp001-root">
  <div class="cmp001-cursor-ring" id="cmp001-cursor"></div>
  <div class="cmp001-bg-blob cmp001-blob-1"></div>
  <div class="cmp001-bg-blob cmp001-blob-2"></div>
  <div class="cmp001-bg-blob cmp001-blob-3"></div>
  <div class="cmp001-float-chars" id="cmp001-float-chars"></div>
  <div class="cmp001-dots" id="cmp001-dots"></div>
  <div class="cmp001-name-tag" id="cmp001-nametag">this is for you, --RECIPIENT_NAME--</div>
  <div class="cmp001-message-wrap">
<div class="cmp001-word-row" id="cmp001-row1"></div>

<div class="cmp001-divider" id="cmp001-divider"></div>

<div class="cmp001-word-row" id="cmp001-row2"></div>

<div class="cmp001-divider" id="cmp001-divider2" style="width: clamp(24px,4vw,50px); background: var(--primary); opacity: 0; transform: scaleX(0); margin: clamp(10px,2vh,20px) auto; height: 2px; border-radius: 10px;"></div>

<div class="cmp001-word-row" id="cmp001-row3"></div></div>
</div>
<script>
(function() {

  const MSG_MAIN = "--MESSAGE_MAIN--";
  const MSG_2    = "--MESSAGE_LINE_2--";
  const MSG_3    = "--MESSAGE_LINE_3--";

  function buildWordRow(containerId, text, sizeClass, accentEvery) {
    const row = document.getElementById(containerId);
    const words = text.split(' ');
    words.forEach(function(w, i) {
      const span = document.createElement('span');
      span.className = 'cmp001-word ' + sizeClass;
      if (accentEvery && (i % accentEvery === accentEvery - 1)) {
        span.classList.add('cmp001-accent-word');
      }
      span.textContent = w;
      row.appendChild(span);
    });
  }

  buildWordRow('cmp001-row1', MSG_MAIN, 'cmp001-main', 3);
  buildWordRow('cmp001-row2', MSG_2,    'cmp001-line-2', 0);
  buildWordRow('cmp001-row3', MSG_3,    'cmp001-line-3', 0);

  var floatContainer = document.getElementById('cmp001-float-chars');
  var floatChars = ['✦','★','✿','◆','●','◎','✺','❋','✸'];
  for (var fi = 0; fi < 18; fi++) {
    var fc = document.createElement('span');
    fc.className = 'cmp001-char';
    fc.textContent = floatChars[fi % floatChars.length];
    var fs = (Math.random() * 1.4 + 0.5);
    fc.style.fontSize = clamp(fs * 14, 10, 28) + 'px';
    fc.style.left = (Math.random() * 96) + '%';
    fc.style.top  = (Math.random() * 92) + '%';
    fc.style.opacity = 0;
    floatContainer.appendChild(fc);
  }

  function clamp(val, min, max) {
    return Math.min(Math.max(val, min), max);
  }

  var cursor = document.getElementById('cmp001-cursor');
  document.addEventListener('mousemove', function(e) {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    cursor.style.opacity = 1;
  });
  document.addEventListener('mouseleave', function() {
    cursor.style.opacity = 0;
  });

  document.addEventListener('glitch:enter', function(e) {
    if (e.detail.index !== 4) return;

    var nameTag  = document.getElementById('cmp001-nametag');
    var divider  = document.getElementById('cmp001-divider');
    var divider2 = document.getElementById('cmp001-divider2');
    var row1words = document.querySelectorAll('#cmp001-row1 .cmp001-word');
    var row2words = document.querySelectorAll('#cmp001-row2 .cmp001-word');
    var row3words = document.querySelectorAll('#cmp001-row3 .cmp001-word');
    var floatEls  = document.querySelectorAll('.cmp001-char');

    var tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to(nameTag, { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out' }, 0)

      .from(document.querySelector('.cmp001-blob-1'), {
        scale: 0, opacity: 0, duration: 1.4, ease: 'elastic.out(1,0.6)'
      }, 0.1)

      .from(document.querySelector('.cmp001-blob-2'), {
        scale: 0, opacity: 0, duration: 1.2, ease: 'elastic.out(1,0.7)'
      }, 0.3);

    row1words.forEach(function(word, i) {
      tl.to(word, {
        opacity: 1,
        y: 0,
        rotate: (Math.random() * 4 - 2),
        scale: 1,
        duration: 0.55,
        ease: 'back.out(2.2)'
      }, 0.4 + i * 0.1);
    });

    tl.to(divider, {
      opacity: 1,
      scaleX: 1,
      duration: 0.5,
      ease: 'power2.out'
    }, 0.4 + row1words.length * 0.1 + 0.15);

    row2words.forEach(function(word, i) {
      tl.to(word, {
        opacity: 1,
        y: 0,
        rotate: (Math.random() * 2 - 1),
        scale: 1,
        duration: 0.45,
        ease: 'back.out(1.8)'
      }, 0.9 + row1words.length * 0.1 + i * 0.08);
    });

    tl.to(divider2, {
      opacity: 1,
      scaleX: 1,
      duration: 0.4,
      ease: 'power2.out'
    }, 1.1 + row1words.length * 0.1 + row2words.length * 0.08);

    row3words.forEach(function(word, i) {
      tl.to(word, {
        opacity: 1,
        y: 0,
        scale: 1,
        rotate: 0,
        duration: 0.4,
        ease: 'back.out(1.5)'
      }, 1.3 + row1words.length * 0.1 + row2words.length * 0.08 + i * 0.08);
    });

    floatEls.forEach(function(el, i) {
      tl.to(el, {
        opacity: Math.random() * 0.18 + 0.05,
        duration: 0.6,
        ease: 'power1.out'
      }, 1.2 + i * 0.05);
    });

    floatEls.forEach(function(el, i) {
      gsap.to(el, {
        y: (Math.random() * -30 - 10),
        x: (Math.random() * 20 - 10),
        rotate: (Math.random() * 40 - 20),
        duration: 3 + Math.random() * 3,
        repeat: -1,
        yoyo: true,
        delay: i * 0.15,
        ease: 'sine.inOut'
      });
    });

    gsap.to(document.querySelector('.cmp001-blob-1'), {
      x: 30, y: -20, scale: 1.08,
      duration: 6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.5
    });
    gsap.to(document.querySelector('.cmp001-blob-2'), {
      x: -20, y: 18, scale: 1.05,
      duration: 7, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1
    });
    gsap.to(document.querySelector('.cmp001-blob-3'), {
      x: 15, y: -25, scale: 1.12,
      duration: 5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.2
    });

    gsap.to(divider, {
      width: '+=20',
      duration: 2.5,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 2
    });

    row1words.forEach(function(word, i) {
      gsap.to(word, {
        y: (i % 2 === 0 ? -6 : 5),
        rotate: (i % 2 === 0 ? 1 : -1),
        duration: 2.2 + i * 0.3,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: 2 + i * 0.12
      });
    });

    var root = document.getElementById('cmp001-root');
    root.addEventListener('mousemove', function(ev) {
      var rect = root.getBoundingClientRect();
      var cx = (ev.clientX - rect.left) / rect.width - 0.5;
      var cy = (ev.clientY - rect.top) / rect.height - 0.5;
      gsap.to(document.querySelector('.cmp001-blob-1'), {
        x: cx * 40, y: cy * 30,
        duration: 1.2, ease: 'power2.out', overwrite: 'auto'
      });
      gsap.to(document.querySelector('.cmp001-blob-2'), {
        x: cx * -30, y: cy * -20,
        duration: 1.6, ease: 'power2.out', overwrite: 'auto'
      });
    });

    var allWords = document.querySelectorAll('.cmp001-word');
    allWords.forEach(function(w) {
      w.addEventListener('mouseenter', function() {
        gsap.to(w, {
          scale: 1.18,
          rotate: (Math.random() * 10 - 5),
          color: 'var(--accent)',
          duration: 0.22,
          ease: 'back.out(3)'
        });
      });
      w.addEventListener('mouseleave', function() {
        gsap.to(w, {
          scale: 1,
          rotate: 0,
          color: w.classList.contains('cmp001-accent-word') ? 'var(--accent)' : 'var(--text)',
          duration: 0.35,
          ease: 'elastic.out(1, 0.5)'
        });
      });
    });

  });

})();
</script>
