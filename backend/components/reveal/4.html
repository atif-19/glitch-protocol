</div></div>
</div>
<script>
(function () {
  var SECTION_IDX = 6;
  var started = false;

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== SECTION_IDX) return;
    if (started) return;
    started = true;
    init();
  });

  function init() {
    var wrap          = document.getElementById('rs001-wrap');
    var bgCanvas      = document.getElementById('rs001-bg-canvas');
    var bgCtx         = bgCanvas.getContext('2d');
    var confCanvas    = document.getElementById('rs001-confetti-canvas');
    var confCtx       = confCanvas.getContext('2d');
    var scratchCanvas = document.getElementById('rs001-scratch');
    var sCtx          = scratchCanvas.getContext('2d');
    var cursor        = document.getElementById('rs001-cursor');
    var nameEl        = document.getElementById('rs001-name');
    var instrEl       = document.getElementById('rs001-instr');
    var cardWrap      = document.getElementById('rs001-card-wrap');
    var card          = document.getElementById('rs001-card');
    var doneEl        = document.getElementById('rs001-done');
    var progWrap      = document.getElementById('rs001-progress-wrap');
    var progFill      = document.getElementById('rs001-progress-fill');

    var W, H, CW, CH;
    var bgStars = [], floaters = [];
    var t = 0;
    var isDrawing = false;
    var revealDone = false, msgShown = false;
    var scratchReady = false;
    var confetti = [];

    /* ── resize ── */
    function resize() {
      W = bgCanvas.width  = confCanvas.width  = wrap.offsetWidth  || window.innerWidth;
      H = bgCanvas.height = confCanvas.height = wrap.offsetHeight || window.innerHeight;
      buildBg();
      if (scratchReady) buildScratch();
    }

    function buildBg() {
      bgStars = [];
      var n = Math.floor(W * H / 3200);
      for (var i = 0; i < n; i++) {
        bgStars.push({
          x: Math.random() * W, y: Math.random() * H,
          r: Math.random() * 1.1 + 0.2,
          a: Math.random() * 0.5 + 0.08,
          ts: Math.random() * 0.016 + 0.004,
          to: Math.random() * Math.PI * 2,
          hue: Math.random() > 0.5 ? 220 : 280
        });
      }
      floaters = [];
      for (var j = 0; j < 18; j++) {
        floaters.push({
          x: Math.random() * W, y: Math.random() * H,
          r: Math.random() * 2 + 0.5,
          a: Math.random() * 0.12 + 0.03,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.2,
          pulse: Math.random() * Math.PI * 2,
          hue: [320, 280, 200, 40][Math.floor(Math.random() * 4)]
        });
      }
    }

    /* ── build scratch surface ── */
    function buildScratch() {
      CW = scratchCanvas.width  = card.offsetWidth;
      CH = scratchCanvas.height = card.offsetHeight;

      sCtx.clearRect(0, 0, CW, CH);

      // Silver-grey textured scratch coat
      sCtx.fillStyle = '#7a7a82';
      sCtx.fillRect(0, 0, CW, CH);

      // Noise texture
      for (var i = 0; i < CW * CH / 2; i++) {
        var x = Math.random() * CW;
        var y = Math.random() * CH;
        var bright = Math.random() * 60 - 30;
        var v = 122 + bright;
        sCtx.fillStyle = 'rgba(' + v + ',' + v + ',' + (v+4) + ',0.35)';
        sCtx.fillRect(x, y, 1.5, 1.5);
      }

      // Subtle sheen streaks
      for (var s = 0; s < 14; s++) {
        var sx = Math.random() * CW;
        var grad = sCtx.createLinearGradient(sx, 0, sx + 60, CH);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.5, 'rgba(255,255,255,0.07)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        sCtx.fillStyle = grad;
        sCtx.fillRect(sx, 0, 60, CH);
      }

      // "Scratch here" text
      sCtx.save();
      sCtx.globalCompositeOperation = 'source-over';
      sCtx.font = 'bold ' + Math.floor(CW * 0.048) + 'px sans-serif';
      sCtx.textAlign = 'center';
      sCtx.textBaseline = 'middle';
      sCtx.fillStyle = 'rgba(90,90,96,0.55)';
      sCtx.fillText('scratch here', CW / 2, CH / 2);
      sCtx.restore();

      sCtx.globalCompositeOperation = 'destination-out';
      scratchReady = true;
    }

    /* ── scratch ── */
    function scratch(x, y) {
      if (!scratchReady) return;
      var rect = scratchCanvas.getBoundingClientRect();
      var sx = (x - rect.left) * (CW / rect.width);
      var sy = (y - rect.top)  * (CH / rect.height);
      var radius = Math.min(CW, CH) * 0.075;

      sCtx.globalCompositeOperation = 'destination-out';
      var radGrad = sCtx.createRadialGradient(sx, sy, 0, sx, sy, radius);
      radGrad.addColorStop(0,   'rgba(0,0,0,1)');
      radGrad.addColorStop(0.6, 'rgba(0,0,0,0.85)');
      radGrad.addColorStop(1,   'rgba(0,0,0,0)');
      sCtx.fillStyle = radGrad;
      sCtx.beginPath();
      sCtx.arc(sx, sy, radius, 0, Math.PI * 2);
      sCtx.fill();

      checkProgress();
    }

    var checkTimer = 0;
    function checkProgress() {
      checkTimer++;
      if (checkTimer % 8 !== 0) return;

      var sample = sCtx.getImageData(0, 0, CW, CH);
      var total = CW * CH;
      var cleared = 0;
      for (var i = 3; i < sample.data.length; i += 4 * 4) {
        if (sample.data[i] < 128) cleared++;
      }
      var pct = Math.min(100, Math.round((cleared / (total / 4)) * 100 * 3.5));
      progFill.style.width = Math.min(100, pct) + '%';

      if (pct >= 65 && !revealDone) {
        revealDone = true;
        onReveal();
      }
    }

    /* ── reveal ── */
    function onReveal() {
      // Clear remaining scratch coat
      gsap.to({ v: 0 }, {
        v: 1, duration: 0.7, ease: 'power2.inOut',
        onUpdate: function () {
          sCtx.globalCompositeOperation = 'destination-out';
          sCtx.fillStyle = 'rgba(0,0,0,0.18)';
          sCtx.fillRect(0, 0, CW, CH);
        },
        onComplete: function () {
          sCtx.clearRect(0, 0, CW, CH);
          scratchCanvas.style.pointerEvents = 'none';
          launchConfetti();
          gsap.to(confCanvas, { opacity: 1, duration: 0.3 });

          setTimeout(function () {
            msgShown = true;
            gsap.to(doneEl, { opacity: 1, duration: 1, delay: 0.4 });
          }, 1800);
        }
      });

      gsap.to(instrEl,    { opacity: 0, duration: 0.4 });
      gsap.to(progWrap,   { opacity: 0, duration: 0.4 });
      gsap.to(cursor,     { opacity: 0, duration: 0.3 });

      // Card bounce
      gsap.fromTo(cardWrap,
        { scale: 1 },
        { scale: 1.04, duration: 0.25, yoyo: true, repeat: 1, ease: 'power2.out' }
      );
    }

    /* ── confetti ── */
    var CONF_COLORS = [
      '#ff6b6b','#ffd93d','#6bcb77','#4d96ff',
      '#ff9ff3','#ffa502','#eccc68','#a29bfe'
    ];

    function launchConfetti() {
      confetti = [];
      for (var i = 0; i < 120; i++) {
        var cx = W / 2 + (Math.random() - 0.5) * 200;
        var cy = H / 2 + (Math.random() - 0.5) * 80;
        confetti.push({
          x: cx, y: cy,
          vx: (Math.random() - 0.5) * 9,
          vy: -(Math.random() * 7 + 3),
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.22,
          w: Math.random() * 8 + 4,
          h: Math.random() * 4 + 3,
          col: CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)],
          life: 1,
          decay: Math.random() * 0.008 + 0.005,
          shape: Math.random() > 0.5 ? 'rect' : 'circle'
        });
      }
    }

    /* ── bg draw loop ── */
    function draw() {
      requestAnimationFrame(draw);
      t += 0.016;

      bgCtx.clearRect(0, 0, W, H);

      // Deep playful dark bg
      var bg = bgCtx.createRadialGradient(W*0.5, H*0.45, 0, W*0.5, H*0.5, Math.max(W,H)*0.8);
      bg.addColorStop(0,   'rgba(18,8,40,1)');
      bg.addColorStop(0.5, 'rgba(10,5,25,1)');
      bg.addColorStop(1,   'rgba(4,2,10,1)');
      bgCtx.fillStyle = bg;
      bgCtx.fillRect(0, 0, W, H);

      // Stars with colour tint
      for (var i = 0; i < bgStars.length; i++) {
        var s = bgStars[i];
        var tw = Math.sin(t * s.ts * 60 + s.to) * 0.28 + 0.72;
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        bgCtx.fillStyle = 'hsla(' + s.hue + ',60%,85%,' + (s.a * tw) + ')';
        bgCtx.fill();
      }

      // Floaters
      for (var f = 0; f < floaters.length; f++) {
        var fl = floaters[f];
        fl.x += fl.vx; fl.y += fl.vy;
        if (fl.x < 0) fl.x = W; if (fl.x > W) fl.x = 0;
        if (fl.y < 0) fl.y = H; if (fl.y > H) fl.y = 0;
        var fp = Math.sin(t * 0.9 + fl.pulse) * 0.35 + 0.65;
        bgCtx.beginPath();
        bgCtx.arc(fl.x, fl.y, fl.r * fp, 0, Math.PI*2);
        bgCtx.fillStyle = 'hsla(' + fl.hue + ',70%,75%,' + (fl.a * fp) + ')';
        bgCtx.fill();
      }

      // Confetti
      if (confetti.length > 0) {
        confCtx.clearRect(0, 0, W, H);
        for (var c = confetti.length - 1; c >= 0; c--) {
          var cf = confetti[c];
          cf.x  += cf.vx;
          cf.y  += cf.vy;
          cf.vy += 0.18;
          cf.vx *= 0.995;
          cf.rot += cf.rotV;
          cf.life -= cf.decay;
          if (cf.life <= 0) { confetti.splice(c, 1); continue; }

          confCtx.save();
          confCtx.globalAlpha = cf.life;
          confCtx.translate(cf.x, cf.y);
          confCtx.rotate(cf.rot);
          confCtx.fillStyle = cf.col;
          if (cf.shape === 'circle') {
            confCtx.beginPath();
            confCtx.arc(0, 0, cf.w / 2, 0, Math.PI*2);
            confCtx.fill();
          } else {
            confCtx.fillRect(-cf.w/2, -cf.h/2, cf.w, cf.h);
          }
          confCtx.restore();
        }
        if (confetti.length === 0) {
          confCtx.clearRect(0, 0, W, H);
        }
      }
    }

    /* ── pointer events ── */
    function getCursorPos(e) {
      if (e.touches && e.touches.length) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    wrap.addEventListener('mousemove', function (e) {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
      if (isDrawing && !revealDone) scratch(e.clientX, e.clientY);
    });

    scratchCanvas.addEventListener('mousedown', function (e) {
      if (revealDone) return;
      isDrawing = true;
      cursor.classList.add('pressing');
      scratch(e.clientX, e.clientY);
      e.stopPropagation();
    });

    window.addEventListener('mouseup', function () {
      isDrawing = false;
      cursor.classList.remove('pressing');
    });

    scratchCanvas.addEventListener('touchstart', function (e) {
      if (revealDone) return;
      isDrawing = true;
      var p = getCursorPos(e);
      scratch(p.x, p.y);
      e.stopPropagation();
      e.preventDefault();
    }, { passive: false });

    scratchCanvas.addEventListener('touchmove', function (e) {
      if (!isDrawing || revealDone) return;
      var p = getCursorPos(e);
      scratch(p.x, p.y);
      e.preventDefault();
    }, { passive: false });

    scratchCanvas.addEventListener('touchend', function () {
      isDrawing = false;
    });

    wrap.addEventListener('click', function (e) {
      if (revealDone && msgShown) return;
      e.stopPropagation();
    });

    wrap.addEventListener('mouseenter', function () {
      if (!revealDone) gsap.to(cursor, { opacity: 1, duration: 0.3 });
    });
    wrap.addEventListener('mouseleave', function () {
      gsap.to(cursor, { opacity: 0, duration: 0.2 });
      isDrawing = false;
    });

    /* ── entry ── */
    function enter() {
      gsap.to(nameEl, { opacity: 1, duration: 1.5, delay: 0.5 });
      gsap.fromTo(instrEl,
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 1.2, delay: 0.85, ease: 'power2.out' });
      gsap.fromTo(cardWrap,
        { opacity: 0, y: 28, scale: 0.93 },
        { opacity: 1, y: 0,  scale: 1, duration: 1.5, delay: 1.0, ease: 'power3.out',
          onComplete: function () {
            buildScratch();
            gsap.to(progWrap, { opacity: 1, duration: 0.6 });
          }
        });

      // Idle gentle float
      gsap.to(cardWrap, {
        y: -6, duration: 3.2, repeat: -1, yoyo: true,
        ease: 'sine.inOut', delay: 2.8
      });
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
    enter();
  }
})();
</script>
