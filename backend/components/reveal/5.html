<!--
  Component: reveal_mirror_001
  Type: reveal
  Aesthetic: Minimal
  Obsession: Mirror / Light / Reflection
  Tone: intimate, quiet, hypnotic
  Occasion: birthday, apology, both
  Variables: --RECIPIENT_NAME-- --HIDDEN_MESSAGE-- --REVEAL_INSTRUCTION--
-->
<style>
  .rm001-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
  }

  .rm001-bg-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .rm001-name {
    position: absolute;
    top: clamp(1.8rem, 4.5vh, 3rem);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(0.6rem, 1.6vw, 0.78rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }

  .rm001-instr {
    position: absolute;
    bottom: clamp(3rem, 6vh, 5rem);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.58rem, 1.4vw, 0.68rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }

  .rm001-done-hint {
    position: absolute;
    bottom: clamp(3rem, 6vh, 5rem);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.58rem, 1.4vw, 0.68rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.14);
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }

  /* The reveal canvas — torch effect lives here */
  .rm001-reveal-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    cursor: none;
  }

  /* Message — rendered onto bg canvas, invisible until torched */
  .rm001-message-container {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
    gap: clamp(0.6rem, 2vh, 1.1rem);
  }

  .rm001-msg-line-top {
    width: clamp(30px, 5vw, 55px);
    height: 1px;
    background: rgba(255,255,255,0.12);
  }

  .rm001-msg-text {
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(1.3rem, 3.8vw, 2.6rem);
    font-style: italic;
    color: rgba(255,255,255,0.92);
    text-align: center;
    max-width: 68vw;
    line-height: 1.55;
    letter-spacing: 0.02em;
  }

  .rm001-msg-line-bot {
    width: clamp(30px, 5vw, 55px);
    height: 1px;
    background: rgba(255,255,255,0.12);
  }

  .rm001-msg-name {
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(0.55rem, 1.2vw, 0.7rem);
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  /* Custom cursor — minimal dot */
  .rm001-cursor {
    position: fixed;
    width: clamp(6px, 1.2vw, 10px);
    height: clamp(6px, 1.2vw, 10px);
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    opacity: 0;
    box-shadow: 0 0 12px 3px rgba(255,255,255,0.4);
    transition: transform 0.06s ease;
  }

  /* Explored % counter */
  .rm001-pct {
    position: absolute;
    top: clamp(1.8rem, 4.5vh, 3rem);
    right: clamp(1.5rem, 4vw, 3rem);
    font-size: clamp(0.55rem, 1.2vw, 0.68rem);
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.18);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    font-family: var(--font-body, 'Inter', sans-serif);
  }
</style>
<div class="rm001-wrap" id="rm001-wrap">
  <canvas class="rm001-bg-canvas"     id="rm001-bg-canvas"></canvas>
  <canvas class="rm001-reveal-canvas" id="rm001-reveal-canvas"></canvas>
  <div class="rm001-cursor" id="rm001-cursor"></div>
  <div class="rm001-name"      id="rm001-name">--RECIPIENT_NAME--</div>
  <div class="rm001-instr"     id="rm001-instr">--REVEAL_INSTRUCTION--</div>
  <div class="rm001-done-hint" id="rm001-done">tap anywhere to continue</div>
  <div class="rm001-pct"       id="rm001-pct">0%</div>
  <div class="rm001-message-container" id="rm001-msg-container">
    <div class="rm001-msg-line-top"></div>
    <div class="rm001-msg-text" id="rm001-msg-text">--HIDDEN_MESSAGE--</div>
    <div class="rm001-msg-line-bot"></div>
    <div class="rm001-msg-name">--RECIPIENT_NAME--</div>
  </div>
</div>
<script>
(function () {
  var SECTION_IDX = 6;
  var started = false;

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== SECTION_IDX) return;
    if (started) return;
    started = true;
    init();
  });

  function init() {
    var wrap        = document.getElementById('rm001-wrap');
    var bgCanvas    = document.getElementById('rm001-bg-canvas');
    var bgCtx       = bgCanvas.getContext('2d');
    var revCanvas   = document.getElementById('rm001-reveal-canvas');
    var rCtx        = revCanvas.getContext('2d');
    var cursor      = document.getElementById('rm001-cursor');
    var nameEl      = document.getElementById('rm001-name');
    var instrEl     = document.getElementById('rm001-instr');
    var doneEl      = document.getElementById('rm001-done');
    var pctEl       = document.getElementById('rm001-pct');
    var msgText     = document.getElementById('rm001-msg-text');

    var W, H;
    var t = 0;
    var mx = -999, my = -999;
    var revealDone = false, msgShown = false;
    var torchRadius = 0;
    var targetTorchR = 0;
    var bgStars = [];
    var ripples = [];
    var sampledPixels = new Set();
    var totalSamples = 0;
    var clearedSamples = 0;

    /* ── resize ── */
    function resize() {
      W = bgCanvas.width = revCanvas.width = wrap.offsetWidth || window.innerWidth;
      H = bgCanvas.height = revCanvas.height = wrap.offsetHeight || window.innerHeight;
      buildBg();
      buildFog();
      totalSamples = Math.floor((W * H) / 400);
    }

    function buildBg() {
      bgStars = [];
      var n = Math.floor(W * H / 5000);
      for (var i = 0; i < n; i++) {
        bgStars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 0.8 + 0.1,
          a: Math.random() * 0.3 + 0.05,
          ts: Math.random() * 0.01 + 0.003,
          to: Math.random() * Math.PI * 2
        });
      }
    }

    /* ── fog overlay — the "mirror" surface ── */
    function buildFog() {
      rCtx.clearRect(0, 0, W, H);
      // Nearly-opaque dark fog
      rCtx.fillStyle = 'rgba(8,8,12,0.97)';
      rCtx.fillRect(0, 0, W, H);

      // Faint surface noise — mirror condensation
      for (var i = 0; i < W * H / 80; i++) {
        var x = Math.random() * W;
        var y = Math.random() * H;
        var a = Math.random() * 0.03;
        rCtx.fillStyle = 'rgba(255,255,255,' + a + ')';
        rCtx.fillRect(x, y, 1, 1);
      }

      rCtx.globalCompositeOperation = 'destination-out';
    }

    /* ── torch erase on reveal canvas ── */
    function torchAt(x, y) {
      if (revealDone) return;

      var r = torchRadius;

      // Sample cleared area (coarse grid)
      var gx = Math.floor(x / 20);
      var gy = Math.floor(y / 20);
      var key = gx + '_' + gy;
      if (!sampledPixels.has(key)) {
        sampledPixels.add(key);
        clearedSamples++;
        var pct = Math.min(100, Math.round((clearedSamples / totalSamples) * 100 * 2.2));
        pctEl.textContent = Math.min(100, pct) + '%';
        if (pct >= 100 && !revealDone) {
          revealDone = true;
          onReveal();
        }
      }

      // Soft erase circle
      var g = rCtx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0,    'rgba(0,0,0,1)');
      g.addColorStop(0.55, 'rgba(0,0,0,0.92)');
      g.addColorStop(0.82, 'rgba(0,0,0,0.5)');
      g.addColorStop(1,    'rgba(0,0,0,0)');
      rCtx.fillStyle = g;
      rCtx.beginPath();
      rCtx.arc(x, y, r, 0, Math.PI * 2);
      rCtx.fill();

      // Ripple
      if (Math.random() < 0.12) {
        ripples.push({ x: x, y: y, r: 0, maxR: r * 1.4, alpha: 0.18, life: 1 });
      }
    }

    /* ── full reveal sweep ── */
    function onReveal() {
      gsap.to({ v: 0 }, {
        v: 1, duration: 1.1, ease: 'power2.inOut',
        onUpdate: function () {
          rCtx.fillStyle = 'rgba(0,0,0,0.06)';
          rCtx.fillRect(0, 0, W, H);
        },
        onComplete: function () {
          rCtx.clearRect(0, 0, W, H);
          revCanvas.style.pointerEvents = 'none';
          msgShown = true;
          gsap.to(doneEl,  { opacity: 1, duration: 1,   delay: 0.6 });
          gsap.to(cursor,  { opacity: 0, duration: 0.5 });
          gsap.to(instrEl, { opacity: 0, duration: 0.4 });
          gsap.to(pctEl,   { opacity: 0, duration: 0.4 });
        }
      });

      // Message shimmer in
      gsap.fromTo('#rm001-msg-text',
        { opacity: 0.7 },
        { opacity: 1, duration: 1.4, ease: 'power2.out', delay: 0.4 }
      );
    }

    /* ── bg draw loop ── */
    function draw() {
      requestAnimationFrame(draw);
      t += 0.016;

      bgCtx.clearRect(0, 0, W, H);

      // Pure minimal dark bg
      bgCtx.fillStyle = 'rgb(6,6,9)';
      bgCtx.fillRect(0, 0, W, H);

      // Extremely faint vignette warmth at centre
      var vg = bgCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.55);
      vg.addColorStop(0, 'rgba(255,255,255,0.025)');
      vg.addColorStop(1, 'rgba(0,0,0,0)');
      bgCtx.fillStyle = vg;
      bgCtx.fillRect(0, 0, W, H);

      // Stars — very dim
      for (var i = 0; i < bgStars.length; i++) {
        var s = bgStars[i];
        var tw = Math.sin(t * s.ts * 60 + s.to) * 0.2 + 0.8;
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        bgCtx.fillStyle = 'rgba(255,255,255,' + (s.a * tw) + ')';
        bgCtx.fill();
      }

      // Torch glow — soft light behind fog
      if (mx > 0 && !revealDone) {
        torchRadius += (targetTorchR - torchRadius) * 0.12;

        var tg = bgCtx.createRadialGradient(mx, my, 0, mx, my, torchRadius * 2.2);
        tg.addColorStop(0,   'rgba(255,255,255,0.06)');
        tg.addColorStop(0.4, 'rgba(255,255,255,0.025)');
        tg.addColorStop(1,   'rgba(255,255,255,0)');
        bgCtx.fillStyle = tg;
        bgCtx.fillRect(0, 0, W, H);
      }

      // Ripples on bg
      for (var ri = ripples.length - 1; ri >= 0; ri--) {
        var rp = ripples[ri];
        rp.r += 1.4;
        rp.life -= 0.04;
        rp.alpha = rp.life * 0.18;
        if (rp.life <= 0) { ripples.splice(ri, 1); continue; }
        bgCtx.beginPath();
        bgCtx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
        bgCtx.strokeStyle = 'rgba(255,255,255,' + rp.alpha + ')';
        bgCtx.lineWidth = 0.5;
        bgCtx.stroke();
      }
    }

    /* ── pointer events ── */
    function onMove(x, y) {
      mx = x; my = y;
      cursor.style.left = x + 'px';
      cursor.style.top  = y + 'px';
      if (!revealDone) torchAt(x, y);
    }

    wrap.addEventListener('mousemove', function (e) {
      onMove(e.clientX, e.clientY);
    });

    wrap.addEventListener('touchmove', function (e) {
      e.preventDefault();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    wrap.addEventListener('touchstart', function (e) {
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    wrap.addEventListener('mouseenter', function () {
      if (!revealDone) gsap.to(cursor, { opacity: 1, duration: 0.3 });
      targetTorchR = Math.min(W, H) * 0.13;
    });

    wrap.addEventListener('mouseleave', function () {
      gsap.to(cursor, { opacity: 0, duration: 0.3 });
      targetTorchR = 0;
    });

    wrap.addEventListener('click', function (e) {
      if (revealDone && msgShown) return;
      e.stopPropagation();
    });

    /* ── entry ── */
    function enter() {
      targetTorchR = Math.min(W, H) * 0.13;
      torchRadius  = 0;

      gsap.to(nameEl, { opacity: 1, duration: 1.8, delay: 0.5 });
      gsap.fromTo(instrEl,
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 1.3, delay: 0.9, ease: 'power2.out' });
      gsap.to(pctEl, { opacity: 1, duration: 1, delay: 1.2 });

      // Subtle message pre-glow so it's just barely visible through fog
      gsap.fromTo('#rm001-msg-container',
        { opacity: 0 },
        { opacity: 1, duration: 0, delay: 0 });

      // Breathing ambient pulse on fog — suggests something is hidden
      gsap.to(revCanvas, {
        opacity: 0.96, duration: 2.8, repeat: -1, yoyo: true,
        ease: 'sine.inOut', delay: 1.5
      });
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
    enter();
  }
})();
</script>
