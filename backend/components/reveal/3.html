<!--
  Component: reveal_bookpage_001
  Type: reveal
  Aesthetic: Dark Academia
  Obsession: Books / Literature / Hidden Letters
  Tone: literary, intimate, nostalgic
  Occasion: birthday, apology, both
  Variables: --RECIPIENT_NAME-- --HIDDEN_MESSAGE-- --REVEAL_INSTRUCTION--
-->
<style>
  .rbp001-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
  }

  .rbp001-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .rbp001-name {
    position: absolute;
    top: clamp(1.8rem, 4.5vh, 3rem);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(0.6rem, 1.6vw, 0.78rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(200,180,140,0.25);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }

  .rbp001-instr {
    position: absolute;
    bottom: clamp(3rem, 6vh, 5rem);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.58rem, 1.4vw, 0.68rem);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(200,180,140,0.22);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }

  .rbp001-done-hint {
    position: absolute;
    bottom: clamp(3rem, 6vh, 5rem);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.58rem, 1.4vw, 0.68rem);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(200,180,140,0.18);
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }

  /* Book */
  .rbp001-scene {
    perspective: 1800px;
    position: relative;
    z-index: 20;
    opacity: 0;
  }

  .rbp001-book {
    position: relative;
    width: clamp(280px, 62vw, 620px);
    height: clamp(300px, 50vh, 560px);
    display: flex;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.7),
      0 30px 90px rgba(0,0,0,0.75),
      0 8px 24px rgba(0,0,0,0.5);
    border: 1px solid rgba(120,100,50,0.18);
  }

  /* Left page */
  .rbp001-page-left {
    width: 50%;
    height: 100%;
    background: #1a1408;
    border-right: 1px solid rgba(120,100,60,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 3vw, 2rem) clamp(0.8rem, 2.5vw, 1.6rem);
    position: relative;
    overflow: hidden;
    box-shadow: inset -6px 0 20px rgba(0,0,0,0.35);
  }

  .rbp001-page-left::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      transparent, transparent 27px,
      rgba(120,100,60,0.07) 28px
    );
    pointer-events: none;
  }

  .rbp001-ornament {
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(1.1rem, 2.4vw, 1.7rem);
    color: rgba(180,150,90,0.45);
    margin-bottom: clamp(0.4rem, 1.2vh, 0.8rem);
    letter-spacing: 0.2em;
    opacity: 0;
    position: relative;
    z-index: 2;
  }

  .rbp001-rule {
    width: 38%;
    height: 1px;
    background: rgba(180,150,90,0.2);
    margin: clamp(0.5rem, 1.5vh, 0.9rem) 0;
    opacity: 0;
    position: relative;
    z-index: 2;
  }

  .rbp001-msg {
    font-family: var(--font-heading, 'Cormorant Garamond', 'Georgia', serif);
    font-size: clamp(0.82rem, 1.9vw, 1.18rem);
    font-style: italic;
    color: rgba(225,205,158,0.92);
    text-align: center;
    line-height: 1.78;
    letter-spacing: 0.015em;
    opacity: 0;
    position: relative;
    z-index: 2;
    padding: 0 clamp(0.2rem, 0.8vw, 0.6rem);
  }

  .rbp001-sig {
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(0.55rem, 1.2vw, 0.7rem);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(180,150,90,0.32);
    opacity: 0;
    position: relative;
    z-index: 2;
  }

  /* Right page wrapper — holds front + back, rotates */
  .rbp001-page-right {
    width: 50%;
    height: 100%;
    position: relative;
    transform-origin: left center;
    transform-style: preserve-3d;
    cursor: pointer;
    z-index: 10;
  }

  /* Front face */
  .rbp001-front {
    position: absolute;
    inset: 0;
    background: #1d1609;
    border-left: 1px solid rgba(120,100,60,0.12);
    padding: clamp(1rem, 3vw, 2rem) clamp(0.8rem, 2.5vw, 1.6rem);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(5px, 1.1vh, 9px);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  .rbp001-front::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      transparent, transparent 27px,
      rgba(120,100,60,0.065) 28px
    );
    pointer-events: none;
  }

  .rbp001-faux-line {
    height: 1px;
    background: rgba(190,160,90,0.2);
    border-radius: 1px;
    flex-shrink: 0;
  }

  .rbp001-page-num {
    position: absolute;
    bottom: clamp(0.6rem, 1.8vh, 1rem);
    right: clamp(0.6rem, 2vw, 1rem);
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(0.5rem, 1.1vw, 0.62rem);
    color: rgba(180,150,90,0.22);
    letter-spacing: 0.12em;
  }

  .rbp001-turn-hint {
    position: absolute;
    bottom: clamp(0.6rem, 1.8vh, 1rem);
    left: clamp(0.6rem, 2vw, 1rem);
    font-size: clamp(0.5rem, 1.1vw, 0.6rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(200,170,100,0.28);
    font-family: sans-serif;
    animation: rbp001-nudge 2s ease-in-out infinite;
  }

  @keyframes rbp001-nudge {
    0%,100% { opacity:0.28; transform:translateX(0); }
    50%      { opacity:0.6;  transform:translateX(5px); }
  }

  /* Back face */
  .rbp001-back {
    position: absolute;
    inset: 0;
    background: #15100506;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: rotateY(180deg);
    box-shadow: inset 6px 0 20px rgba(0,0,0,0.4);
    background: #16110506;
  }

  /* Spine */
  .rbp001-spine {
    position: absolute;
    left: 50%;
    top: 1%;
    width: 2px;
    height: 98%;
    background: rgba(0,0,0,0.6);
    transform: translateX(-50%);
    z-index: 5;
    box-shadow: 0 0 14px 5px rgba(0,0,0,0.45);
  }
</style>
<div class="rbp001-wrap" id="rbp001-wrap">
  <canvas class="rbp001-canvas" id="rbp001-canvas"></canvas>
  <div class="rbp001-name"      id="rbp001-name">--RECIPIENT_NAME--</div>
  <div class="rbp001-instr"     id="rbp001-instr">--REVEAL_INSTRUCTION--</div>
  <div class="rbp001-done-hint" id="rbp001-done">tap anywhere to continue</div>
  <div class="rbp001-scene" id="rbp001-scene">
    <div class="rbp001-book" id="rbp001-book"><!-- LEFT: message -->
  <div class="rbp001-page-left">
    <div class="rbp001-ornament" id="rbp001-ornament">❧</div>
    <div class="rbp001-rule"     id="rbp001-rule-a"></div>
    <div class="rbp001-msg"      id="rbp001-msg">--HIDDEN_MESSAGE--</div>
    <div class="rbp001-rule"     id="rbp001-rule-b"></div>
    <div class="rbp001-sig"      id="rbp001-sig">--RECIPIENT_NAME--</div>
  </div>

  <!-- RIGHT: flips away -->
  <div class="rbp001-page-right" id="rbp001-right">
    <div class="rbp001-front" id="rbp001-front">
      <!-- faux text lines injected by JS -->
      <div class="rbp001-page-num">II</div>
      <div class="rbp001-turn-hint">turn page →</div>
    </div>
    <div class="rbp001-back"></div>
  </div>

  <div class="rbp001-spine"></div>
</div></div>
</div>
<script>
(function () {
  var SECTION_IDX = 6;
  var started = false;

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== SECTION_IDX) return;
    if (started) return;
    started = true;
    init();
  });

  function init() {
    var canvas    = document.getElementById('rbp001-canvas');
    var ctx       = canvas.getContext('2d');
    var wrap      = document.getElementById('rbp001-wrap');
    var nameEl    = document.getElementById('rbp001-name');
    var instrEl   = document.getElementById('rbp001-instr');
    var sceneEl   = document.getElementById('rbp001-scene');
    var rightPage = document.getElementById('rbp001-right');
    var frontEl   = document.getElementById('rbp001-front');
    var doneEl    = document.getElementById('rbp001-done');
    var ornament  = document.getElementById('rbp001-ornament');
    var ruleA     = document.getElementById('rbp001-rule-a');
    var ruleB     = document.getElementById('rbp001-rule-b');
    var msgEl     = document.getElementById('rbp001-msg');
    var sigEl     = document.getElementById('rbp001-sig');

    var W, H, t = 0;
    var bgStars = [], motes = [];
    var flipping = false, flipped = false, msgShown = false;

    /* ── build faux lines on right page ── */
    var lineWidths = [92,68,85,100,58,78,95,72,88,62,80,90,50,75,85,60];
    lineWidths.forEach(function (w) {
      var d = document.createElement('div');
      d.className = 'rbp001-faux-line';
      d.style.width = w + '%';
      frontEl.insertBefore(d, frontEl.firstChild);
    });

    /* ── resize ── */
    function resize() {
      W = canvas.width  = wrap.offsetWidth  || window.innerWidth;
      H = canvas.height = wrap.offsetHeight || window.innerHeight;
      buildBg();
    }

    function buildBg() {
      bgStars = [];
      var n = Math.floor(W * H / 4200);
      for (var i = 0; i < n; i++) {
        bgStars.push({
          x: Math.random() * W, y: Math.random() * H,
          r: Math.random() * 0.85 + 0.15,
          a: Math.random() * 0.3 + 0.05,
          ts: Math.random() * 0.01 + 0.003,
          to: Math.random() * Math.PI * 2
        });
      }
      motes = [];
      for (var j = 0; j < 30; j++) motes.push(newMote(true));
    }

    function newMote(anywhere) {
      return {
        x: Math.random() * (W || 800),
        y: anywhere ? Math.random() * (H || 600) : (H || 600) + 10,
        r: Math.random() * 1.3 + 0.3,
        a: Math.random() * 0.13 + 0.025,
        vx: (Math.random() - 0.5) * 0.2,
        vy: -(Math.random() * 0.24 + 0.05),
        pulse: Math.random() * Math.PI * 2
      };
    }

    /* ── draw ── */
    function draw() {
      requestAnimationFrame(draw);
      t += 0.016;
      ctx.clearRect(0, 0, W, H);

      var bg = ctx.createRadialGradient(W*0.5, H*0.44, 0, W*0.5, H*0.5, Math.max(W,H)*0.78);
      bg.addColorStop(0,   'rgba(22,16,7,1)');
      bg.addColorStop(0.5, 'rgba(13,9,3,1)');
      bg.addColorStop(1,   'rgba(4,3,1,1)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // warm candle glow
      var cg = ctx.createRadialGradient(W/2, H*0.52, 0, W/2, H*0.52, Math.min(W,H)*0.36);
      cg.addColorStop(0, 'rgba(130,85,18,0.1)');
      cg.addColorStop(1, 'rgba(130,85,18,0)');
      ctx.fillStyle = cg;
      ctx.fillRect(0, 0, W, H);

      for (var i = 0; i < bgStars.length; i++) {
        var s = bgStars[i];
        var tw = Math.sin(t * s.ts * 60 + s.to) * 0.22 + 0.78;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(220,195,140,' + (s.a * tw) + ')';
        ctx.fill();
      }

      for (var m = 0; m < motes.length; m++) {
        var mo = motes[m];
        mo.x += mo.vx; mo.y += mo.vy;
        if (mo.y < -8) motes[m] = newMote(false);
        var mp = Math.sin(t * 0.7 + mo.pulse) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(mo.x, mo.y, mo.r * mp, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(215,185,110,' + (mo.a * mp) + ')';
        ctx.fill();
      }
    }

    /* ── page flip ── */
    function doFlip(e) {
      if (flipping || flipped) return;
      e.stopPropagation();
      flipping = true;

      gsap.to(instrEl, { opacity: 0, duration: 0.35 });

      gsap.to(rightPage, {
        rotationY: -180,
        duration: 1.15,
        ease: 'power2.inOut',
        transformOrigin: 'left center',
        onComplete: function () {
          flipped  = true;
          flipping = false;
          revealLeft();
        }
      });
    }

    function revealLeft() {
      gsap.to(ornament, { opacity: 1, duration: 0.8, delay: 0.05, ease: 'power2.out' });
      gsap.to(ruleA,    { opacity: 1, duration: 0.7, delay: 0.2,  ease: 'power2.out' });
      gsap.fromTo(msgEl,
        { opacity: 0, y: 16 },
        { opacity: 1, y: 0,  duration: 1.2, delay: 0.35, ease: 'power3.out' });
      gsap.to(ruleB,    { opacity: 1, duration: 0.7, delay: 0.95, ease: 'power2.out' });
      gsap.to(sigEl,    {
        opacity: 1, duration: 0.9, delay: 1.15, ease: 'power2.out',
        onComplete: function () {
          msgShown = true;
          gsap.to(doneEl, { opacity: 1, duration: 1, delay: 0.5 });
        }
      });
    }

    /* ── events ── */
    rightPage.addEventListener('mousedown', doFlip);
    rightPage.addEventListener('touchstart', function (e) {
      e.preventDefault();
      doFlip(e);
    }, { passive: false });

    wrap.addEventListener('click', function (e) {
      if (flipped && msgShown) return;   // let skeleton nav
      e.stopPropagation();
    });

    /* ── entry ── */
    function enter() {
      gsap.to(nameEl, { opacity: 1, duration: 1.5, delay: 0.5 });
      gsap.fromTo(instrEl,
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 1.2, delay: 0.85, ease: 'power2.out' });
      gsap.fromTo(sceneEl,
        { opacity: 0, y: 26, scale: 0.95 },
        { opacity: 1, y: 0,  scale: 1, duration: 1.5, delay: 1.0, ease: 'power3.out' });

      gsap.to(sceneEl, {
        y: -7, duration: 3.5, repeat: -1, yoyo: true,
        ease: 'sine.inOut', delay: 2.8
      });
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
    enter();
  }
})();
</script>
