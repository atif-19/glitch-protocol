<!--
  Component: reveal_constellation_001
  Type: reveal
  Aesthetic: Space / Cinematic Dark
  Obsession: Space / Constellations
  Tone: mysterious, intimate, breathtaking
  Occasion: birthday, apology, both
  Variables: --RECIPIENT_NAME-- --HIDDEN_MESSAGE-- --REVEAL_INSTRUCTION--
-->
<style>
  .rc001-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body, 'Inter', sans-serif);
    cursor: crosshair;
  }

  .rc001-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .rc001-instruction {
    position: absolute;
    bottom: clamp(4rem, 8vh, 6rem);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  .rc001-instruction-text {
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    white-space: nowrap;
  }

  .rc001-name {
    position: absolute;
    top: clamp(2rem, 5vh, 3.5rem);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(0.65rem, 1.8vw, 0.85rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }

  .rc001-message-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
  }

  .rc001-message-text {
    font-family: var(--font-heading, 'Playfair Display', serif);
    font-size: clamp(1.4rem, 4vw, 2.6rem);
    font-style: italic;
    color: rgba(255,255,255,0.95);
    text-align: center;
    max-width: 70vw;
    line-height: 1.6;
    text-shadow: 0 0 80px rgba(180,140,255,0.6);
    letter-spacing: 0.02em;
  }

  .rc001-done-hint {
    position: absolute;
    bottom: clamp(4rem, 8vh, 6rem);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.6rem, 1.5vw, 0.7rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    z-index: 30;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }

  .rc001-ring-wrap {
    position: absolute;
    top: clamp(2rem, 5vh, 3.5rem);
    right: clamp(1.5rem, 4vw, 3rem);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
  }
</style>
<div class="rc001-wrap" id="rc001-wrap">
  <canvas class="rc001-canvas" id="rc001-canvas"></canvas>
  <div class="rc001-name" id="rc001-name">--RECIPIENT_NAME--</div>
  <div class="rc001-instruction" id="rc001-instruction">
    <div class="rc001-instruction-text">--REVEAL_INSTRUCTION--</div>
  </div>
  <div class="rc001-message-overlay" id="rc001-message">
    <div class="rc001-message-text" id="rc001-msg-text">--HIDDEN_MESSAGE--</div>
  </div>
  <div class="rc001-done-hint" id="rc001-done-hint">tap anywhere to continue</div>
  <div class="rc001-ring-wrap" id="rc001-ring-wrap">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
      <circle id="rc001-ring-arc" cx="24" cy="24" r="18" fill="none"
        stroke="rgba(180,140,255,0.7)" stroke-width="1.5"
        stroke-dasharray="113.1" stroke-dashoffset="113.1"
        stroke-linecap="round" transform="rotate(-90 24 24)"/>
      <text id="rc001-ring-text" x="24" y="28" text-anchor="middle"
        font-size="9" font-family="Inter,sans-serif"
        fill="rgba(255,255,255,0.35)" letter-spacing="0.05em">0%</text>
    </svg>
  </div>
</div>
<script>
(function () {
  var SECTION_IDX = 6;
  var started = false;

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== SECTION_IDX) return;
    if (started) return;
    started = true;
    init();
  });

  function init() {
    var canvas  = document.getElementById('rc001-canvas');
    var ctx     = canvas.getContext('2d');
    var wrap    = document.getElementById('rc001-wrap');
    var nameEl  = document.getElementById('rc001-name');
    var instrEl = document.getElementById('rc001-instruction');
    var msgEl   = document.getElementById('rc001-message');
    var doneEl  = document.getElementById('rc001-done-hint');
    var ringWrap= document.getElementById('rc001-ring-wrap');
    var ringArc = document.getElementById('rc001-ring-arc');
    var ringTxt = document.getElementById('rc001-ring-text');

    var W, H;
    var bgStars = [];
    var cStars  = [];          // constellation stars
    var pairs   = [];          // connected pairs {a,b,progress}
    var dust    = [];
    var nextIdx = 0;
    var total   = 9;
    var revealDone  = false;
    var msgShown    = false;
    var t = 0;

    function resize() {
      W = canvas.width  = wrap.offsetWidth  || window.innerWidth;
      H = canvas.height = wrap.offsetHeight || window.innerHeight;
      rebuild();
    }

    function rebuild() {
      bgStars = [];
      var n = Math.floor(W * H / 2800);
      for (var i = 0; i < n; i++) {
        bgStars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.1 + 0.2,
          a: Math.random() * 0.55 + 0.1,
          ts: Math.random() * 0.018 + 0.004,
          to: Math.random() * Math.PI * 2
        });
      }

      var cx = W / 2, cy = H / 2;
      var rx = Math.min(W, H) * 0.27;
      var ry = Math.min(W, H) * 0.21;

      var pts = [
        [cx - rx*0.90, cy - ry*0.30],
        [cx - rx*0.55, cy - ry*0.88],
        [cx - rx*0.05, cy - ry*1.02],
        [cx + rx*0.40, cy - ry*0.78],
        [cx + rx*0.85, cy - ry*0.18],
        [cx + rx*0.62, cy + ry*0.50],
        [cx + rx*0.10, cy + ry*0.95],
        [cx - rx*0.42, cy + ry*0.72],
        [cx - rx*0.72, cy + ry*0.22]
      ];

      cStars = pts.map(function (p, i) {
        return {
          x: p[0] + (Math.random() - 0.5) * 16,
          y: p[1] + (Math.random() - 0.5) * 16,
          r: 3.2 + Math.random() * 1.8,
          alpha: 0,
          connected: false,
          pulse: Math.random() * Math.PI * 2,
          glow: 0
        };
      });

      pairs   = [];
      nextIdx = 0;
      revealDone = false;
      msgShown   = false;
    }

    /* ── dust particles ── */
    function spawnDust(x, y) {
      var colors = ['180,140,255','200,170,255','255,220,160','140,190,255'];
      for (var i = 0; i < 14; i++) {
        var ang = Math.random() * Math.PI * 2;
        var spd = Math.random() * 1.4 + 0.3;
        dust.push({
          x: x, y: y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          r: Math.random() * 2.5 + 0.8,
          life: 1,
          col: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    /* ── progress ring ── */
    function updateRing() {
      var pct = Math.round(nextIdx / total * 100);
      var circ = 2 * Math.PI * 18;
      ringArc.setAttribute('stroke-dashoffset', circ * (1 - pct / 100));
      ringTxt.textContent = pct >= 100 ? '✦' : pct + '%';
    }

    /* ── connect a star ── */
    function connectStar(idx) {
      var cs = cStars[idx];
      cs.connected = true;
      cs.glow = 65;
      spawnDust(cs.x, cs.y);

      if (idx > 0) {
        pairs.push({ a: idx - 1, b: idx, progress: 0 });
      }

      nextIdx++;

      if (nextIdx >= total) {
        // close the loop
        pairs.push({ a: total - 1, b: 0, progress: 0 });
        revealDone = true;
        spawnDust(W / 2, H / 2);
      }

      updateRing();
    }

    /* ── show hidden message ── */
    function showMessage() {
      msgShown = true;
      gsap.to(instrEl, { opacity: 0, duration: 0.5 });
      gsap.to(msgEl, {
        opacity: 1, duration: 1.4, ease: 'power2.inOut',
        onComplete: function () {
          gsap.to(doneEl, { opacity: 1, duration: 0.9, delay: 0.4 });
        }
      });
      gsap.fromTo('#rc001-msg-text',
        { y: 28, opacity: 0 },
        { y: 0, opacity: 1, duration: 1.5, ease: 'power3.out', delay: 0.25 }
      );
    }

    /* ── main draw loop ── */
    function draw() {
      requestAnimationFrame(draw);
      t += 0.016;

      ctx.clearRect(0, 0, W, H);

      // deep space bg
      var bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.75);
      bg.addColorStop(0, 'rgba(14,9,32,1)');
      bg.addColorStop(1, 'rgba(4,2,10,1)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // dust
      for (var d = dust.length - 1; d >= 0; d--) {
        var dp = dust[d];
        dp.x += dp.vx; dp.y += dp.vy; dp.life -= 0.009;
        if (dp.life <= 0) { dust.splice(d,1); continue; }
        ctx.beginPath();
        ctx.arc(dp.x, dp.y, dp.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(' + dp.col + ',' + (dp.life * 0.45) + ')';
        ctx.fill();
      }

      // bg stars
      for (var i = 0; i < bgStars.length; i++) {
        var s = bgStars[i];
        var tw = Math.sin(t * s.ts * 60 + s.to) * 0.28 + 0.72;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,' + (s.a * tw) + ')';
        ctx.fill();
      }

      // constellation lines
      for (var p = 0; p < pairs.length; p++) {
        var pr = pairs[p];
        pr.progress = Math.min(1, pr.progress + 0.038);
        var A = cStars[pr.a], B = cStars[pr.b];
        var ex = A.x + (B.x - A.x) * pr.progress;
        var ey = A.y + (B.y - A.y) * pr.progress;

        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = 'rgba(170,130,255,0.12)';
        ctx.lineWidth = 7;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(A.x, A.y);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = 'rgba(210,180,255,' + (0.4 * pr.progress) + ')';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // constellation stars
      for (var j = 0; j < cStars.length; j++) {
        var cs = cStars[j];
        cs.alpha = Math.min(0.92, cs.alpha + 0.012);
        if (cs.alpha <= 0.01) continue;

        var pulse = Math.sin(t * 1.3 + cs.pulse) * 0.14 + 0.86;

        // shrink glow
        if (cs.glow > 0) {
          var gr = ctx.createRadialGradient(cs.x, cs.y, 0, cs.x, cs.y, cs.glow);
          gr.addColorStop(0, 'rgba(210,170,255,' + (cs.alpha * 0.45) + ')');
          gr.addColorStop(1, 'rgba(210,170,255,0)');
          ctx.beginPath();
          ctx.arc(cs.x, cs.y, cs.glow, 0, Math.PI*2);
          ctx.fillStyle = gr;
          ctx.fill();
          cs.glow = Math.max(0, cs.glow - 1.0);
        }

        // halo
        var halo = ctx.createRadialGradient(cs.x, cs.y, 0, cs.x, cs.y, cs.r * 4.5);
        halo.addColorStop(0, 'rgba(230,210,255,' + (cs.alpha * 0.22) + ')');
        halo.addColorStop(1, 'rgba(230,210,255,0)');
        ctx.beginPath();
        ctx.arc(cs.x, cs.y, cs.r * 4.5, 0, Math.PI*2);
        ctx.fillStyle = halo;
        ctx.fill();

        // star body
        ctx.beginPath();
        ctx.arc(cs.x, cs.y, cs.r * pulse, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,250,255,' + cs.alpha + ')';
        ctx.fill();

        // connected ring
        if (cs.connected) {
          ctx.beginPath();
          ctx.arc(cs.x, cs.y, cs.r * 2.8, 0, Math.PI*2);
          ctx.strokeStyle = 'rgba(190,155,255,' + (0.35 * pulse) + ')';
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }

        // next-to-click golden pulse
        if (j === nextIdx && !revealDone) {
          var hp = Math.sin(t * 2.8 + cs.pulse) * 0.5 + 0.5;
          ctx.beginPath();
          ctx.arc(cs.x, cs.y, cs.r * 4 * (0.7 + hp * 0.5), 0, Math.PI*2);
          ctx.strokeStyle = 'rgba(255,210,90,' + (0.55 * hp) + ')';
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }

      // trigger message once
      if (revealDone && !msgShown) showMessage();
    }

    /* ── click / touch handler ── */
    function onInteract(e) {
      // if reveal is complete AND message is shown, let skeleton navigate
      if (revealDone && msgShown) return;

      var rect = canvas.getBoundingClientRect();
      var mx, my;
      if (e.touches && e.touches.length) {
        mx = e.touches[0].clientX - rect.left;
        my = e.touches[0].clientY - rect.top;
      } else {
        mx = e.clientX - rect.left;
        my = e.clientY - rect.top;
      }

      if (revealDone) return;

      var target = cStars[nextIdx];
      if (!target) return;

      var dx = mx - target.x, dy = my - target.y;
      var hit = Math.max(44, target.r * 9);
      if (Math.sqrt(dx*dx + dy*dy) < hit) {
        connectStar(nextIdx);
        e.stopPropagation();
      }
    }

    /* ── entry animations ── */
    function enter() {
      gsap.to(nameEl,    { opacity: 1, duration: 1.6, delay: 0.5 });
      gsap.fromTo(instrEl,
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 1.3, delay: 0.9, ease: 'power2.out' });
      gsap.to(ringWrap,  { opacity: 1, duration: 1.1, delay: 1.1 });

      cStars.forEach(function (cs, i) {
        setTimeout(function () { cs.alpha = 0.01; }, 500 + i * 160);
      });
    }

    // boot
    resize();
    window.addEventListener('resize', resize);
    draw();
    enter();

    wrap.addEventListener('click',      onInteract);
    wrap.addEventListener('touchstart', onInteract, { passive: false });
  }
})();
</script>
