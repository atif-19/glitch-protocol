<!-- Component: reveal_glitch_001 
 Type: reveal 
 Aesthetic: cyberpunk 
 Obsession: glitch/digital-corruption 
 Tone: intense, mysterious, intimate 
 Occasion: birthday, apology, both 
 Variables: --RECIPIENT_NAME-- --HIDDEN_MESSAGE-- --REVEAL_INSTRUCTION-- -->
<style>
  .rgc-root {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: var(--font-body);
  }
  .rgc-scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,255,0.02) 2px,
      rgba(0,255,255,0.02) 4px
    );
    pointer-events: none;
    z-index: 10;
  }
  .rgc-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
    background-size: clamp(30px,5vw,60px) clamp(30px,5vw,60px);
    pointer-events: none;
    z-index: 1;
  }
  .rgc-corner {
    position: absolute;
    width: clamp(28px,5vw,56px);
    height: clamp(28px,5vw,56px);
    pointer-events: none;
    z-index: 5;
  }
  .rgc-corner-tl { top: clamp(12px,3vw,24px); left: clamp(12px,3vw,24px); border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }
  .rgc-corner-tr { top: clamp(12px,3vw,24px); right: clamp(12px,3vw,24px); border-top: 2px solid var(--primary); border-right: 2px solid var(--primary); }
  .rgc-corner-bl { bottom: clamp(12px,3vw,24px); left: clamp(12px,3vw,24px); border-bottom: 2px solid var(--primary); border-left: 2px solid var(--primary); }
  .rgc-corner-br { bottom: clamp(12px,3vw,24px); right: clamp(12px,3vw,24px); border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary); }
  .rgc-status-bar {
    position: absolute;
    top: clamp(10px,2.5vw,20px);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-heading);
    font-size: clamp(8px,1.4vw,12px);
    color: var(--primary);
    letter-spacing: 0.2em;
    opacity: 0;
    z-index: 20;
    white-space: nowrap;
  }
  .rgc-recipient-tag {
    position: absolute;
    bottom: clamp(20px,4vw,40px);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-heading);
    font-size: clamp(9px,1.6vw,13px);
    color: var(--accent);
    letter-spacing: 0.3em;
    opacity: 0;
    z-index: 20;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .rgc-center {
    position: relative;
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: min(90vw, 680px);
    gap: clamp(12px,2.5vh,28px);
  }
  .rgc-glitch-block {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(8px,1.8vh,18px);
  }
  .rgc-corrupted-label {
    font-family: var(--font-heading);
    font-size: clamp(8px,1.3vw,11px);
    color: var(--primary);
    letter-spacing: 0.4em;
    opacity: 0;
    text-transform: uppercase;
  }
  .rgc-hex-row {
    display: flex;
    gap: clamp(3px,0.8vw,8px);
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
  }
  .rgc-hex-char {
    font-family: var(--font-heading);
    font-size: clamp(7px,1.1vw,10px);
    color: rgba(0,255,255,0.25);
    letter-spacing: 0.1em;
    transition: color 0.3s;
  }
  .rgc-hex-char.rgc-decoded { color: var(--primary); }
  .rgc-message-wrap {
    position: relative;
    width: 100%;
    padding: clamp(18px,3.5vw,44px) clamp(14px,3.5vw,44px);
    border: 1px solid rgba(0,255,255,0.2);
    background: rgba(0,255,255,0.03);
    overflow: hidden;
    opacity: 0;
  }
  .rgc-message-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0.6;
  }
  .rgc-message-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .rgc-glitch-lines-wrap {
    position: relative;
    width: 100%;
    min-height: clamp(50px,10vh,100px);
  }
  .rgc-glitch-line {
    font-family: var(--font-heading);
    font-size: clamp(12px,2vw,17px);
    color: rgba(0,255,255,0.22);
    letter-spacing: 0.08em;
    line-height: 1.8;
    text-align: center;
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    user-select: none;
  }
  .rgc-real-message {
    font-family: var(--font-body);
    font-size: clamp(15px,3vw,26px);
    color: var(--text);
    line-height: 1.75;
    text-align: center;
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    letter-spacing: 0.02em;
    font-weight: 300;
  }
  .rgc-rgb-r {
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%) translateX(4px);
    color: rgba(255,30,30,0.18);
    font-family: var(--font-heading);
    font-size: clamp(12px,2vw,17px);
    line-height: 1.8;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.08em;
  }
  .rgc-rgb-b {
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%) translateX(-4px);
    color: rgba(30,30,255,0.18);
    font-family: var(--font-heading);
    font-size: clamp(12px,2vw,17px);
    line-height: 1.8;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.08em;
  }
  .rgc-decode-progress {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
    opacity: 0;
  }
  .rgc-decode-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    position: relative;
  }
  .rgc-decode-fill::after {
    content: '';
    position: absolute;
    right: -6px; top: -3px;
    width: 2px; height: 8px;
    background: #fff;
    opacity: 0.9;
  }
  .rgc-instruction {
    font-family: var(--font-heading);
    font-size: clamp(9px,1.5vw,12px);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.3em;
    text-align: center;
    text-transform: uppercase;
    opacity: 0;
  }
  .rgc-glitch-strip {
    position: absolute;
    left: 0; right: 0;
    height: clamp(2px,0.3vw,3px);
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0;
    pointer-events: none;
    z-index: 8;
  }
  .rgc-vline-l {
    position: absolute;
    left: clamp(10px,2.5vw,22px);
    top: 12%; bottom: 12%;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--primary), transparent);
    opacity: 0.12;
    z-index: 4;
  }
  .rgc-vline-r {
    position: absolute;
    right: clamp(10px,2.5vw,22px);
    top: 12%; bottom: 12%;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    opacity: 0.12;
    z-index: 4;
  }
  .rgc-particle-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .rgc-glitch-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,255,255,0.04) 0%, transparent 50%, rgba(255,0,255,0.04) 100%);
    pointer-events: none;
  }
</style>
<div class="rgc-root" id="reveal_glitch_001">
  <canvas class="rgc-particle-canvas" id="rgc-particles"></canvas>
  <div class="rgc-grid" id="rgc-grid-el"></div>
  <div class="rgc-scanlines"></div>
  <div class="rgc-vline-l"></div>
  <div class="rgc-vline-r"></div>
  <div class="rgc-corner rgc-corner-tl"></div>
  <div class="rgc-corner rgc-corner-tr"></div>
  <div class="rgc-corner rgc-corner-bl"></div>
  <div class="rgc-corner rgc-corner-br"></div>
  <div class="rgc-status-bar" id="rgc-status">DECRYPTING SIGNAL // NODE 6 // ACCESS GRANTED</div>
  <div class="rgc-recipient-tag" id="rgc-recip">FOR: --RECIPIENT_NAME--</div>
  <div class="rgc-center">
    <div class="rgc-glitch-block">
      <div class="rgc-corrupted-label" id="rgc-label">// SIGNAL DECODED //</div>
      <div class="rgc-hex-row" id="rgc-hex"></div>
      <div class="rgc-message-wrap" id="rgc-msgwrap">
        <div class="rgc-glitch-overlay"></div>
        <div class="rgc-glitch-lines-wrap">
          <div class="rgc-glitch-line" id="rgc-glitch-line"><span id="rgc-gl-text">█▓▒░ 4E 4F 52 ░▒▓█</span></div>
          <div class="rgc-rgb-r" id="rgc-rgb-r">--HIDDEN_MESSAGE--</div>
          <div class="rgc-rgb-b" id="rgc-rgb-b">--HIDDEN_MESSAGE--</div>
          <div class="rgc-real-message" id="rgc-real">--HIDDEN_MESSAGE--</div>
        </div>
      </div>
      <div class="rgc-decode-progress" id="rgc-prog">
        <div class="rgc-decode-fill" id="rgc-fill"></div>
      </div>
      <div class="rgc-instruction" id="rgc-instr">--REVEAL_INSTRUCTION--</div>
    </div>
  </div>
  <div class="rgc-glitch-strip" id="rgc-strip1" style="top:28%"></div>
  <div class="rgc-glitch-strip" id="rgc-strip2" style="top:63%"></div>
  <div class="rgc-glitch-strip" id="rgc-strip3" style="top:48%"></div>
</div>
<script>
(function(){
  var root = document.getElementById('reveal_glitch_001');
  var canvas = document.getElementById('rgc-particles');
  var ctx = canvas.getContext('2d');
  var W, H, particles = [], animRunning = false, glitchInterval = null, decodeStarted = false;

  function resizeCanvas(){
    W = canvas.width = root.offsetWidth || window.innerWidth;
    H = canvas.height = root.offsetHeight || window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', function(){ resizeCanvas(); });

  function Particle(){
    this.reset = function(){
      this.x = Math.random()*W;
      this.y = Math.random()*H;
      this.vx = (Math.random()-0.5)*0.4;
      this.vy = -Math.random()*0.7-0.15;
      this.life = 1;
      this.decay = Math.random()*0.007+0.003;
      this.size = Math.random()*1.4+0.4;
      this.isCyan = Math.random()>0.5;
    };
    this.reset();
    this.life = Math.random();
  }
  for(var i=0;i<70;i++) particles.push(new Particle());

  function drawParticles(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
      if(p.life<=0) p.reset();
      ctx.globalAlpha = p.life*0.35;
      ctx.fillStyle = p.isCyan ? 'rgba(0,255,255,1)' : 'rgba(255,0,255,1)';
      ctx.fillRect(p.x,p.y,p.size,p.size);
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  var glitchChars = '█▓▒░▄▀■□▪◆◇○●0123456789ABCDEF!@#$%^&*';

  function randomStr(len){
    var s='';
    for(var i=0;i<len;i++) s+=glitchChars[Math.floor(Math.random()*glitchChars.length)];
    return s;
  }

  function buildHex(){
    var row = document.getElementById('rgc-hex');
    var msg = '--HIDDEN_MESSAGE--';
    row.innerHTML='';
    var len = Math.min(msg.length, 18);
    for(var i=0;i<len;i++){
      var sp=document.createElement('span');
      sp.className='rgc-hex-char';
      sp.id='rgc-hc-'+i;
      sp.textContent=msg.charCodeAt(i).toString(16).toUpperCase().padStart(2,'0');
      row.appendChild(sp);
    }
  }

  function startGlitchLoop(){
    var el = document.getElementById('rgc-gl-text');
    glitchInterval = setInterval(function(){
      el.textContent = randomStr(Math.floor(Math.random()*14+8));
    }, 90);
  }

  function runDecodeSequence(){
    if(decodeStarted) return;
    decodeStarted = true;
    clearInterval(glitchInterval);
    var fill = document.getElementById('rgc-fill');
    var glLine = document.getElementById('rgc-glitch-line');
    var realMsg = document.getElementById('rgc-real');
    var rgbR = document.getElementById('rgc-rgb-r');
    var rgbB = document.getElementById('rgc-rgb-b');
    var msg = '--HIDDEN_MESSAGE--';
    var progress = 0;

    var decInt = setInterval(function(){
      progress += 1.8;
      if(progress > 100) progress = 100;
      gsap.to(fill,{width:progress+'%',duration:0.08,ease:'none'});
      var decLen = Math.floor((progress/100)*msg.length);
      var glText = document.getElementById('rgc-gl-text');
      if(glText) glText.textContent = msg.substring(0,decLen) + randomStr(Math.max(0,msg.length-decLen));
      var hexLen = Math.min(msg.length,18);
      var hexDec = Math.floor((progress/100)*hexLen);
      for(var i=0;i<hexLen;i++){
        var hc=document.getElementById('rgc-hc-'+i);
        if(hc && i<hexDec) hc.classList.add('rgc-decoded');
      }
      if(progress>=100){
        clearInterval(decInt);
        setTimeout(function(){ doFinalReveal(glLine,realMsg,rgbR,rgbB); }, 120);
      }
    }, 28);
  }

  function doFinalReveal(glLine,realMsg,rgbR,rgbB){
    var tl = gsap.timeline();
    tl.to(rgbR,{opacity:1,x:7,duration:0.12,ease:'none'})
      .to(rgbB,{opacity:1,x:-7,duration:0.12,ease:'none'},'-=0.12')
      .to([rgbR,rgbB],{opacity:0,duration:0.18,ease:'none'})
      .to(glLine,{opacity:0,duration:0.15})
      .to(realMsg,{opacity:1,duration:0.9,ease:'power2.out'})
      .call(function(){
        startAmbientGlow();
        startFlickers();
      });
  }

  function startAmbientGlow(){
    var mw = document.getElementById('rgc-msgwrap');
    gsap.to(mw,{
      boxShadow:'0 0 36px rgba(0,255,255,0.13), inset 0 0 16px rgba(0,255,255,0.04)',
      duration:2.2, repeat:-1, yoyo:true, ease:'sine.inOut'
    });
    gsap.to('#rgc-instr',{
      opacity:0.6, duration:1.4, repeat:-1, yoyo:true, ease:'sine.inOut'
    });
  }

  function startFlickers(){
    var strips=[
      document.getElementById('rgc-strip1'),
      document.getElementById('rgc-strip2'),
      document.getElementById('rgc-strip3')
    ];
    function flick(){
      var s=strips[Math.floor(Math.random()*strips.length)];
      gsap.set(s,{top:(Math.random()*80+10)+'%',scaleX:Math.random()*0.6+0.3});
      gsap.to(s,{opacity:Math.random()*0.35+0.1,duration:0.04,onComplete:function(){
        gsap.to(s,{opacity:0,duration:0.12});
      }});
      setTimeout(flick, Math.random()*1800+400);
    }
    flick();
  }

  function runEntrance(){
    buildHex();
    startGlitchLoop();

    var tl = gsap.timeline({defaults:{ease:'power2.out'}});
    tl.set(root,{opacity:1})
      .from('.rgc-corner-tl',{opacity:0,x:-16,y:-16,duration:0.45})
      .from('.rgc-corner-tr',{opacity:0,x:16,y:-16,duration:0.45},'-=0.45')
      .from('.rgc-corner-bl',{opacity:0,x:-16,y:16,duration:0.45},'-=0.45')
      .from('.rgc-corner-br',{opacity:0,x:16,y:16,duration:0.45},'-=0.45')
      .to('#rgc-status',{opacity:1,duration:0.4})
      .to('#rgc-recip',{opacity:1,duration:0.4})
      .to('#rgc-label',{opacity:1,duration:0.35})
      .to('#rgc-hex',{opacity:1,duration:0.35})
      .to('#rgc-msgwrap',{opacity:1,duration:0.3})
      .to('#rgc-prog',{opacity:1,duration:0.3})
      .to('#rgc-instr',{opacity:0.4,duration:0.5})
      .call(function(){ setTimeout(runDecodeSequence, 1000); });

    gsap.to('#rgc-status',{opacity:0.45,duration:0.9,repeat:-1,yoyo:true,ease:'sine.inOut',delay:1.5});
    gsap.to('.rgc-vline-l, .rgc-vline-r',{opacity:0.28,duration:1.6,repeat:-1,yoyo:true,ease:'sine.inOut'});
    gsap.to('.rgc-corner',{opacity:0.55,duration:1.1,repeat:-1,yoyo:true,ease:'sine.inOut',stagger:0.2});
  }

  document.addEventListener('glitch:enter', function(e){
    if(e && e.detail && e.detail.index !== 6) return;
    runEntrance();
  });

  // Standalone auto-start
  setTimeout(runEntrance, 200);

  // Mouse parallax — desktop
  document.addEventListener('mousemove', function(e){
    var cx = e.clientX/window.innerWidth - 0.5;
    var cy = e.clientY/window.innerHeight - 0.5;
    gsap.to('#rgc-grid-el',{x:cx*12,y:cy*10,duration:1.1,ease:'power1.out'});
    gsap.to('#rgc-msgwrap',{x:cx*7,y:cy*5,duration:1.3,ease:'power1.out'});
  });

  // Touch parallax — mobile
  document.addEventListener('touchmove', function(e){
    var t = e.touches[0];
    var cx = t.clientX/window.innerWidth - 0.5;
    var cy = t.clientY/window.innerHeight - 0.5;
    gsap.to('#rgc-grid-el',{x:cx*8,y:cy*7,duration:0.9,ease:'power1.out'});
  },{passive:true});

})();
</script>
