<!-- Component: reveal_candle_001
 Type: reveal
 Aesthetic: warm
 Obsession: candlelight/intimacy
 Tone: tender, warm, romantic
 Occasion: birthday, apology, both
 Variables: --RECIPIENT_NAME-- --HIDDEN_MESSAGE-- --REVEAL_INSTRUCTION--
 -->
<style>
  .rcnd-root {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: var(--font-body);
  }

  .rcnd-bg-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 80%, rgba(180,80,0,0.0) 0%, transparent 100%);
    z-index: 1;
    pointer-events: none;
    transition: background 0.8s;
  }

  .rcnd-particles-canvas {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .rcnd-top-label {
    position: absolute;
    top: clamp(14px,3vh,28px);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-heading);
    font-size: clamp(8px,1.3vw,11px);
    color: rgba(255,180,80,0.0);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    z-index: 20;
    white-space: nowrap;
  }

  .rcnd-recipient {
    position: absolute;
    bottom: clamp(18px,4vh,36px);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-heading);
    font-size: clamp(9px,1.5vw,13px);
    color: rgba(255,200,100,0.0);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    z-index: 20;
    white-space: nowrap;
  }

  .rcnd-instruction {
    position: absolute;
    bottom: clamp(42px,8vh,72px);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-heading);
    font-size: clamp(9px,1.4vw,12px);
    color: rgba(255,180,80,0.0);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    z-index: 20;
    white-space: nowrap;
    text-align: center;
  }

  .rcnd-scene {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .rcnd-candle-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .rcnd-flame-wrap {
    position: relative;
    width: clamp(28px,5vw,48px);
    height: clamp(52px,9vh,88px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    margin-bottom: -2px;
  }

  .rcnd-flame-outer {
    position: absolute;
    bottom: 0;
    width: clamp(20px,3.5vw,34px);
    height: clamp(44px,7.5vh,72px);
    border-radius: 50% 50% 25% 25% / 60% 60% 40% 40%;
    background: linear-gradient(180deg, rgba(255,255,200,0.95) 0%, rgba(255,200,60,0.9) 30%, rgba(255,100,0,0.85) 65%, rgba(180,40,0,0.6) 100%);
    filter: blur(1.5px);
    opacity: 0;
    transform-origin: bottom center;
  }

  .rcnd-flame-inner {
    position: absolute;
    bottom: 0;
    width: clamp(10px,1.8vw,17px);
    height: clamp(28px,4.8vh,46px);
    border-radius: 50% 50% 25% 25% / 60% 60% 40% 40%;
    background: linear-gradient(180deg, #ffffff 0%, rgba(255,240,180,0.9) 40%, rgba(255,160,40,0.7) 100%);
    filter: blur(0.5px);
    opacity: 0;
    transform-origin: bottom center;
  }

  .rcnd-flame-core {
    position: absolute;
    bottom: 2px;
    width: clamp(5px,0.9vw,8px);
    height: clamp(10px,1.8vh,16px);
    border-radius: 50%;
    background: rgba(255,255,255,0.98);
    filter: blur(0.5px);
    opacity: 0;
  }

  .rcnd-wick {
    position: relative;
    width: clamp(2px,0.35vw,3px);
    height: clamp(10px,1.8vh,16px);
    background: linear-gradient(180deg, #888 0%, #333 100%);
    border-radius: 2px;
    z-index: 3;
    margin-bottom: -1px;
  }

  .rcnd-body {
    position: relative;
    width: clamp(40px,7vw,68px);
    height: clamp(110px,19vh,180px);
    border-radius: clamp(4px,0.8vw,8px) clamp(4px,0.8vw,8px) clamp(6px,1.2vw,12px) clamp(6px,1.2vw,12px);
    background: linear-gradient(180deg,
      rgba(255,240,200,0.95) 0%,
      rgba(240,210,160,0.92) 30%,
      rgba(220,185,130,0.9) 70%,
      rgba(200,165,110,0.88) 100%
    );
    box-shadow:
      inset -4px 0 12px rgba(160,100,40,0.25),
      inset 4px 0 8px rgba(255,240,200,0.3),
      0 4px 20px rgba(0,0,0,0.35);
    overflow: hidden;
  }

  .rcnd-body-drip {
    position: absolute;
    top: -2px; left: 20%;
    width: 22%;
    height: clamp(16px,3vh,28px);
    background: rgba(255,240,200,0.85);
    border-radius: 0 0 50% 50%;
  }
  .rcnd-body-drip-2 {
    position: absolute;
    top: -2px; right: 20%;
    width: 16%;
    height: clamp(10px,1.8vh,18px);
    background: rgba(255,240,200,0.7);
    border-radius: 0 0 50% 50%;
  }

  .rcnd-body-shine {
    position: absolute;
    top: 8%; left: 16%;
    width: 18%;
    height: 70%;
    background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 100%);
    border-radius: 50%;
    pointer-events: none;
  }

  .rcnd-body-wax-pool {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: clamp(8px,1.4vh,14px);
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(255,250,220,0.9) 0%, rgba(240,210,160,0.6) 100%);
    border-radius: clamp(4px,0.8vw,8px) clamp(4px,0.8vw,8px) 0 0;
    opacity: 0;
  }

  .rcnd-plate {
    width: clamp(70px,12vw,115px);
    height: clamp(10px,1.8vh,16px);
    background: linear-gradient(180deg, rgba(200,160,90,0.9) 0%, rgba(160,120,60,0.85) 100%);
    border-radius: 50%;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,220,140,0.2);
    margin-top: -1px;
  }

  .rcnd-click-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(90px,16vw,140px);
    height: clamp(90px,16vw,140px);
    border-radius: 50%;
    border: 1px solid rgba(255,200,80,0.0);
    pointer-events: none;
    z-index: 5;
  }

  /* Reveal card */
  .rcnd-reveal-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(60,20,0,0.55) 0%, transparent 100%);
  }

  .rcnd-reveal-card {
    position: relative;
    width: min(88vw, 560px);
    padding: clamp(28px,5vw,52px) clamp(24px,5vw,48px);
    border: 1px solid rgba(255,180,60,0.2);
    background: rgba(12,6,2,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(14px,2.5vh,22px);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    opacity: 0;
    transform: translateY(28px) scale(0.94);
  }

  .rcnd-reveal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 8%; right: 8%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,180,60,0.7), transparent);
  }

  .rcnd-reveal-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 8%; right: 8%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,120,30,0.5), transparent);
  }

  .rcnd-reveal-flame-icon {
    font-size: clamp(28px,5vw,44px);
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(255,140,0,0.8));
  }

  .rcnd-reveal-eyebrow {
    font-family: var(--font-heading);
    font-size: clamp(8px,1.3vw,11px);
    color: rgba(255,180,60,0.6);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    text-align: center;
  }

  .rcnd-reveal-divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,160,50,0.55), transparent);
  }

  .rcnd-reveal-message {
    font-family: var(--font-body);
    font-size: clamp(16px,3vw,25px);
    color: var(--text);
    line-height: 1.8;
    text-align: center;
    font-weight: 300;
    letter-spacing: 0.025em;
    opacity: 0;
  }

  .rcnd-reveal-close {
    font-family: var(--font-heading);
    font-size: clamp(8px,1.2vw,10px);
    color: rgba(255,180,60,0.3);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: clamp(4px,1vh,8px);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding: 8px 16px;
  }
</style>
<div class="rcnd-root" id="reveal_candle_001">
<canvas class="rcnd-particles-canvas" id="rcnd-particles"></canvas>
  <div class="rcnd-bg-glow" id="rcnd-bg-glow"></div>
  <div class="rcnd-top-label" id="rcnd-top-label">A LIGHT FOR YOU</div>
  <div class="rcnd-recipient" id="rcnd-recipient">FOR: --RECIPIENT_NAME--</div>
  <div class="rcnd-instruction" id="rcnd-instruction">--REVEAL_INSTRUCTION--</div>
  <div class="rcnd-scene" id="rcnd-scene">
    <div class="rcnd-candle-wrap" id="rcnd-candle-wrap">
      <div class="rcnd-click-hint" id="rcnd-click-hint"></div>
      <div class="rcnd-flame-wrap" id="rcnd-flame-wrap">
        <div class="rcnd-flame-outer" id="rcnd-flame-outer"></div>
        <div class="rcnd-flame-inner" id="rcnd-flame-inner"></div>
        <div class="rcnd-flame-core" id="rcnd-flame-core"></div>
        <div class="rcnd-wick" id="rcnd-wick"></div>
      </div>
      <div class="rcnd-body" id="rcnd-body">
        <div class="rcnd-body-wax-pool" id="rcnd-wax-pool"></div>
        <div class="rcnd-body-drip"></div>
        <div class="rcnd-body-drip-2"></div>
        <div class="rcnd-body-shine"></div>
      </div>
      <div class="rcnd-plate"></div>
    </div>
  </div>
  <div class="rcnd-reveal-overlay" id="rcnd-reveal-overlay">
    <div class="rcnd-reveal-card" id="rcnd-reveal-card">
      <div class="rcnd-reveal-flame-icon">🕯</div>
      <div class="rcnd-reveal-eyebrow">HELD IN THE LIGHT</div>
      <div class="rcnd-reveal-divider"></div>
      <div class="rcnd-reveal-message" id="rcnd-reveal-message">--HIDDEN_MESSAGE--</div>
      <div class="rcnd-reveal-divider"></div>
      <div class="rcnd-reveal-close" id="rcnd-close">TAP TO RETURN</div>
    </div>
  </div>
</div>
<script>
(function(){

  var SECTION_INDEX = 6;
  var entered = false;
  var lit = false;
  var revealed = false;

  /* ── particle system ── */
  var canvas = document.getElementById('rcnd-particles');
  var ctx = canvas.getContext('2d');
  var W, H, embers = [], smokeParticles = [];

  function resizeCanvas(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function Ember(){
    this.reset = function(cx, cy){
      this.x  = cx + (Math.random()-0.5)*8;
      this.y  = cy;
      this.vx = (Math.random()-0.5)*0.7;
      this.vy = -(Math.random()*1.8+0.8);
      this.life = 1;
      this.decay = Math.random()*0.018+0.01;
      this.size  = Math.random()*2.2+0.6;
      this.hue   = Math.floor(Math.random()*30+15);
    };
    this.active = false;
  }

  function Smoke(){
    this.reset = function(cx, cy){
      this.x     = cx + (Math.random()-0.5)*6;
      this.y     = cy;
      this.vx    = (Math.random()-0.5)*0.35;
      this.vy    = -(Math.random()*0.6+0.3);
      this.life  = 0.55;
      this.decay = Math.random()*0.004+0.003;
      this.size  = Math.random()*8+4;
    };
    this.active = false;
  }

  for(var i=0;i<60;i++) embers.push(new Ember());
  for(var j=0;j<20;j++) smokeParticles.push(new Smoke());

  var candleCX = 0, candleCY = 0;
  var drawEmbers = false;

  function updateCandlePos(){
    var wrap = document.getElementById('rcnd-flame-wrap');
    if(!wrap) return;
    var r = wrap.getBoundingClientRect();
    candleCX = r.left + r.width/2;
    candleCY = r.top  + 4;
  }

  function spawnEmber(){
    for(var i=0;i<embers.length;i++){
      if(!embers[i].active){
        embers[i].reset(candleCX, candleCY);
        embers[i].active = true;
        return;
      }
    }
  }

  function spawnSmoke(){
    for(var i=0;i<smokeParticles.length;i++){
      if(!smokeParticles[i].active){
        smokeParticles[i].reset(candleCX, candleCY - 10);
        smokeParticles[i].active = true;
        return;
      }
    }
  }

  var spawnTimer = 0;
  function particleTick(){
    ctx.clearRect(0,0,W,H);
    if(drawEmbers){
      spawnTimer++;
      if(spawnTimer % 3 === 0) spawnEmber();
      if(spawnTimer % 14 === 0) spawnSmoke();
    }
    for(var i=0;i<embers.length;i++){
      var e = embers[i];
      if(!e.active) continue;
      e.x   += e.vx;
      e.y   += e.vy;
      e.vy  += 0.015;
      e.vx  += (Math.random()-0.5)*0.06;
      e.life -= e.decay;
      if(e.life <= 0){ e.active=false; continue; }
      ctx.save();
      ctx.globalAlpha = e.life * 0.85;
      ctx.fillStyle   = 'hsl('+e.hue+',100%,70%)';
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size*e.life, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    for(var j=0;j<smokeParticles.length;j++){
      var s = smokeParticles[j];
      if(!s.active) continue;
      s.x    += s.vx;
      s.y    += s.vy;
      s.vx   += (Math.random()-0.5)*0.04;
      s.size += 0.18;
      s.life -= s.decay;
      if(s.life <= 0){ s.active=false; continue; }
      ctx.save();
      ctx.globalAlpha = s.life*0.12;
      ctx.fillStyle = '#ccaa88';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    requestAnimationFrame(particleTick);
  }
  particleTick();

  /* ── flame flicker ── */
  var flickerTl = null;

  function startFlameFlicker(){
    var outer = document.getElementById('rcnd-flame-outer');
    var inner = document.getElementById('rcnd-flame-inner');
    var core  = document.getElementById('rcnd-flame-core');

    function flick(){
      var skewX  = (Math.random()-0.5)*18;
      var scaleX = 0.82 + Math.random()*0.32;
      var scaleY = 0.88 + Math.random()*0.22;
      var dur    = 0.07 + Math.random()*0.11;
      gsap.to(outer, { skewX:skewX, scaleX:scaleX, scaleY:scaleY, duration:dur, ease:'none',
        onComplete: flick });
      gsap.to(inner, { skewX:skewX*0.6, scaleX:scaleX*0.9, scaleY:scaleY*1.05, duration:dur+0.04, ease:'none' });
    }
    flick();

    gsap.to(core, { opacity:0.7, duration:0.15, repeat:-1, yoyo:true, ease:'none' });
  }

  /* ── light candle ── */
  function lightCandle(){
    if(lit) return;
    lit = true;

    updateCandlePos();
    drawEmbers = true;

    var outer   = document.getElementById('rcnd-flame-outer');
    var inner   = document.getElementById('rcnd-flame-inner');
    var core    = document.getElementById('rcnd-flame-core');
    var waxPool = document.getElementById('rcnd-wax-pool');
    var bgGlow  = document.getElementById('rcnd-bg-glow');
    var hint    = document.getElementById('rcnd-click-hint');
    var instr   = document.getElementById('rcnd-instruction');

    var tl = gsap.timeline();
    tl.to(outer, { opacity:1, scaleY:0.3, duration:0.12, ease:'power2.out' })
      .to(outer, { scaleY:1, duration:0.45, ease:'elastic.out(1,0.4)' })
      .to(inner, { opacity:1, duration:0.25 }, '-=0.35')
      .to(core,  { opacity:1, duration:0.2  }, '-=0.2')
      .to(waxPool, { opacity:1, duration:0.6, ease:'power2.out' }, '-=0.2')
      .to(bgGlow, {
          background:'radial-gradient(ellipse 60% 50% at 50% 80%, rgba(180,80,0,0.22) 0%, transparent 100%)',
          duration:0.8, ease:'power2.out'
        }, '-=0.4')
      .to(hint, { borderColor:'rgba(255,200,80,0.3)', scale:1.15, duration:0.5 }, '-=0.5')
      .to(hint, { borderColor:'rgba(255,200,80,0)', scale:1.4, opacity:0, duration:0.6 })
      .to(instr, {
          color:'rgba(255,180,80,0.5)',
          duration:0.6
        }, '-=0.4')
      .call(function(){
        startFlameFlicker();
        startBgPulse();
        /* update instruction text */
        instr.textContent = '--REVEAL_INSTRUCTION--';
        /* after 0.8s show reveal */
        setTimeout(showReveal, 800);
      });
  }

  function startBgPulse(){
    gsap.to('#rcnd-bg-glow', {
      background:'radial-gradient(ellipse 60% 55% at 50% 80%, rgba(200,90,0,0.28) 0%, transparent 100%)',
      duration:2.0, repeat:-1, yoyo:true, ease:'sine.inOut'
    });
  }

  /* ── show reveal card ── */
  function showReveal(){
    if(revealed) return;
    revealed = true;

    var overlay = document.getElementById('rcnd-reveal-overlay');
    var card    = document.getElementById('rcnd-reveal-card');
    var msg     = document.getElementById('rcnd-reveal-message');

    overlay.style.pointerEvents = 'all';

    var tl = gsap.timeline();
    tl.to(overlay, { opacity:1, duration:0.4, ease:'power2.out' })
      .to(card, {
          opacity:1,
          y:0,
          scale:1,
          duration:0.7,
          ease:'expo.out'
        }, '-=0.2')
      .to(msg, { opacity:1, duration:0.7, ease:'power2.out' }, '-=0.3')
      .call(function(){
        gsap.to(card, {
          boxShadow:'0 0 50px 8px rgba(200,100,0,0.18)',
          duration:2.5, repeat:-1, yoyo:true, ease:'sine.inOut'
        });
      });
  }

  /* ── close reveal ── */
  function closeReveal(){
    var overlay = document.getElementById('rcnd-reveal-overlay');
    var card    = document.getElementById('rcnd-reveal-card');
    var msg     = document.getElementById('rcnd-reveal-message');

    var tl = gsap.timeline();
    tl.to(msg,  { opacity:0, duration:0.25, ease:'power2.in' })
      .to(card,  { opacity:0, y:20, scale:0.94, duration:0.4, ease:'power2.in' })
      .to(overlay, { opacity:0, duration:0.3 })
      .call(function(){
        overlay.style.pointerEvents = 'none';
        revealed = false;
        /* Reset card for potential re-tap */
        gsap.set(card, { y:28, scale:0.94 });
        /* Re-allow reveal via candle tap after 400ms */
        setTimeout(function(){ lit = false; }, 400);
      });
  }

  /* ── block propagation so tap doesn't bubble to navigation ── */
  var candleWrap = document.getElementById('rcnd-candle-wrap');
  var closeBtn   = document.getElementById('rcnd-close');
  var revealCard = document.getElementById('rcnd-reveal-card');

  function blockNav(e){
    e.stopPropagation();
    e.preventDefault();
  }

  /* candle tap */
  candleWrap.addEventListener('click', function(e){
    blockNav(e);
    lightCandle();
  });
  candleWrap.addEventListener('touchend', function(e){
    blockNav(e);
    lightCandle();
  }, { passive:false });

  /* close button */
  closeBtn.addEventListener('click', function(e){
    blockNav(e);
    closeReveal();
  });
  closeBtn.addEventListener('touchend', function(e){
    blockNav(e);
    closeReveal();
  }, { passive:false });

  /* tapping card itself should NOT navigate */
  revealCard.addEventListener('click',    blockNav);
  revealCard.addEventListener('touchend', blockNav, { passive:false });

  /* overlay backdrop tap = close */
  document.getElementById('rcnd-reveal-overlay').addEventListener('click', function(e){
    if(e.target === this){
      blockNav(e);
      closeReveal();
    }
  });
  document.getElementById('rcnd-reveal-overlay').addEventListener('touchend', function(e){
    if(e.target === this){
      blockNav(e);
      closeReveal();
    }
  }, { passive:false });

  /* ── entrance animation ── */
  function runEntrance(){
    if(entered) return;
    entered = true;

    gsap.set('#rcnd-scene', { opacity:0, y:30 });
    gsap.set(['#rcnd-top-label','#rcnd-recipient','#rcnd-instruction'], { opacity:0, y:12 });

    var tl = gsap.timeline({ defaults:{ ease:'power3.out' } });
    tl.to('#rcnd-scene', { opacity:1, y:0, duration:1.0 })
      .to('#rcnd-top-label',  { opacity:1, y:0, duration:0.55 }, '-=0.4')
      .to('#rcnd-recipient',  { opacity:1, y:0, duration:0.55 }, '-=0.35')
      .to('#rcnd-instruction',{ opacity:1, y:0, duration:0.55 }, '-=0.35')
      .call(function(){
        /* gentle candle idle bob */
        gsap.to('#rcnd-scene', {
          y: -6,
          duration: 3.2,
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut'
        });
        /* pulsing click hint ring */
        gsap.set('#rcnd-click-hint', { borderColor:'rgba(255,200,80,0.22)', scale:1 });
        gsap.to('#rcnd-click-hint', {
          scale: 1.22,
          borderColor:'rgba(255,200,80,0)',
          duration: 1.6,
          repeat: -1,
          ease: 'power2.out'
        });
        /* instruction slow blink */
        gsap.to('#rcnd-instruction', {
          opacity: 0.15,
          duration: 2.0,
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut'
        });
        /* update candle pos for particles */
        updateCandlePos();
      });
  }

  document.addEventListener('glitch:enter', function(e){
    if(e && e.detail && e.detail.index !== SECTION_INDEX) return;
    runEntrance();
  });

  /* standalone auto-start */
  setTimeout(runEntrance, 120);

})();
</script>
