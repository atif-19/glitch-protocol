<!--
  Component: ending_cinematic_001
  Type: ending
  Aesthetic: Cinematic
  Obsession: Film credits roll
  Tone: emotional, cinematic, closing
  Occasion: both
  Variables: --RECIPIENT_NAME-- --ENDING_LINE-- --SONG_NAME--
-->
<style>
  .ec001-root {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
  }

  .ec001-vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.72) 100%);
  }

  .ec001-scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    opacity: 0.5;
  }

  .ec001-grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .ec001-credits-track {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -100vh;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(28px, 5vh, 56px);
    padding: 0 clamp(20px, 6vw, 120px);
    padding-bottom: 60vh;
  }

  .ec001-credit-block {
    text-align: center;
    opacity: 0;
  }

  .ec001-credit-role {
    font-family: var(--font-body);
    font-size: clamp(0.55rem, 1.2vw, 0.75rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.38;
    margin-bottom: clamp(4px, 0.8vh, 9px);
  }

  .ec001-credit-name {
    font-family: var(--font-heading);
    font-size: clamp(1.4rem, 3.5vw, 2.8rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.08em;
    line-height: 1.1;
  }

  .ec001-credit-name.ec001-accent {
    color: var(--accent);
  }

  .ec001-divider-credit {
    width: clamp(30px, 6vw, 70px);
    height: 1px;
    background: var(--text);
    opacity: 0.18;
    margin: 0 auto;
  }

  .ec001-title-block {
    text-align: center;
    opacity: 0;
  }

  .ec001-film-title {
    font-family: var(--font-heading);
    font-size: clamp(2.2rem, 7vw, 6rem);
    font-weight: 900;
    color: var(--text);
    letter-spacing: 0.12em;
    line-height: 1;
    text-transform: uppercase;
  }

  .ec001-film-year {
    font-family: var(--font-body);
    font-size: clamp(0.6rem, 1.3vw, 0.85rem);
    letter-spacing: 0.5em;
    color: var(--text);
    opacity: 0.3;
    margin-top: clamp(6px, 1.2vh, 14px);
    text-transform: uppercase;
  }

  .ec001-ending-line {
    font-family: var(--font-heading);
    font-size: clamp(1rem, 2.8vw, 2.2rem);
    font-weight: 400;
    color: var(--text);
    opacity: 0;
    font-style: italic;
    text-align: center;
    max-width: 700px;
    line-height: 1.4;
    padding: 0 clamp(16px, 4vw, 60px);
  }

  .ec001-song-block {
    text-align: center;
    opacity: 0;
  }

  .ec001-song-label {
    font-size: clamp(0.5rem, 1vw, 0.65rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.3;
    margin-bottom: clamp(4px, 0.6vh, 8px);
  }

  .ec001-song-name {
    font-family: var(--font-heading);
    font-size: clamp(0.9rem, 2vw, 1.5rem);
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.06em;
  }

  .ec001-progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    width: 0%;
    background: var(--accent);
    z-index: 10;
    opacity: 0;
  }

  .ec001-center-stage {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    gap: clamp(16px, 3vh, 32px);
  }

  .ec001-light-leak {
    position: absolute;
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    background: var(--primary);
    opacity: 0;
  }

  .ec001-ll-1 {
    width: clamp(200px, 40vw, 500px);
    height: clamp(200px, 40vw, 500px);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .ec001-ll-2 {
    width: clamp(100px, 20vw, 260px);
    height: clamp(100px, 20vw, 260px);
    top: 20%;
    left: 15%;
  }

  .ec001-ll-3 {
    width: clamp(80px, 14vw, 180px);
    height: clamp(80px, 14vw, 180px);
    bottom: 18%;
    right: 12%;
    background: var(--accent);
  }

  .ec001-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--text);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 4;
  }

  .ec001-final-recipient {
    font-family: var(--font-heading);
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 900;
    color: var(--text);
    letter-spacing: 0.05em;
    text-align: center;
    opacity: 0;
    line-height: 1;
  }

  .ec001-final-heart {
    width: clamp(28px, 5vw, 52px);
    height: clamp(28px, 5vw, 52px);
    opacity: 0;
    position: relative;
  }

  .ec001-lens-flare {
    position: absolute;
    pointer-events: none;
    z-index: 8;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
  }
</style>
<div class="ec001-root" id="ec001-root">
  <div class="ec001-vignette"></div>
  <div class="ec001-scanlines"></div>
  <div class="ec001-grain"></div>
  <div class="ec001-light-leak ec001-ll-1" id="ec001-ll1"></div>
  <div class="ec001-light-leak ec001-ll-2" id="ec001-ll2"></div>
  <div class="ec001-light-leak ec001-ll-3" id="ec001-ll3"></div>
  <div class="ec001-credits-track" id="ec001-track">
<div class="ec001-credit-block" id="ec001-cb-0">
  <div class="ec001-credit-role">a film about</div>
  <div class="ec001-credit-name ec001-accent">--RECIPIENT_NAME--</div>
</div>

<div class="ec001-divider-credit"></div>

<div class="ec001-credit-block" id="ec001-cb-1">
  <div class="ec001-credit-role">written &amp; directed by</div>
  <div class="ec001-credit-name">someone who cares</div>
</div>

<div class="ec001-divider-credit"></div>

<div class="ec001-credit-block" id="ec001-cb-2">
  <div class="ec001-credit-role">starring</div>
  <div class="ec001-credit-name">--RECIPIENT_NAME--</div>
  <div class="ec001-credit-role" style="margin-top: clamp(4px,0.7vh,8px);">as herself</div>
</div>

<div class="ec001-divider-credit"></div>

<div class="ec001-credit-block" id="ec001-cb-3">
  <div class="ec001-credit-role">original score</div>
  <div class="ec001-credit-name ec001-song-name" id="ec001-song">--SONG_NAME--</div>
</div>

<div class="ec001-divider-credit"></div>

<div class="ec001-credit-block" id="ec001-cb-4">
  <div class="ec001-credit-role">produced with</div>
  <div class="ec001-credit-name">every piece of this heart</div>
</div>

<div class="ec001-divider-credit"></div>

<div class="ec001-title-block" id="ec001-film-title-block">
  <div class="ec001-film-title">--RECIPIENT_NAME--</div>
  <div class="ec001-film-year">a story without an ending</div>
</div></div>
  <div class="ec001-progress-bar" id="ec001-progress"></div>
</div>
<script>
(function () {

  var stars = [];
  var root = document.getElementById('ec001-root');
  for (var si = 0; si < 60; si++) {
    var star = document.createElement('div');
    star.className = 'ec001-star';
    star.style.left = (Math.random() * 100) + '%';
    star.style.top  = (Math.random() * 100) + '%';
    star.style.opacity = 0;
    root.appendChild(star);
    stars.push(star);
  }

  var lensFlares = [];
  for (var li = 0; li < 4; li++) {
    var lf = document.createElement('div');
    lf.className = 'ec001-lens-flare';
    var sz = [6, 14, 28, 8][li];
    lf.style.width  = sz + 'px';
    lf.style.height = sz + 'px';
    lf.style.opacity = 0;
    root.appendChild(lf);
    lensFlares.push(lf);
  }

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 7) return;

    var track     = document.getElementById('ec001-track');
    var progress  = document.getElementById('ec001-progress');
    var centerStage = document.getElementById('ec001-center-stage');
    var endingLine  = document.getElementById('ec001-ending-line');
    var finalName   = document.getElementById('ec001-final-name');
    var heart       = document.getElementById('ec001-heart');
    var songBlockC  = document.getElementById('ec001-song-block-center');
    var ll1 = document.getElementById('ec001-ll1');
    var ll2 = document.getElementById('ec001-ll2');
    var ll3 = document.getElementById('ec001-ll3');
    var creditBlocks = document.querySelectorAll('.ec001-credit-block, .ec001-title-block');

    gsap.set(centerStage, { opacity: 0 });
    gsap.set(progress, { opacity: 1 });

    stars.forEach(function (s, i) {
      gsap.to(s, {
        opacity: Math.random() * 0.4 + 0.05,
        duration: 0.5 + Math.random() * 0.8,
        delay: i * 0.02,
        ease: 'power1.out'
      });
      gsap.to(s, {
        opacity: Math.random() * 0.3,
        duration: 2 + Math.random() * 3,
        repeat: -1,
        yoyo: true,
        delay: Math.random() * 3,
        ease: 'sine.inOut'
      });
    });

    gsap.to(ll1, { opacity: 0.06, scale: 1.1, duration: 3, ease: 'power1.out' });
    gsap.to(ll2, { opacity: 0.04, duration: 2.5, delay: 0.5, ease: 'power1.out' });
    gsap.to(ll3, { opacity: 0.05, duration: 2, delay: 1, ease: 'power1.out' });

    gsap.to(ll1, { x: 20, y: -15, scale: 1.15, duration: 8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3 });
    gsap.to(ll2, { x: -30, y: 20, duration: 7, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 2 });
    gsap.to(ll3, { x: 15, y: -20, duration: 6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1 });

    creditBlocks.forEach(function (cb) {
      gsap.set(cb, { opacity: 0 });
    });

    var trackH   = track.scrollHeight;
    var viewH    = root.offsetHeight;
    var rollDist = trackH + viewH;
    var rollDur  = Math.max(18, rollDist / 55);

    gsap.fromTo(track,
      { y: viewH },
      {
        y: -(trackH),
        duration: rollDur,
        ease: 'none',
        delay: 0.6,
        onUpdate: function () {
          var prog = gsap.getProperty(track, 'y');
          var pct  = 1 - ((prog + trackH) / rollDist);
          pct = Math.min(1, Math.max(0, pct));
          gsap.set(progress, { width: (pct * 100) + '%' });

          creditBlocks.forEach(function (cb) {
            var rect = cb.getBoundingClientRect();
            var rootRect = root.getBoundingClientRect();
            var relTop  = rect.top - rootRect.top;
            var relBot  = rect.bottom - rootRect.top;
            var inView  = relTop < viewH * 0.85 && relBot > viewH * 0.15;
            var center  = (relTop + relBot) / 2;
            var distFromCenter = Math.abs(center - viewH / 2) / (viewH / 2);
            var targetOpacity = inView ? (1 - distFromCenter * 0.5) : 0;
            gsap.to(cb, { opacity: targetOpacity, duration: 0.4, overwrite: 'auto' });
          });

          if (pct > 0.78) {
            gsap.to(centerStage, { opacity: 1, duration: 1.2, overwrite: 'auto' });
          }
        },
        onComplete: function () {
          showFinalFrame();
        }
      }
    );

    function showFinalFrame() {
      gsap.to(track, { opacity: 0, duration: 1 });

      var tl = gsap.timeline({ delay: 0.5 });

      tl.to(endingLine, {
        opacity: 1,
        y: 0,
        duration: 1.6,
        ease: 'power3.out'
      }, 0)

      .fromTo(endingLine, { y: 22 }, { y: 0, duration: 1.6, ease: 'power3.out' }, 0)

      .to(finalName, {
        opacity: 1,
        duration: 1.2,
        ease: 'power2.out'
      }, 1.4)

      .fromTo(finalName, { scale: 0.88, letterSpacing: '0.25em' }, {
        scale: 1, letterSpacing: '0.05em', duration: 1.4, ease: 'back.out(1.4)'
      }, 1.4)

      .to(heart, {
        opacity: 1,
        scale: 1,
        duration: 0.6,
        ease: 'back.out(3)'
      }, 2.6)

      .fromTo(heart, { scale: 0 }, { scale: 1, duration: 0.6, ease: 'back.out(3)' }, 2.6)

      .to(songBlockC, {
        opacity: 1,
        y: 0,
        duration: 1,
        ease: 'power2.out'
      }, 3.2)

      .fromTo(songBlockC, { y: 14 }, { y: 0, duration: 1, ease: 'power2.out' }, 3.2);

      gsap.to(heart, {
        scale: 1.12,
        duration: 0.9,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: 3.5
      });

      gsap.to(endingLine, {
        y: -6,
        duration: 4,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: 4
      });

      var lensPositions = [
        { x: '30%', y: '40%' },
        { x: '55%', y: '55%' },
        { x: '45%', y: '35%' },
        { x: '60%', y: '45%' }
      ];
      lensFlares.forEach(function (lf, i) {
        lf.style.left = lensPositions[i].x;
        lf.style.top  = lensPositions[i].y;
        gsap.to(lf, {
          opacity: 0.18 - i * 0.03,
          duration: 0.6,
          delay: 3 + i * 0.08,
          ease: 'power2.out'
        });
        gsap.to(lf, {
          x: (Math.random() * 60 - 30) + 'px',
          y: (Math.random() * 30 - 15) + 'px',
          opacity: 0,
          duration: 1.8,
          delay: 3.6 + i * 0.1,
          ease: 'power1.in'
        });
      });
    }

    root.addEventListener('mousemove', function (ev) {
      var rect = root.getBoundingClientRect();
      var cx = (ev.clientX - rect.left) / rect.width;
      var cy = (ev.clientY - rect.top)  / rect.height;
      gsap.to(ll1, { x: (cx - 0.5) * 40, y: (cy - 0.5) * 30, duration: 2, ease: 'power2.out', overwrite: 'auto' });
      gsap.to(ll2, { x: (cx - 0.5) * -30, y: (cy - 0.5) * -20, duration: 2.4, ease: 'power2.out', overwrite: 'auto' });

      lensFlares.forEach(function (lf, i) {
        gsap.to(lf, {
          left: (cx * 100 + (i - 1.5) * 6) + '%',
          top:  (cy * 100 + (i - 1.5) * 4) + '%',
          duration: 0.6,
          ease: 'power2.out',
          overwrite: 'auto'
        });
      });
    });

  });

})();
</script>
