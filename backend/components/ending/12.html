<script>
(function () {
  let initialized = false;

  /* ══════════════════════════════════════
     BG CANVAS — static starfield
  ══════════════════════════════════════ */
  function initStarfield() {
    const canvas = document.getElementById('ep003-bg-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
      buildStars();
    }

    function buildStars() {
      stars = [];
      const count = Math.floor((W * H) / 3800);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.2,
          base: Math.random() * 0.6 + 0.1,
          phase: Math.random() * Math.PI * 2,
          speed: 0.006 + Math.random() * 0.018,
          color: Math.random() > 0.5 ? '#c4dcff' : '#e8d4ff'
        });
      }
    }

    resize();
    window.addEventListener('resize', resize);

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.016;
      stars.forEach(s => {
        const alpha = s.base + Math.sin(t * s.speed + s.phase) * s.base * 0.6;
        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = s.r * 4;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  /* ══════════════════════════════════════
     TRAIL CANVAS — shooting stars
  ══════════════════════════════════════ */
  function initShootingStars() {
    const canvas = document.getElementById('ep003-trail-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['var(--accent)', 'var(--primary)', '#fff', '#c4dcff', '#ffd6f0'];
    const resolvedColors = ['#a78bfa', '#ec4899', '#ffffff', '#c4dcff', '#ffd6f0'];

    const shots = [];

    function spawn() {
      const fromTop = Math.random() > 0.4;
      const angle = (20 + Math.random() * 30) * Math.PI / 180;
      const speed = 8 + Math.random() * 18;
      const len   = 80 + Math.random() * 220;
      const color = resolvedColors[Math.floor(Math.random() * resolvedColors.length)];
      const size  = Math.random() * 2.4 + 0.6;

      let x, y;
      if (fromTop) {
        x = Math.random() * W * 1.2 - W * 0.1;
        y = -len;
      } else {
        x = -len;
        y = Math.random() * H * 0.7;
      }

      shots.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, len, color, size, alpha: 1, life: 1 });
    }

    /* heavy burst at start */
    for (let i = 0; i < 22; i++) {
      setTimeout(spawn, i * 80);
    }

    /* continuous rain */
    setInterval(() => {
      const batch = Math.floor(Math.random() * 3) + 1;
      for (let i = 0; i < batch; i++) spawn();
    }, 180);

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (let i = shots.length - 1; i >= 0; i--) {
        const s = shots[i];
        s.x += s.vx;
        s.y += s.vy;
        s.life -= 0.012;
        s.alpha = Math.max(0, s.life);

        if (s.alpha <= 0 || s.x > W + 200 || s.y > H + 200) {
          shots.splice(i, 1);
          continue;
        }

        const tail_x = s.x - Math.cos(Math.atan2(s.vy, s.vx)) * s.len;
        const tail_y = s.y - Math.sin(Math.atan2(s.vy, s.vx)) * s.len;

        const grad = ctx.createLinearGradient(tail_x, tail_y, s.x, s.y);
        grad.addColorStop(0, 'transparent');
        grad.addColorStop(0.6, s.color + '44');
        grad.addColorStop(1, s.color);

        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.strokeStyle = grad;
        ctx.lineWidth = s.size;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(tail_x, tail_y);
        ctx.lineTo(s.x, s.y);
        ctx.stroke();

        /* head glow */
        const hg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 5);
        hg.addColorStop(0, s.color);
        hg.addColorStop(1, 'transparent');
        ctx.globalAlpha = s.alpha * 0.9;
        ctx.fillStyle = hg;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * 5, 0, Math.PI * 2);
        ctx.fill();

        /* sparkle burst around head */
        if (Math.random() > 0.7) {
          for (let p = 0; p < 3; p++) {
            const px = s.x + (Math.random() - 0.5) * 12;
            const py = s.y + (Math.random() - 0.5) * 12;
            ctx.globalAlpha = s.alpha * Math.random() * 0.8;
            ctx.fillStyle = s.color;
            ctx.beginPath();
            ctx.arc(px, py, Math.random() * 1.5 + 0.3, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.restore();
      }
      requestAnimationFrame(draw);
    }
    draw();
  }

  /* ══════════════════════════════════════
     STAR CANVAS — floating particles
  ══════════════════════════════════════ */
  function initParticles() {
    const canvas = document.getElementById('ep003-star-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, pts = [];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLS = ['#a78bfa', '#ec4899', '#ffffff', '#7dd3fc', '#fbbf24'];
    for (let i = 0; i < 55; i++) {
      pts.push({
        x: Math.random() * (W || window.innerWidth),
        y: Math.random() * (H || window.innerHeight),
        r: Math.random() * 2.2 + 0.5,
        vx: (Math.random() - 0.5) * 0.35,
        vy: -(Math.random() * 0.5 + 0.1),
        alpha: 0,
        maxA: Math.random() * 0.55 + 0.15,
        phase: Math.random() * Math.PI * 2,
        col: COLS[Math.floor(Math.random() * COLS.length)]
      });
    }

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.02;
      pts.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        p.alpha = p.maxA * (0.5 + 0.5 * Math.sin(t * 1.5 + p.phase));

        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.col;
        ctx.shadowColor = p.col;
        ctx.shadowBlur = p.r * 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  /* ══════════════════════════════════════
     RINGS
  ══════════════════════════════════════ */
  function animateRings() {
    gsap.to('#ep003-ring-a', { opacity: 0.55, scale: 1, duration: 1.8, ease: 'back.out(1.4)', delay: 0.5 });
    gsap.to('#ep003-ring-b', { opacity: 0.38, scale: 1, duration: 2,   ease: 'back.out(1.4)', delay: 0.75 });
    gsap.to('#ep003-ring-c', { opacity: 0.18, scale: 1, duration: 2.2, ease: 'back.out(1.2)', delay: 0.3 });

    gsap.to('#ep003-ring-a', { rotation:  360, duration: 22, repeat: -1, ease: 'none', transformOrigin: 'center center' });
    gsap.to('#ep003-ring-b', { rotation: -360, duration: 16, repeat: -1, ease: 'none', transformOrigin: 'center center' });
    gsap.to('#ep003-ring-c', { rotation:  360, duration: 34, repeat: -1, ease: 'none', transformOrigin: 'center center' });

    gsap.to('#ep003-ring-a', { opacity: 0.75, scale: 1.04, duration: 3.5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3 });
    gsap.to('#ep003-ring-b', { opacity: 0.2,  scale: 0.95, duration: 3,   repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 4 });
  }

  /* ══════════════════════════════════════
     AMBIENT
  ══════════════════════════════════════ */
  function ambientLoop() {
    gsap.to('#ep003-ground-glow', { opacity: 0.18, scale: 1.08, duration: 4, repeat: -1, yoyo: true, ease: 'sine.inOut' });
    gsap.to('#ep003-top-glow',    { opacity: 0.14, scale: 1.05, duration: 5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1 });
    gsap.to('#ep003-center-burst',{ opacity: 0.35, scale: 1.12, duration: 3.5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.5 });

    gsap.to('#ep003-name', {
      backgroundPosition: '200% 200%',
      duration: 5, repeat: -1, yoyo: true, ease: 'sine.inOut'
    });
    gsap.to('#ep003-name-wrap', {
      y: -10, duration: 4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1
    });
    gsap.to('#ep003-name-wrap', {
      filter: 'drop-shadow(0 0 80px var(--accent))',
      duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 2
    });
    gsap.to('#ep003-disc', {
      rotation: 360, duration: 6, repeat: -1, ease: 'none', transformOrigin: 'center center'
    });
    gsap.to('#ep003-disc', {
      boxShadow: '0 0 50px var(--accent), 0 0 100px var(--primary)',
      duration: 2.5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 2
    });

    /* star row sparkle */
    gsap.to('.ep003-star-dot', {
      opacity: 1, scale: 1.3,
      duration: 0.6, repeat: -1, yoyo: true, ease: 'sine.inOut',
      stagger: { each: 0.25, repeat: -1 }
    });
  }

  /* ══════════════════════════════════════
     CURSOR REACT
  ══════════════════════════════════════ */
  function cursorReact() {
    const wrap = document.getElementById('ep003-wrap');
    if (!wrap) return;
    wrap.addEventListener('mousemove', e => {
      const cx = e.clientX / window.innerWidth  - 0.5;
      const cy = e.clientY / window.innerHeight - 0.5;
      gsap.to('#ep003-name-wrap', { x: cx * 18, y: cy * 12, duration: 1.8, ease: 'power2.out', overwrite: 'auto' });
      gsap.to('#ep003-ring-a',    { x: cx * 30, y: cy * 22, duration: 2.2, ease: 'power2.out' });
      gsap.to('#ep003-ring-b',    { x: cx * -22, y: cy * -16, duration: 2.6, ease: 'power2.out' });
      gsap.to('#ep003-center-burst', { x: cx * 25, y: cy * 18, duration: 2, ease: 'power2.out' });
      gsap.to('#ep003-ground-glow',  { x: cx * 40, duration: 2.5, ease: 'power2.out' });
    });
  }

  /* ══════════════════════════════════════
     MAIN ENTRANCE
  ══════════════════════════════════════ */
  function enter() {
    if (initialized) return;
    initialized = true;

    initStarfield();
    initShootingStars();
    initParticles();
    animateRings();

    gsap.to('#ep003-center-burst', { opacity: 0.5, scale: 1, duration: 2, ease: 'power2.out' });
    gsap.to('#ep003-ground-glow',  { opacity: 0.16, duration: 2.5, ease: 'power2.out' });
    gsap.to('#ep003-top-glow',     { opacity: 0.12, duration: 2.8, ease: 'power2.out', delay: 0.3 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#ep003-badge',       { opacity: 1, y: 0, scale: 1, duration: 0.8 }, 0.4)
      .to('#ep003-name-wrap',   { opacity: 1, y: 0, scale: 1, duration: 1.3, ease: 'back.out(1.8)' }, 0.75)
      .to('#ep003-divider',     { opacity: 1, scaleX: 1, duration: 0.75, ease: 'power2.inOut' }, 1.4)
      .to('#ep003-ending-line', { opacity: 1, y: 0, duration: 0.9 }, 1.72)
      .to('#ep003-song-pill',   { opacity: 1, y: 0, scale: 1, duration: 0.85 }, 2.15)
      .to('#ep003-bottom',      { opacity: 1, duration: 0.65 }, 2.55);

    tl.call(() => {
      ambientLoop();
      cursorReact();
    }, null, 2.8);
  }

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 7) return;
    enter();
  });
})();
</script>
