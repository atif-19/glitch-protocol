<style>
  .ep005-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
  }

  .ep005-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .ep005-emoji-layer {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .ep005-emoji {
    position: absolute;
    top: -80px;
    font-size: clamp(1.2rem, 3vw, 2.2rem);
    opacity: 0;
    user-select: none;
    pointer-events: none;
    will-change: transform, opacity;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
  }

  .ep005-glow-ring {
    position: absolute;
    width: clamp(260px, 50vw, 520px);
    height: clamp(260px, 50vw, 520px);
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    box-shadow: 0 0 40px var(--accent), inset 0 0 40px var(--accent);
    z-index: 2;
    pointer-events: none;
  }

  .ep005-glow-ring-2 {
    position: absolute;
    width: clamp(180px, 35vw, 380px);
    height: clamp(180px, 35vw, 380px);
    border-radius: 50%;
    border: 1px solid var(--primary);
    opacity: 0;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    box-shadow: 0 0 20px var(--primary);
    z-index: 2;
    pointer-events: none;
  }

  .ep005-content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: clamp(14px, 3vh, 28px);
    padding: clamp(20px, 5vw, 60px);
    max-width: min(90vw, 680px);
  }

  .ep005-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 999px;
    padding: clamp(4px, 1vw, 8px) clamp(16px, 3vw, 28px);
    font-size: clamp(0.65rem, 1.4vw, 0.85rem);
    font-family: var(--font-heading);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--bg);
    font-weight: 700;
    opacity: 0;
    transform: translateY(20px);
  }

  .ep005-name {
    font-family: var(--font-heading);
    font-size: clamp(2.6rem, 9vw, 6.5rem);
    font-weight: 900;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.02em;
    opacity: 0;
    transform: translateY(30px);
    position: relative;
  }

  .ep005-name-highlight {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
  }

  .ep005-ending-line {
    font-size: clamp(0.95rem, 2.4vw, 1.4rem);
    color: var(--text);
    opacity: 0;
    transform: translateY(20px);
    line-height: 1.65;
    max-width: 520px;
    font-style: italic;
  }

  .ep005-divider {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--primary), transparent);
    border-radius: 2px;
    margin: clamp(4px, 1vh, 10px) 0;
  }

  .ep005-song-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(16px);
    cursor: default;
    user-select: none;
  }

  .ep005-song-icon {
    width: clamp(38px, 6vw, 52px);
    height: clamp(38px, 6vw, 52px);
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1rem, 2vw, 1.4rem);
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--accent);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .ep005-song-icon:hover {
    transform: scale(1.15) rotate(10deg);
    box-shadow: 0 0 32px var(--accent);
  }

  .ep005-song-text {
    text-align: left;
  }

  .ep005-song-label {
    font-size: clamp(0.55rem, 1.1vw, 0.72rem);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: var(--font-heading);
    font-weight: 700;
    display: block;
    margin-bottom: 2px;
  }

  .ep005-song-name {
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: var(--text);
    font-family: var(--font-body);
    font-style: italic;
  }

  .ep005-bottom {
    position: absolute;
    bottom: clamp(16px, 4vh, 32px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
  }

  .ep005-footer-text {
    font-size: clamp(0.6rem, 1.2vw, 0.75rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.35;
    font-family: var(--font-heading);
  }

  .ep005-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .ep005-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
  }

  .ep005-dot.ep005-dot-active {
    opacity: 1;
    background: var(--primary);
    box-shadow: 0 0 8px var(--primary);
  }

  .ep005-burst {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    opacity: 0;
  }
</style>
<div class="ep005-wrap" id="ep005-wrap">
  <canvas class="ep005-canvas" id="ep005-canvas"></canvas>
  <div class="ep005-emoji-layer" id="ep005-emoji-layer"></div>
  <div class="ep005-glow-ring" id="ep005-ring1"></div>
  <div class="ep005-glow-ring-2" id="ep005-ring2"></div>
  <div class="ep005-content">
    <div class="ep005-badge" id="ep005-badge">✦ made just for you ✦</div>
<div class="ep005-name" id="ep005-name">
  <span class="ep005-name-highlight">--RECIPIENT_NAME--</span>
</div>

<div class="ep005-ending-line" id="ep005-ending-line">
  --ENDING_LINE--
</div>

<div class="ep005-divider" id="ep005-divider"></div>

<div class="ep005-song-wrap" id="ep005-song-wrap">
  <div class="ep005-song-icon">♪</div>
  <div class="ep005-song-text">
    <span class="ep005-song-label">your song</span>
    <span class="ep005-song-name">--SONG_NAME--</span>
  </div>
</div></div>
  <div class="ep005-bottom" id="ep005-bottom">
    <div class="ep005-dots">
      <div class="ep005-dot"></div>
      <div class="ep005-dot ep005-dot-active"></div>
      <div class="ep005-dot"></div>
    </div>
    <div class="ep005-footer-text">the end ✦</div>
  </div>
</div>
<script>
(function() {
  const EMOJIS = ['🌟','✨','💫','🎉','🎊','💖','🌸','🦋','🎀','🌈','🥳','💝','🌺','⭐','🎶','🎵','💕','🍀','🌙','☀️','🌻','🫧','🪄','🎈'];

  let emojiInterval = null;
  let burstTimeout = null;
  let ambientTl = null;
  let initialized = false;

  function spawnEmoji(forceX) {
    const layer = document.getElementById('ep005-emoji-layer');
    if (!layer) return;
    const el = document.createElement('div');
    el.className = 'ep005-emoji';
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    const x = forceX !== undefined ? forceX : Math.random() * 100;
    el.style.left = x + '%';
    el.style.fontSize = clamp(1.1, 2.5, Math.random()) + 'rem';
    const duration = 3 + Math.random() * 4;
    const drift = (Math.random() - 0.5) * 120;
    const rotate = (Math.random() - 0.5) * 360;
    layer.appendChild(el);

    gsap.to(el, {
      y: window.innerHeight + 120,
      x: drift,
      rotation: rotate,
      opacity: 1,
      duration: duration,
      ease: 'none',
      delay: 0,
      onStart: () => { gsap.set(el, { opacity: 0.85 }); },
      onComplete: () => { el.remove(); }
    });

    gsap.fromTo(el, { scale: 0.4 }, { scale: 1.1, duration: 0.4, ease: 'back.out(2)' });
  }

  function clamp(min, max, t) {
    return min + (max - min) * Math.max(0, Math.min(1, t));
  }

  function startEmojiRain(fast) {
    if (emojiInterval) clearInterval(emojiInterval);
    const interval = fast ? 80 : 240;
    emojiInterval = setInterval(() => spawnEmoji(), interval);
  }

  function initCanvas() {
    const canvas = document.getElementById('ep005-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const style = getComputedStyle(document.documentElement);
    const accent = style.getPropertyValue('--accent').trim() || '#ff6ec7';
    const primary = style.getPropertyValue('--primary').trim() || '#a78bfa';

    for (let i = 0; i < 38; i++) {
      particles.push({
        x: Math.random() * 1,
        y: Math.random() * 1,
        r: Math.random() * 1.6 + 0.4,
        a: Math.random() * Math.PI * 2,
        speed: 0.00015 + Math.random() * 0.0003,
        drift: (Math.random() - 0.5) * 0.0006,
        color: Math.random() > 0.5 ? accent : primary,
        alpha: 0.15 + Math.random() * 0.3
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.a += p.speed;
        p.x += Math.cos(p.a * 1.3) * 0.0008 + p.drift;
        p.y += Math.sin(p.a) * 0.0008 - 0.00015;
        if (p.y < -0.02) p.y = 1.02;
        if (p.x < -0.02) p.x = 1.02;
        if (p.x > 1.02) p.x = -0.02;
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  function burstEmojisFromCenter() {
    for (let i = 0; i < 14; i++) {
      setTimeout(() => spawnEmoji(20 + Math.random() * 60), i * 55);
    }
  }

  function initCursorReaction() {
    const wrap = document.getElementById('ep005-wrap');
    const ring1 = document.getElementById('ep005-ring1');
    const ring2 = document.getElementById('ep005-ring2');

    wrap.addEventListener('mousemove', (e) => {
      const cx = e.clientX / window.innerWidth - 0.5;
      const cy = e.clientY / window.innerHeight - 0.5;
      gsap.to(ring1, { x: cx * 30, y: cy * 30, duration: 1.2, ease: 'power2.out' });
      gsap.to(ring2, { x: cx * -20, y: cy * -20, duration: 1.5, ease: 'power2.out' });
    });

    wrap.addEventListener('click', () => {
      burstEmojisFromCenter();
      gsap.to([ring1, ring2], {
        scale: 1.35,
        opacity: 0.9,
        duration: 0.25,
        ease: 'power2.out',
        yoyo: true,
        repeat: 1
      });
    });
  }

  function enter() {
    if (initialized) return;
    initialized = true;

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#ep005-ring1', { opacity: 0.45, scale: 1, duration: 1.2, ease: 'back.out(1.5)' }, 0)
      .to('#ep005-ring2', { opacity: 0.3, scale: 1, duration: 1.4, ease: 'back.out(1.5)' }, 0.15)
      .to('#ep005-badge', { opacity: 1, y: 0, duration: 0.7 }, 0.3)
      .to('#ep005-name', { opacity: 1, y: 0, duration: 0.9, ease: 'back.out(1.8)' }, 0.55)
      .to('#ep005-ending-line', { opacity: 1, y: 0, duration: 0.75 }, 0.85)
      .to('#ep005-divider', { width: '100%', duration: 0.6, ease: 'power2.inOut' }, 1.1)
      .to('#ep005-song-wrap', { opacity: 1, y: 0, duration: 0.7 }, 1.35)
      .to('#ep005-bottom', { opacity: 1, duration: 0.6 }, 1.6);

    tl.call(() => {
      startEmojiRain(true);
      setTimeout(() => startEmojiRain(false), 2200);
      burstEmojisFromCenter();
    }, null, 0.5);

    ambientTl = gsap.timeline({ repeat: -1, yoyo: true });
    ambientTl.to('#ep005-ring1', { scale: 1.07, opacity: 0.6, duration: 2.8, ease: 'sine.inOut' })
             .to('#ep005-ring1', { scale: 0.96, opacity: 0.35, duration: 2.8, ease: 'sine.inOut' });

    gsap.to('#ep005-ring2', {
      rotation: 360,
      duration: 18,
      repeat: -1,
      ease: 'none',
      transformOrigin: 'center center'
    });

    gsap.to('#ep005-name', {
      y: -6,
      duration: 2.6,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 1.8
    });

    const dots = document.querySelectorAll('.ep005-dot');
    let di = 0;
    setInterval(() => {
      dots.forEach(d => d.classList.remove('ep005-dot-active'));
      di = (di + 1) % dots.length;
      dots[di].classList.add('ep005-dot-active');
    }, 900);

    initCursorReaction();
  }

  document.addEventListener('glitch:enter', function(e) {
    if (e.detail.index !== 7) return;
    enter();
  });

  initCanvas();
})();
</script>
