<script>
(function () {
  const INDEX = 7;

  // ── Particle system ────────────────────────────────────────────
  const canvas = document.getElementById('ed-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const TOTAL = 160;
  const pool  = [];

  function mkPt(boot) {
    return {
      x:    Math.random() * (W || 800),
      y:    boot ? Math.random() * (H || 800) : (H || 800) + 10,
      r:    Math.random() * 2.2 + 0.3,
      vx:   (Math.random() - 0.5) * 0.16,
      vy:   -(Math.random() * 0.28 + 0.04),
      op:   Math.random() * 0.55 + 0.08,
      ts:   Math.random() * 0.013 + 0.004,
      tp:   Math.random() * Math.PI * 2,
      warm: Math.random() > 0.62
    };
  }

  for (let i = 0; i < TOTAL; i++) pool.push(mkPt(true));

  let running = false;

  function tick() {
    ctx.clearRect(0, 0, W, H);
    const t = performance.now() * 0.001;
    for (let i = 0; i < pool.length; i++) {
      const p = pool[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -10) { pool[i] = mkPt(false); continue; }
      const fl  = 0.4 + 0.6 * Math.sin(t * p.ts * 60 + p.tp);
      const col = p.warm
        ? 'rgba(255,210,180,' + (p.op * fl * 0.7).toFixed(3) + ')'
        : 'rgba(178,140,255,' + (p.op * fl).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.2832);
      ctx.fillStyle = col;
      ctx.fill();
    }
    if (running) requestAnimationFrame(tick);
  }

  // ── Slow upward drift for larger particles (constellation feel) ─
  function spawnDrifters() {
    for (let i = 0; i < 18; i++) {
      const p    = mkPt(true);
      p.r        = Math.random() * 3.5 + 1.5;
      p.op       = Math.random() * 0.28 + 0.06;
      p.vy       = -(Math.random() * 0.12 + 0.02);
      pool.push(p);
    }
  }

  // ── Entrance sequence ──────────────────────────────────────────
  function enterSection() {
    running = true;
    spawnDrifters();
    tick();

    gsap.set([
      '#ed-eyebrow',
      '#ed-name',
      '#ed-ending-line',
      '#ed-song-wrap',
      '#ed-seal-wrap'
    ], { opacity: 0, y: 18 });

    gsap.set('#ed-rule', { width: '0%' });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#ed-eyebrow',     { opacity: 1, y: 0, duration: 0.8 },  0.3)
      .to('#ed-name',        { opacity: 1, y: 0, duration: 1.1, ease: 'power4.out' }, 0.65)
      .to('#ed-rule',        { width: '100%', duration: 1.0, ease: 'power2.inOut' }, 1.1)
      .to('#ed-ending-line', { opacity: 1, y: 0, duration: 0.9 },  1.45)
      .to('#ed-song-wrap',   { opacity: 1, y: 0, duration: 0.8 },  1.8)
      .to('#ed-seal-wrap',   { opacity: 1, y: 0, duration: 0.7 },  2.15);

    // ambient: name breathe
    gsap.to('#ed-name', {
      opacity: 0.82,
      duration: 4,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 3
    });

    // ambient: song icon spin
    gsap.to('#ed-song-ring', {
      rotation: 360,
      duration: 22,
      repeat: -1,
      ease: 'none',
      transformOrigin: '50% 50%'
    });

    // ambient: rule pulse
    gsap.to('#ed-rule', {
      opacity: 0.45,
      duration: 3,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 2.5
    });

    // after 1.8s start slow dissolve upward for all particles
    gsap.delayedCall(5.5, function () {
      startFinalDissolve();
    });
  }

  // ── Final dissolve + dispatch ended ───────────────────────────
  function startFinalDissolve() {
    // particles fade away naturally by slowing vy
    pool.forEach(function (p) { p.vy *= 0.3; });

    gsap.to('#ed-dissolve', {
      opacity: 1,
      duration: 3.8,
      ease: 'power1.inOut',
      delay: 1.2,
      onComplete: function () {
        running = false;
        document.dispatchEvent(new CustomEvent('glitch:ended'));
      }
    });

    // text fades up and out
    gsap.to('#ed-center, .ed-center', {
      opacity: 0,
      y: -22,
      duration: 2.8,
      ease: 'power1.inOut',
      delay: 1.6
    });

    gsap.to('.ed-center', {
      opacity: 0,
      y: -22,
      duration: 2.8,
      ease: 'power1.inOut',
      delay: 1.6
    });
  }

  // ── Interaction: tap name to burst particles ───────────────────
  document.getElementById('ed-name').addEventListener('click', function (e) {
    e.stopPropagation();
    const cx = W / 2, cy = H / 2;
    for (let i = 0; i < 20; i++) {
      const p    = mkPt(false);
      p.x        = cx + (Math.random() - 0.5) * 120;
      p.y        = cy + (Math.random() - 0.5) * 60;
      p.vy       = -(Math.random() * 2.2 + 0.9);
      p.vx       = (Math.random() - 0.5) * 1.4;
      p.r        = Math.random() * 3 + 1;
      p.op       = 0.7;
      pool.push(p);
      if (pool.length > TOTAL + 60) pool.shift();
    }
    gsap.to('#ed-name', {
      scale: 1.04,
      duration: 0.28,
      ease: 'power2.out',
      yoyo: true,
      repeat: 1
    });
  });

  // ── Song wrap hover ────────────────────────────────────────────
  const songWrap = document.getElementById('ed-song-wrap');
  songWrap.addEventListener('mouseenter', function () {
    gsap.to('#ed-song-icon', { scale: 1.18, duration: 0.35, ease: 'back.out(2)' });
    gsap.to('#ed-song-name', { opacity: 0.7, duration: 0.3 });
  });
  songWrap.addEventListener('mouseleave', function () {
    gsap.to('#ed-song-icon', { scale: 1,    duration: 0.4,  ease: 'power1.out' });
    gsap.to('#ed-song-name', { opacity: 1,  duration: 0.3 });
  });

  // ── glitch:enter ──────────────────────────────────────────────
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== INDEX) return;
    enterSection();
  });

})();
</script>
