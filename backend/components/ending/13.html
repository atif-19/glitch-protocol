<script>
(function () {
  let initialized = false;

  /* ── Film grain ── */
  function initGrain() {
    const canvas = document.getElementById('ecd004-grain');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
    resize();
    window.addEventListener('resize', resize);
    function tick() {
      const img = ctx.createImageData(W, H);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = Math.random() * 14;
      }
      ctx.putImageData(img, 0, 0);
      requestAnimationFrame(tick);
    }
    tick();
  }

  /* ── Word split ── */
  function splitWords() {
    const el = document.getElementById('ecd004-ending-line');
    if (!el) return;
    const text = el.textContent.trim();
    el.innerHTML = '';
    text.split(' ').forEach(w => {
      const s = document.createElement('span');
      s.className = 'ecd004-word';
      s.textContent = w;
      el.appendChild(s);
    });
  }

  /* ── Waveform ── */
  function animateWave() {
    const bars = document.querySelectorAll('.ecd004-wbar');
    const heights = [30, 65, 45, 90, 55, 75, 40, 60];
    bars.forEach((b, i) => {
      gsap.to(b, {
        height: (heights[i] * (0.2 + Math.random() * 0.8)) + '%',
        duration: 0.25 + Math.random() * 0.4,
        repeat: -1,
        yoyo: true,
        ease: 'power1.inOut',
        delay: Math.random() * 0.5
      });
    });
  }

  /* ── Border lines draw-in ── */
  function drawBorders() {
    gsap.to(['#ecd004-lt', '#ecd004-lb'], { width: '100%', opacity: 1, duration: 1.8, ease: 'power2.inOut', delay: 0.2 });
    gsap.to(['#ecd004-ll', '#ecd004-lr'], { height: '100%', opacity: 1, duration: 1.8, ease: 'power2.inOut', delay: 0.2 });
    gsap.to('#ecd004-dh', { width: '100%', opacity: 1, duration: 1.4, ease: 'power2.inOut', delay: 1.2 });
  }

  /* ── Ambient ── */
  function ambientLoop() {
    gsap.to('#ecd004-glow', {
      opacity: 0.22,
      scale: 1.1,
      duration: 4,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut'
    });

    gsap.to('.ecd004-name-inner', {
      filter: 'drop-shadow(0 0 70px var(--accent))',
      duration: 3.5,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 1
    });

    gsap.to('#ecd004-name-block', {
      y: -7,
      duration: 4.2,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 1.5
    });

    gsap.to('.ecd004-orn-diamond', {
      boxShadow: '0 0 22px var(--accent), 0 0 50px var(--accent)',
      opacity: 1,
      duration: 2.2,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut'
    });

    gsap.to('#ecd004-scanlines', {
      backgroundPositionY: '80px',
      duration: 10,
      repeat: -1,
      ease: 'none'
    });
  }

  /* ── Cursor react ── */
  function cursorReact() {
    const wrap = document.getElementById('ecd004-wrap');
    if (!wrap) return;
    wrap.addEventListener('mousemove', e => {
      const cx = e.clientX / window.innerWidth  - 0.5;
      const cy = e.clientY / window.innerHeight - 0.5;
      gsap.to('#ecd004-name-block', {
        x: cx * 14, y: cy * 9,
        duration: 2, ease: 'power2.out', overwrite: 'auto'
      });
      gsap.to('#ecd004-quote-wrap', {
        x: cx * -9, y: cy * -5,
        duration: 2.4, ease: 'power2.out'
      });
      gsap.to('#ecd004-glow', {
        x: cx * 50, y: cy * 36,
        duration: 2.2, ease: 'power2.out'
      });
      gsap.to('#ecd004-scanlines', {
        opacity: 0.02 + Math.abs(cx) * 0.05,
        duration: 0.4
      });
    });
  }

  /* ── Main entrance ── */
  function enter() {
    if (initialized) return;
    initialized = true;

    splitWords();
    initGrain();
    drawBorders();

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#ecd004-flash',    { opacity: 0.06, duration: 0.1 }, 0)
      .to('#ecd004-flash',    { opacity: 0, duration: 0.7 }, 0.1)

      .to('#ecd004-grain',    { opacity: 1, duration: 1 }, 0.4)
      .to('#ecd004-scanlines',{ opacity: 1, duration: 0.8 }, 0.5)
      .to('#ecd004-glow',     { opacity: 0.14, duration: 2.2, ease: 'power2.out' }, 0.3)

      .to(['#ecd004-ctl','#ecd004-ctr','#ecd004-cbl','#ecd004-cbr'],
          { opacity: 1, duration: 0.5, stagger: 0.1 }, 0.8)
      .to(['#ecd004-meta-tl','#ecd004-meta-br'],
          { opacity: 1, duration: 0.6, stagger: 0.2 }, 1.1)

      .to('#ecd004-super',      { opacity: 1, duration: 0.65 }, 1.4)
      .to('#ecd004-name-block', { opacity: 1, y: 0, duration: 1.1, ease: 'back.out(1.5)' }, 1.75)
      .to('#ecd004-ornament',   { opacity: 1, scaleX: 1, duration: 0.7, ease: 'power2.inOut' }, 2.3)

      .to('#ecd004-quote-wrap', { opacity: 1, duration: 0.01 }, 2.7)
      .to('.ecd004-word',       { opacity: 1, y: 0, duration: 0.5, stagger: 0.07, ease: 'power3.out' }, 2.75)

      .to('#ecd004-song-block', { opacity: 1, y: 0, duration: 0.75 }, 4.0)
      .to('#ecd004-stamp',      { opacity: 1, duration: 0.6 }, 4.4);

    tl.call(() => {
      animateWave();
      ambientLoop();
      cursorReact();
    }, null, 4.6);
  }

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 7) return;
    enter();
  });
})();
</script>
