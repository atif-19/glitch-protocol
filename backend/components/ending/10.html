<script>
(function () {
  let initialized = false;

  /* ── Snow canvas ── */
  function initSnow() {
    const canvas = document.getElementById('ed004-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H;
    const flakes = [];
    const FLAKE_CHARS = ['❄', '❅', '❆', '·', '•', '∗'];

    function resize() {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COUNT = Math.min(120, Math.floor(window.innerWidth * 0.1));
    for (let i = 0; i < COUNT; i++) {
      flakes.push(makeFlake(true));
    }

    function makeFlake(random) {
      const size = Math.random() * 14 + 4;
      return {
        x: Math.random() * (W || window.innerWidth),
        y: random ? Math.random() * (H || window.innerHeight) : -(size * 2),
        size,
        char: FLAKE_CHARS[Math.floor(Math.random() * FLAKE_CHARS.length)],
        opacity: Math.random() * 0.45 + 0.08,
        speed: Math.random() * 0.6 + 0.2,
        drift: Math.random() * 0.5 - 0.25,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: Math.random() * 0.012 + 0.004,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.008,
        blur: Math.random() > 0.65 ? Math.random() * 1.5 : 0
      };
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      flakes.forEach(f => {
        f.wobble += f.wobbleSpeed;
        f.rotation += f.rotSpeed;
        f.x += Math.sin(f.wobble) * f.drift + (Math.sin(f.wobble * 0.3) * 0.18);
        f.y += f.speed;

        if (f.y > H + 20) {
          Object.assign(f, makeFlake(false));
        }

        ctx.save();
        ctx.globalAlpha = f.opacity;
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rotation);
        if (f.blur > 0) ctx.filter = `blur(${f.blur}px)`;
        ctx.fillStyle = '#d4eaff';
        ctx.font = `${f.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(f.char, 0, 0);
        ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  /* ── Rings ── */
  function animateRings() {
    gsap.to('#ed004-ring-a', {
      opacity: 1, scale: 1, duration: 2, ease: 'power2.out', delay: 0.6
    });
    gsap.to('#ed004-ring-b', {
      opacity: 1, scale: 1, duration: 2.2, ease: 'power2.out', delay: 0.9
    });
    gsap.to('#ed004-ring-c', {
      opacity: 1, scale: 1, duration: 2.5, ease: 'power2.out', delay: 0.4
    });

    gsap.to('#ed004-ring-a', {
      scale: 1.04, opacity: 0.7, duration: 5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3
    });
    gsap.to('#ed004-ring-b', {
      scale: 0.95, opacity: 0.5, duration: 4.5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.5
    });
    gsap.to('#ed004-ring-c', {
      scale: 1.025, opacity: 0.4, duration: 6, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 3.2
    });

    gsap.to('#ed004-ring-a', {
      rotation: 360, duration: 35, repeat: -1, ease: 'none', transformOrigin: 'center center'
    });
    gsap.to('#ed004-ring-b', {
      rotation: -360, duration: 22, repeat: -1, ease: 'none', transformOrigin: 'center center'
    });
    gsap.to('#ed004-ring-c', {
      rotation: 360, duration: 50, repeat: -1, ease: 'none', transformOrigin: 'center center'
    });
  }

  /* ── Ambient ── */
  function ambientLoop() {
    gsap.to('#ed004-glow-orb', {
      opacity: 0.85, scale: 1.08, duration: 4, repeat: -1, yoyo: true, ease: 'sine.inOut'
    });
    gsap.to('#ed004-name-wrap', {
      y: -9, duration: 4.5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1
    });
    gsap.to('#ed004-name-wrap', {
      filter: 'drop-shadow(0 0 70px var(--accent))',
      duration: 3.5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1.5
    });
    gsap.to('#ed004-flake', {
      rotation: 360, duration: 18, repeat: -1, ease: 'none', transformOrigin: 'center center'
    });
    gsap.to('#ed004-flake', {
      y: -5, duration: 2.5, repeat: -1, yoyo: true, ease: 'sine.inOut'
    });
    gsap.to('#ed004-snow-orb', {
      boxShadow: '0 0 45px rgba(180,210,255,0.7), 0 0 90px var(--accent)',
      duration: 2.6, repeat: -1, yoyo: true, ease: 'sine.inOut'
    });
  }

  /* ── Cursor ── */
  function cursorReact() {
    const wrap = document.getElementById('ed004-wrap');
    if (!wrap) return;
    wrap.addEventListener('mousemove', (e) => {
      const cx = e.clientX / window.innerWidth - 0.5;
      const cy = e.clientY / window.innerHeight - 0.5;
      gsap.to('#ed004-name-wrap', {
        x: cx * 16, y: cy * 11,
        duration: 1.8, ease: 'power2.out', overwrite: 'auto'
      });
      gsap.to('#ed004-ring-a', {
        x: cx * 28, y: cy * 20,
        duration: 2.2, ease: 'power2.out'
      });
      gsap.to('#ed004-ring-b', {
        x: cx * -20, y: cy * -15,
        duration: 2.6, ease: 'power2.out'
      });
      gsap.to('#ed004-glow-orb', {
        x: cx * 35, y: cy * 25,
        duration: 2, ease: 'power2.out'
      });
    });
  }

  /* ── Main entrance ── */
  function enter() {
    if (initialized) return;
    initialized = true;

    initSnow();
    animateRings();

    gsap.to('#ed004-glow-orb', { opacity: 0.6, duration: 2.5, ease: 'power2.out' });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#ed004-flake',      { opacity: 1, y: 0, rotation: 0, duration: 0.8 }, 0.3)
      .to('#ed004-eyebrow',    { opacity: 1, y: 0, duration: 0.75 }, 0.65)
      .to('#ed004-name-wrap',  { opacity: 1, y: 0, scale: 1, duration: 1.2, ease: 'back.out(1.6)' }, 0.95)
      .to('#ed004-divider',    { opacity: 1, scaleX: 1, duration: 0.75, ease: 'power2.inOut' }, 1.5)
      .to('#ed004-ending-line',{ opacity: 1, y: 0, duration: 0.9 }, 1.82)
      .to('#ed004-glass-card', { opacity: 1, y: 0, duration: 0.8 }, 2.2)
      .to('#ed004-bottom',     { opacity: 1, duration: 0.65 }, 2.6);

    tl.call(() => {
      ambientLoop();
      cursorReact();
    }, null, 2.8);
  }

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 7) return;
    enter();
  });
})();
</script>
