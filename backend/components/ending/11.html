<script>
(function () {
  let initialized = false;

  /* ── Film grain noise ── */
  function initNoise() {
    const canvas = document.getElementById('ec002-noise');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function drawGrain() {
      const img = ctx.createImageData(W, H);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = Math.random() * 18;
      }
      ctx.putImageData(img, 0, 0);
      requestAnimationFrame(drawGrain);
    }
    drawGrain();
  }

  /* ── Timecode counter ── */
  function startTimecode() {
    const el = document.getElementById('ec002-timecode');
    if (!el) return;
    let f = 0;
    setInterval(() => {
      f++;
      const fr = f % 24;
      const sec = Math.floor(f / 24) % 60;
      const min = Math.floor(f / 1440) % 60;
      const hr = Math.floor(f / 86400);
      el.textContent =
        String(hr).padStart(2,'0') + ':' +
        String(min).padStart(2,'0') + ':' +
        String(sec).padStart(2,'0') + ':' +
        String(fr).padStart(2,'0');
    }, 42);
  }

  /* ── Word-by-word reveal ── */
  function wrapWords() {
    const el = document.getElementById('ec002-ending-line');
    if (!el) return;
    const text = el.textContent.trim();
    el.innerHTML = '';
    text.split(' ').forEach(word => {
      const span = document.createElement('span');
      span.className = 'ec002-word';
      span.textContent = word;
      el.appendChild(span);
    });
  }

  /* ── Audio bar ambient ── */
  function animateBars() {
    const bars = ['#ec002-bar1','#ec002-bar2','#ec002-bar3','#ec002-bar4','#ec002-bar5','#ec002-bar6'];
    const heights = [35, 70, 55, 90, 45, 65];
    bars.forEach((sel, i) => {
      gsap.to(sel, {
        height: (heights[i] * (0.3 + Math.random() * 0.7)) + '%',
        duration: 0.28 + Math.random() * 0.35,
        repeat: -1,
        yoyo: true,
        ease: 'power1.inOut',
        delay: Math.random() * 0.4
      });
    });
  }

  /* ── Cursor presence ── */
  function cursorReact() {
    const wrap = document.getElementById('ec002-wrap');
    if (!wrap) return;
    wrap.addEventListener('mousemove', e => {
      const cx = e.clientX / window.innerWidth - 0.5;
      const cy = e.clientY / window.innerHeight - 0.5;
      gsap.to('#ec002-quote-block', {
        x: cx * 10, y: cy * 6,
        duration: 2.2, ease: 'power2.out'
      });
      gsap.to('#ec002-name-block', {
        x: cx * -7, y: cy * -4,
        duration: 2.5, ease: 'power2.out'
      });
      gsap.to('#ec002-scanline', {
        opacity: 0.025 + Math.abs(cx) * 0.04,
        duration: 0.5
      });
    });
  }

  /* ── Main entrance ── */
  function enter() {
    if (initialized) return;
    initialized = true;

    wrapWords();
    initNoise();

    const tl = gsap.timeline({ defaults: { ease: 'power2.out' } });

    /* curtains pull apart like a cinema screen */
    tl.to('#ec002-curtain-top', { y: '-100%', duration: 1.6, ease: 'power3.inOut' }, 0)
      .to('#ec002-curtain-bot', { y: '100%',  duration: 1.6, ease: 'power3.inOut' }, 0)

      /* letterbox bars drop in */
      .to(['#ec002-lb-top','#ec002-lb-bot'], { opacity: 1, duration: 0.5 }, 1.0)

      /* UI chrome fades */
      .to('#ec002-scanline', { opacity: 1, duration: 0.8 }, 1.2)
      .to('#ec002-noise',    { opacity: 1, duration: 0.8 }, 1.2)
      .to(['#ec002-timecode','#ec002-reel','#ec002-bottom-code'], { opacity: 1, duration: 0.7, stagger: 0.15 }, 1.3)
      .to(['#ec002-ctleft','#ec002-ctr','#ec002-cbl','#ec002-cbr'], { opacity: 1, duration: 0.6, stagger: 0.08 }, 1.5)

      /* pre-line */
      .to('#ec002-pre', { opacity: 1, duration: 0.7 }, 1.8)

      /* quote block container */
      .to('#ec002-quote-block', { opacity: 1, duration: 0.01 }, 2.3)

      /* words appear one by one */
      .to('.ec002-word', {
        opacity: 1, y: 0,
        duration: 0.55,
        stagger: 0.08,
        ease: 'power3.out'
      }, 2.35)

      /* rule + name + song */
      .to('#ec002-rule',        { opacity: 1, duration: 0.7, ease: 'power2.inOut' }, 3.6)
      .to('#ec002-name-block',  { opacity: 1, y: 0, duration: 0.9, ease: 'back.out(1.6)' }, 4.0)
      .to('#ec002-song-strip',  { opacity: 1, y: 0, duration: 0.7 }, 4.5);

    tl.call(() => {
      startTimecode();
      animateBars();
      cursorReact();

      /* name breathe */
      gsap.to('#ec002-name-block', {
        filter: 'drop-shadow(0 0 55px var(--accent))',
        duration: 3.2, repeat: -1, yoyo: true, ease: 'sine.inOut'
      });

      /* rule dot pulse */
      gsap.to('#ec002-rule .ec002-rule-center', {
        boxShadow: '0 0 18px var(--accent), 0 0 40px var(--accent)',
        opacity: 1,
        duration: 2, repeat: -1, yoyo: true, ease: 'sine.inOut'
      });

      /* scanline drift */
      gsap.to('#ec002-scanline', {
        backgroundPositionY: '100px',
        duration: 8, repeat: -1, ease: 'none'
      });
    }, null, 4.8);
  }

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 7) return;
    enter();
  });
})();
</script>
