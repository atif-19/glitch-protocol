<!--
  Component: hero-harrypotter-004
  Type: hero
  Aesthetic: dark lord
  Obsession: Harry Potter
  Tone: ominous, redemptive, cinematic
  Occasion: apology
  Variables: --RECIPIENT_NAME-- --TITLE-- --SUBTITLE-- --ACCENT_WORD--
-->
<style>
  #hero-harrypotter-004 {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    font-family: var(--font-body);
  }

  #hero-harrypotter-004 .h4-canvas-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  #hero-harrypotter-004 .h4-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%,
        color-mix(in srgb, var(--primary) 25%, transparent), transparent 65%),
      radial-gradient(ellipse 35% 25% at 15% 85%,
        color-mix(in srgb, var(--accent) 8%, transparent), transparent 55%),
      radial-gradient(ellipse 28% 22% at 85% 12%,
        color-mix(in srgb, var(--primary) 9%, transparent), transparent 50%),
      radial-gradient(ellipse 50% 20% at 50% 100%,
        color-mix(in srgb, var(--primary) 20%, transparent), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #hero-harrypotter-004 .h4-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 85% 85% at 50% 50%,
      transparent 20%,
      color-mix(in srgb, var(--bg) 70%, transparent) 70%,
      color-mix(in srgb, var(--bg) 97%, transparent) 100%);
    pointer-events: none;
    z-index: 4;
  }

  /* crack lines emanating from center */
  #hero-harrypotter-004 .h4-cracks {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
  }

  #hero-harrypotter-004 .h4-cracks svg {
    width: 100%;
    height: 100%;
  }

  /* dark mark / serpent sigil */
  #hero-harrypotter-004 .h4-sigil-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    width: clamp(280px, 55vw, 520px);
    height: clamp(280px, 55vw, 520px);
  }

  #hero-harrypotter-004 .h4-sigil-wrap svg {
    width: 100%;
    height: 100%;
  }

  /* center content */
  #hero-harrypotter-004 .h4-center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(1.5rem, 5vw, 3rem);
    max-width: min(800px, 90vw);
    gap: clamp(0.6rem, 1.5vw, 1.1rem);
  }

  #hero-harrypotter-004 .h4-eyebrow {
    font-size: clamp(0.52rem, 1vw, 0.64rem);
    letter-spacing: 0.46em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
  }

  #hero-harrypotter-004 .h4-name-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #hero-harrypotter-004 .h4-name {
    font-family: var(--font-heading);
    font-size: clamp(3.2rem, 11vw, 8.5rem);
    font-weight: 400;
    color: var(--text);
    line-height: 0.88;
    letter-spacing: -0.02em;
    opacity: 0;
    position: relative;
    z-index: 2;
  }

  /* name glitch layers */
  #hero-harrypotter-004 .h4-name-ghost {
    position: absolute;
    top: 0; left: 0;
    font-family: var(--font-heading);
    font-size: clamp(3.2rem, 11vw, 8.5rem);
    font-weight: 400;
    line-height: 0.88;
    letter-spacing: -0.02em;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  #hero-harrypotter-004 .h4-name-ghost-a {
    color: color-mix(in srgb, var(--accent) 40%, transparent);
    transform: translate(-3px, 1px);
  }

  #hero-harrypotter-004 .h4-name-ghost-b {
    color: color-mix(in srgb, var(--primary) 50%, transparent);
    transform: translate(3px, -1px);
  }

  #hero-harrypotter-004 .h4-divider {
    display: flex;
    align-items: center;
    gap: clamp(0.6rem, 1.4vw, 1.1rem);
    opacity: 0;
    width: min(380px, 80vw);
  }

  #hero-harrypotter-004 .h4-div-line {
    flex: 1;
    height: 1px;
    background: color-mix(in srgb, var(--primary) 30%, transparent);
  }

  #hero-harrypotter-004 .h4-div-rune {
    font-family: var(--font-heading);
    font-size: clamp(0.65rem, 1.2vw, 0.82rem);
    color: color-mix(in srgb, var(--accent) 55%, transparent);
    letter-spacing: 0.2em;
  }

  #hero-harrypotter-004 .h4-title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(0.25rem, 0.6vw, 0.5rem);
    opacity: 0;
  }

  #hero-harrypotter-004 .h4-title {
    font-family: var(--font-heading);
    font-size: clamp(0.88rem, 2.1vw, 1.4rem);
    font-weight: 400;
    color: color-mix(in srgb, var(--text) 72%, transparent);
    letter-spacing: 0.1em;
  }

  #hero-harrypotter-004 .h4-subtitle {
    font-family: var(--font-body);
    font-size: clamp(0.68rem, 1.4vw, 0.88rem);
    color: color-mix(in srgb, var(--text) 42%, transparent);
    letter-spacing: 0.06em;
    font-style: italic;
  }

  #hero-harrypotter-004 .h4-accent {
    color: var(--accent);
    font-style: normal;
  }

  /* redemption arc line */
  #hero-harrypotter-004 .h4-redemption {
    margin-top: clamp(0.4rem, 1vw, 0.8rem);
    display: flex;
    align-items: center;
    gap: clamp(0.5rem, 1.2vw, 0.9rem);
    opacity: 0;
  }

  #hero-harrypotter-004 .h4-red-line {
    width: clamp(20px, 3.5vw, 36px);
    height: 0.5px;
    background: color-mix(in srgb, var(--accent) 40%, transparent);
  }

  #hero-harrypotter-004 .h4-red-text {
    font-size: clamp(0.5rem, 0.9vw, 0.6rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--accent) 55%, transparent);
    font-family: var(--font-body);
  }

  #hero-harrypotter-004 .h4-cta {
    font-size: clamp(0.52rem, 0.95vw, 0.62rem);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--text) 28%, transparent);
    opacity: 0;
    margin-top: clamp(0.4rem, 1vw, 0.8rem);
  }

  /* smoke wisp elements */
  #hero-harrypotter-004 .h4-wisp {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    filter: blur(18px);
  }

  /* glitch flash overlay */
  #hero-harrypotter-004 .h4-flash {
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }

  @keyframes h4-glitch-skew {
    0%,100% { transform: skewX(0deg); }
    20%     { transform: skewX(-2deg); }
    40%     { transform: skewX(1.5deg); }
    60%     { transform: skewX(-1deg); }
    80%     { transform: skewX(0.5deg); }
  }
</style>

<div class="h4-name-wrap" id="h4-name-wrap">
  <span class="h4-name-ghost h4-name-ghost-a" id="h4-ghost-a" aria-hidden="true">--RECIPIENT_NAME--</span>

<script>
(function () {
  const INDEX = 1;

  // ── Canvas particles ───────────────────────────────────────────
  const canvas = document.getElementById('h4-canvas-bg');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const TOTAL = 100;
  const pool  = [];

  function mkPt(boot) {
    return {
      x:  Math.random() * (W || 800),
      y:  boot ? Math.random() * (H || 800) : (H || 800) + 8,
      r:  Math.random() * 1.4 + 0.2,
      vx: (Math.random() - 0.5) * 0.12,
      vy: -(Math.random() * 0.18 + 0.03),
      op: Math.random() * 0.42 + 0.06,
      ts: Math.random() * 0.012 + 0.004,
      tp: Math.random() * Math.PI * 2,
      red: Math.random() > 0.75
    };
  }

  for (let i = 0; i < TOTAL; i++) pool.push(mkPt(true));

  let running = false;

  function tick() {
    ctx.clearRect(0, 0, W, H);
    const t = performance.now() * 0.001;
    for (let i = 0; i < pool.length; i++) {
      const p = pool[i];
      p.x += p.vx; p.y += p.vy;
      if (p.y < -8) { pool[i] = mkPt(false); continue; }
      const fl  = 0.38 + 0.62 * Math.sin(t * p.ts * 60 + p.tp);
      const col = p.red
        ? 'rgba(200,80,80,' + (p.op * fl * 0.6).toFixed(3) + ')'
        : 'rgba(160,120,255,' + (p.op * fl).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.2832);
      ctx.fillStyle = col;
      ctx.fill();
    }
    if (running) requestAnimationFrame(tick);
  }

  // ── Glitch effect on name ──────────────────────────────────────
  let glitchInterval = null;

  function triggerGlitch() {
    const ghostA = document.getElementById('h4-ghost-a');
    const ghostB = document.getElementById('h4-ghost-b');
    const name   = document.getElementById('h4-name');

    const glitchTl = gsap.timeline();
    glitchTl
      .to([ghostA, ghostB], { opacity: 0.55, duration: 0.04 })
      .to(name,             { skewX: -2, duration: 0.04 })
      .to(ghostA,           { x: -5, duration: 0.04 })
      .to(ghostB,           { x:  5, duration: 0.04 })
      .to([ghostA, ghostB], { opacity: 0,  duration: 0.06 })
      .to(name,             { skewX: 0,   duration: 0.06 })
      .to([ghostA, ghostB], { x: 0,       duration: 0.02 });
  }

  function startGlitchLoop() {
    glitchInterval = setInterval(function () {
      if (Math.random() > 0.55) triggerGlitch();
    }, 2800);
  }

  // ── Wisp animations ────────────────────────────────────────────
  function animateWisps() {
    gsap.to('#h4-wisp-a', {
      opacity: 0.7, x: 20, y: -18,
      duration: 5.5, repeat: -1, yoyo: true, ease: 'sine.inOut'
    });
    gsap.to('#h4-wisp-b', {
      opacity: 0.5, x: -15, y: 22,
      duration: 7.2, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1.2
    });
    gsap.to('#h4-wisp-c', {
      opacity: 0.4, x: 10, y: -12,
      duration: 4.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 2.1
    });
  }

  // ── Entrance ───────────────────────────────────────────────────
  function enterSection() {
    running = true;
    tick();
    animateWisps();

    gsap.set([
      '#h4-eyebrow','#h4-name','#h4-ghost-a','#h4-ghost-b',
      '#h4-divider','#h4-title-block','#h4-redemption','#h4-cta'
    ], { opacity: 0, y: 18 });

    gsap.set('#h4-sigil-wrap', { opacity: 0, scale: 0.7, rotation: -15 });
    gsap.set('#h4-cracks',     { opacity: 0 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // flash in
    tl.to('#h4-flash', { opacity: 0.06, duration: 0.08, yoyo: true, repeat: 1 }, 0)

      // sigil materialises
      .to('#h4-sigil-wrap', {
          opacity: 1,
          scale: 1,
          rotation: 0,
          duration: 1.6,
          ease: 'power2.out'
        }, 0.1)

      // cracks spread
      .to('#h4-cracks', { opacity: 1, duration: 1.2, ease: 'power1.out' }, 0.4)

      // eyebrow
      .to('#h4-eyebrow', { opacity: 1, y: 0, duration: 0.8 }, 0.7)

      // name slams in
      .to('#h4-name', {
          opacity: 1, y: 0,
          duration: 0.9,
          ease: 'power4.out'
        }, 1.1)

      // first glitch right after name lands
      .call(triggerGlitch, [], 2.05)

      .to('#h4-divider',     { opacity: 1, y: 0, duration: 0.7 }, 1.5)
      .to('#h4-title-block', { opacity: 1, y: 0, duration: 0.75 }, 1.75)
      .to('#h4-redemption',  { opacity: 1, y: 0, duration: 0.8  }, 2.05)
      .to('#h4-cta',         { opacity: 1, y: 0, duration: 0.7  }, 2.35)

      // start recurring glitch
      .call(startGlitchLoop, [], 2.5);

    // ── Ambient: sigil slow dual-axis rotation ─────────────────────
    gsap.to('#h4-sigil-wrap', {
      rotation: 360,
      duration: 80,
      repeat: -1,
      ease: 'none',
      transformOrigin: '50% 50%',
      delay: 2
    });

    // ── Ambient: name breathe ──────────────────────────────────────
    gsap.to('#h4-name', {
      opacity: 0.84,
      duration: 4,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 3
    });

    // ── Ambient: redemption line pulse ─────────────────────────────
    gsap.to('#h4-redemption', {
      opacity: 0.45,
      duration: 3.2,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 3.5
    });
  }

  // ── Interaction: tap name to glitch ──────────────────────────
  document.getElementById('h4-name-wrap').addEventListener('click', function (e) {
    e.stopPropagation();
    triggerGlitch();
    triggerGlitch();
    gsap.to('#h4-flash', {
      opacity: 0.04,
      duration: 0.06,
      yoyo: true,
      repeat: 1
    });
    for (let i = 0; i < 14; i++) {
      const p = mkPt(false);
      p.x   = W / 2 + (Math.random() - 0.5) * 100;
      p.y   = H / 2 + (Math.random() - 0.5) * 50;
      p.vy  = -(Math.random() * 2 + 0.8);
      p.red = Math.random() > 0.4;
      pool.push(p);
      if (pool.length > TOTAL + 30) pool.shift();
    }
  });

  // ── Hover: name pressurises ───────────────────────────────────
  document.getElementById('h4-name').addEventListener('mouseenter', function () {
    gsap.to('#h4-name', { scale: 1.03, duration: 0.4, ease: 'power2.out' });
  });
  document.getElementById('h4-name').addEventListener('mouseleave', function () {
    gsap.to('#h4-name', { scale: 1,    duration: 0.5, ease: 'power1.out' });
  });

  // ── Advance ────────────────────────────────────────────────────
  document.getElementById('hero-harrypotter-004').addEventListener('click', function () {
    clearInterval(glitchInterval);
    gsap.to('#hero-harrypotter-004', {
      opacity: 0,
      duration: 0.85,
      ease: 'power2.in',
      onComplete: function () {
        running = false;
        if (window.glitchEvents) window.glitchEvents.advance();
      }
    });
  });

  // ── glitch:enter ──────────────────────────────────────────────
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== INDEX) return;
    enterSection();
  });

})();
</script>
