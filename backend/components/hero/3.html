<style>
  #hero-harrypotter-003 {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    font-family: var(--font-body);
  }#hero-harrypotter-003 .hhp3-canvas-bg {
position: absolute;
inset: 0;
z-index: 1;
pointer-events: none;
}#hero-harrypotter-003 .hhp3-canvas-stars {
position: absolute;
inset: 0;
z-index: 2;
pointer-events: none;
}#hero-harrypotter-003 .hhp3-glow {
position: absolute;
inset: 0;
background:
radial-gradient(ellipse 70% 40% at 50% 100%,
color-mix(in srgb, var(--primary) 30%, transparent), transparent 65%),
radial-gradient(ellipse 40% 35% at 50% 60%,
color-mix(in srgb, var(--accent) 10%, transparent), transparent 60%),
radial-gradient(ellipse 30% 20% at 20% 30%,
color-mix(in srgb, var(--primary) 8%, transparent), transparent 55%),
radial-gradient(ellipse 25% 18% at 80% 25%,
color-mix(in srgb, var(--primary) 7%, transparent), transparent 50%);
pointer-events: none;
z-index: 0;
}#hero-harrypotter-003 .hhp3-vignette {
position: absolute;
inset: 0;

transparent 20%, color-mix(in srgb, var(--bg) 75%, transparent) 75%,
color-mix(in srgb, var(--bg) 96%, transparent) 100%);

}/* castle silhouette layer */
#hero-harrypotter-003 .hhp3-castle-wrap {
position: absolute;

pointer-events: none;

}#hero-harrypotter-003 .hhp3-castle-wrap svg {
width: 100%;

}/* window glow dots on castle */
#hero-harrypotter-003 .hhp3-win {
animation: hhp3-wink 0s ease-in-out infinite alternate;
}@keyframes hhp3-wink {
0%   { opacity: 0.5; }
100% { opacity: 1;   }
}/* center content */
#hero-harrypotter-003 .hhp3-center {
position: relative;

}#hero-harrypotter-003 .hhp3-banner {

}#hero-harrypotter-003 .hhp3-banner-line {

}#hero-harrypotter-003 .hhp3-name {

}#hero-harrypotter-003 .hhp3-name-glow {

}#hero-harrypotter-003 .hhp3-title-wrap {
display: flex;
flex-direction: column;
align-items: center;
gap: clamp(0.3rem, 0.8vw, 0.6rem);
opacity: 0;
}#hero-harrypotter-003 .hhp3-title {
font-family: var(--font-heading);
font-size: clamp(0.85rem, 2vw, 1.35rem);
font-weight: 400;
color: color-mix(in srgb, var(--text) 75%, transparent);
letter-spacing: 0.12em;
}#hero-harrypotter-003 .hhp3-subtitle {
font-family: var(--font-body);
font-size: clamp(0.7rem, 1.4vw, 0.9rem);
color: color-mix(in srgb, var(--text) 45%, transparent);
letter-spacing: 0.06em;
font-style: italic;
}#hero-harrypotter-003 .hhp3-accent {
color: var(--accent);
font-style: normal;
}#hero-harrypotter-003 .hhp3-seal-row {
display: flex;
align-items: center;
gap: clamp(0.6rem, 1.4vw, 1.1rem);
opacity: 0;
margin-top: clamp(0.3rem, 0.8vw, 0.6rem);
}#hero-harrypotter-003 .hhp3-seal-line {
width: clamp(24px, 4.5vw, 44px);
height: 0.5px;
background: color-mix(in srgb, var(--primary) 35%, transparent);
}#hero-harrypotter-003 .hhp3-seal-icon {
width: clamp(20px, 3.2vw, 28px);
height: clamp(20px, 3.2vw, 28px);
opacity: 0.65;
}#hero-harrypotter-003 .hhp3-cta {
font-size: clamp(0.52rem, 0.95vw, 0.62rem);
letter-spacing: 0.32em;
text-transform: uppercase;
color: color-mix(in srgb, var(--text) 28%, transparent);
opacity: 0;
margin-top: clamp(0.5rem, 1.2vw, 1rem);
}/* birthday candle sparks */
#hero-harrypotter-003 .hhp3-spark {
position: absolute;
width: 3px;
height: 3px;
border-radius: 50%;
background: var(--accent);
pointer-events: none;
z-index: 11;
opacity: 0;
}@keyframes hhp3-float-up {
0%   { transform: translateY(0) scale(1); opacity: 0.9; }
100% { transform: translateY(-60px) scale(0); opacity: 0; }
}

<script>
(function () {
  const INDEX = 1;

  // ── Starfield canvas ───────────────────────────────────────────
  const cStars = document.getElementById('hhp3-canvas-stars');
  const sCtx   = cStars.getContext('2d');

  // ── Firefly / dust canvas ──────────────────────────────────────
  const cBg  = document.getElementById('hhp3-canvas-bg');
  const bCtx = cBg.getContext('2d');

  let W, H;

  function resize() {
    W = cStars.width = cBg.width  = window.innerWidth;
    H = cStars.height = cBg.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Stars (fixed twinkle) ──────────────────────────────────────
  const STAR_COUNT = 180;
  const stars = [];

  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x:  Math.random(),
      y:  Math.random() * 0.75,
      r:  Math.random() * 1.2 + 0.2,
      op: Math.random() * 0.6 + 0.1,
      ts: Math.random() * 0.018 + 0.005,
      tp: Math.random() * Math.PI * 2
    });
  }

  // ── Dust particles ─────────────────────────────────────────────
  const DUST_COUNT = 90;
  const dust = [];

  function mkDust(boot) {
    return {
      x:  Math.random() * (W || 800),
      y:  boot ? Math.random() * (H || 800) : (H || 800) + 8,
      r:  Math.random() * 1.6 + 0.2,
      vx: (Math.random() - 0.5) * 0.14,
      vy: -(Math.random() * 0.2 + 0.04),
      op: Math.random() * 0.45 + 0.07,
      ts: Math.random() * 0.012 + 0.004,
      tp: Math.random() * Math.PI * 2
    };
  }

  for (let i = 0; i < DUST_COUNT; i++) dust.push(mkDust(true));

  let running = false;

  function drawStars(t) {
    sCtx.clearRect(0, 0, W, H);
    for (let i = 0; i < stars.length; i++) {
      const s  = stars[i];
      const fl = 0.35 + 0.65 * Math.sin(t * s.ts * 60 + s.tp);
      sCtx.beginPath();
      sCtx.arc(s.x * W, s.y * H, s.r, 0, 6.2832);
      sCtx.fillStyle = 'rgba(220,200,255,' + (s.op * fl).toFixed(3) + ')';
      sCtx.fill();
    }
  }

  function drawDust(t) {
    bCtx.clearRect(0, 0, W, H);
    for (let i = 0; i < dust.length; i++) {
      const p = dust[i];
      p.x += p.vx; p.y += p.vy;
      if (p.y < -8) { dust[i] = mkDust(false); continue; }
      const fl = 0.4 + 0.6 * Math.sin(t * p.ts * 60 + p.tp);
      bCtx.beginPath();
      bCtx.arc(p.x, p.y, p.r, 0, 6.2832);
      bCtx.fillStyle = 'rgba(178,140,255,' + (p.op * fl).toFixed(3) + ')';
      bCtx.fill();
    }
  }

  function loop() {
    const t = performance.now() * 0.001;
    drawStars(t);
    drawDust(t);
    if (running) requestAnimationFrame(loop);
  }

  // ── Birthday spark burst ───────────────────────────────────────
  function spawnSparks() {
    const section = document.getElementById('hero-harrypotter-003');
    for (let i = 0; i < 10; i++) {
      const sp = document.createElement('div');
      sp.className = 'hhp3-spark';
      const cx = 40 + Math.random() * 60;
      const cy = 20 + Math.random() * 55;
      sp.style.left = cx + '%';
      sp.style.top  = cy + '%';
      section.appendChild(sp);
      gsap.to(sp, {
        opacity: 0.9,
        y: -(Math.random() * 55 + 20),
        x: (Math.random() - 0.5) * 30,
        scale: Math.random() * 0.8 + 0.4,
        duration: Math.random() * 1.4 + 0.8,
        delay: Math.random() * 2.5 + 1.5,
        ease: 'power2.out',
        onComplete: function () { sp.remove(); }
      });
    }
  }

  // ── Entrance sequence ──────────────────────────────────────────
  function enterSection() {
    running = true;
    loop();

    gsap.set(['#hhp3-eyebrow','#hhp3-banner','#hhp3-name','#hhp3-title-wrap','#hhp3-seal-row','#hhp3-cta'],
             { opacity: 0, y: 16 });
    gsap.set('#hhp3-castle-wrap', { opacity: 0, y: 40 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // castle rises from bottom
    tl.to('#hhp3-castle-wrap', {
        opacity: 1, y: 0, duration: 1.6, ease: 'power2.out'
      }, 0.2)

      // text cascade
      .to('#hhp3-eyebrow',    { opacity: 1, y: 0, duration: 0.7 }, 0.6)
      .to('#hhp3-banner',     { opacity: 1, y: 0, duration: 0.7 }, 0.85)
      .to('#hhp3-name',       { opacity: 1, y: 0, duration: 1.0, ease: 'power4.out' }, 1.05)
      .to('#hhp3-title-wrap', { opacity: 1, y: 0, duration: 0.8 }, 1.45)
      .to('#hhp3-seal-row',   { opacity: 1, y: 0, duration: 0.7 }, 1.7)
      .to('#hhp3-cta',        { opacity: 1, y: 0, duration: 0.7 }, 2.0)

      // seal icon spins in
      .to('.hhp3-seal-icon', {
          rotation: 360,
          duration: 1.2,
          ease: 'back.out(1.3)',
          transformOrigin: '50% 50%'
        }, 1.65)

      // birthday sparks after reveal
      .call(spawnSparks, [], 1.8);

    // ── Ambient: castle breathes ──────────────────────────────────
    gsap.to('#hhp3-castle-wrap', {
      y: -6,
      duration: 6,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 2.5
    });

    // ── Ambient: name subtle glow pulse ───────────────────────────
    gsap.to('#hhp3-name', {
      opacity: 0.85,
      duration: 3.5,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 3
    });

    // ── Ambient: seal continuous slow spin ────────────────────────
    gsap.to('.hhp3-seal-icon', {
      rotation: 360,
      duration: 40,
      repeat: -1,
      ease: 'none',
      transformOrigin: '50% 50%',
      delay: 3
    });

    // ── Ambient: banner star twinkle ──────────────────────────────
    gsap.to('.hhp3-banner-star', {
      scale: 1.5,
      opacity: 1,
      duration: 1.4,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 2.2
    });

    // recurring sparks every 4s
    setInterval(function () {
      if (running) spawnSparks();
    }, 4000);
  }

  // ── Interaction: tap name shimmers ────────────────────────────
  document.getElementById('hhp3-name').addEventListener('click', function (e) {
    e.stopPropagation();
    gsap.to('#hhp3-name', {
      scale: 1.05,
      duration: 0.24,
      ease: 'power2.out',
      yoyo: true,
      repeat: 1,
      onComplete: function () { gsap.set('#hhp3-name', { scale: 1 }); }
    });
    spawnSparks();
  });

  // ── Hover: name lifts ──────────────────────────────────────────
  document.getElementById('hhp3-name').addEventListener('mouseenter', function () {
    gsap.to('#hhp3-name', { y: -5, duration: 0.4, ease: 'power2.out' });
  });
  document.getElementById('hhp3-name').addEventListener('mouseleave', function () {
    gsap.to('#hhp3-name', { y: 0,  duration: 0.5, ease: 'power1.out' });
  });

  // ── Advance on click ───────────────────────────────────────────
  document.getElementById('hero-harrypotter-003').addEventListener('click', function () {
    gsap.to('#hero-harrypotter-003', {
      opacity: 0,
      duration: 0.85,
      ease: 'power2.in',
      onComplete: function () {
        running = false;
        if (window.glitchEvents) window.glitchEvents.advance();
      }
    });
  });

  // ── glitch:enter ──────────────────────────────────────────────
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== INDEX) return;
    enterSection();
  });

})();
</script>
