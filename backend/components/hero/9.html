<script>
(function () {
  const section = document.getElementById('hero-cottagecore-001');

  // Falling petals
  const petalSymbols = ['✿', '❀', '✾', '⁕', '⌸', '✦', '⊹'];
  const petals = [];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'hcc1-petal';
    p.textContent = petalSymbols[Math.floor(Math.random() * petalSymbols.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.top = (10 + Math.random() * 80) + '%';
    p.style.fontSize = 'clamp(8px,' + (0.8 + Math.random() * 1.2) + 'vw,' + (12 + Math.random() * 14) + 'px)';
    p.style.opacity = '0';
    section.appendChild(p);
    petals.push(p);
  }

  // Dust motes
  const dustMotes = [];
  for (let i = 0; i < 30; i++) {
    const d = document.createElement('div');
    d.className = 'hcc1-dust';
    d.style.left = Math.random() * 100 + '%';
    d.style.top = Math.random() * 100 + '%';
    section.appendChild(d);
    dustMotes.push(d);
  }

  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 1) return;

    const nameEl = document.getElementById('hcc1-name');
    const nameBloom = document.getElementById('hcc1-name-bloom');
    const eyebrow = document.getElementById('hcc1-eyebrow');
    const divider = document.getElementById('hcc1-divider');
    const title = document.getElementById('hcc1-title');
    const subtitle = document.getElementById('hcc1-subtitle');
    const garland = document.getElementById('hcc1-accent-garland');
    const wreathL = document.getElementById('hcc1-wreath-left');
    const wreathR = document.getElementById('hcc1-wreath-right');
    const borderFrame = document.getElementById('hcc1-border-frame');
    const corners = [
      document.getElementById('hcc1-cs-tl'),
      document.getElementById('hcc1-cs-tr'),
      document.getElementById('hcc1-cs-bl'),
      document.getElementById('hcc1-cs-br')
    ];
    const cta = document.getElementById('hcc1-cta');
    const glowCenter = document.getElementById('hcc1-glow-center');

    // 1. ENTRANCE
    const tl = gsap.timeline();

    tl
      // Warm glow breathes in
      .fromTo(glowCenter,
        { scale: 0.6, opacity: 0 },
        { scale: 1, opacity: 0.09, duration: 2.2, ease: 'power2.out' }, 0)

      // Border frame fades in
      .fromTo(borderFrame,
        { opacity: 0, scale: 1.03 },
        { opacity: 1, scale: 1, duration: 1.2, ease: 'power2.out' }, 0.1)

      // Corner sprigs bloom
      .to(corners, {
        opacity: 1, scale: 1,
        duration: 0.5, stagger: 0.08,
        ease: 'back.out(2)'
      }, 0.3)

      // Wreaths drift in from sides
      .fromTo(wreathL,
        { opacity: 0, x: -clamp(30, 10, 50) },
        { opacity: 1, x: 0, duration: 1.0, ease: 'power3.out' }, 0.4)
      .fromTo(wreathR,
        { opacity: 0, x: clamp(30, 10, 50) },
        { opacity: 1, x: 0, duration: 1.0, ease: 'power3.out' }, 0.4)

      // Eyebrow
      .fromTo(eyebrow,
        { opacity: 0, y: -10 },
        { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }, 0.65)

      // Name bloom then name
      .to(nameBloom, { opacity: 0.18, duration: 0.6, ease: 'power2.out' }, 0.85)
      .fromTo(nameEl,
        { opacity: 0, y: clamp(18, 8, 30), filter: 'blur(8px)' },
        { opacity: 1, y: 0, filter: 'blur(0px)', duration: 1.1, ease: 'power3.out' }, 0.88)

      // Divider
      .fromTo(divider,
        { opacity: 0, scaleX: 0.7 },
        { opacity: 1, scaleX: 1, duration: 0.6, ease: 'back.out(1.4)' }, 1.3)

      // Title italic
      .fromTo(title,
        { opacity: 0, y: 8 },
        { opacity: 0.75, y: 0, duration: 0.55, ease: 'power2.out' }, 1.5)

      // Subtitle
      .fromTo(subtitle,
        { opacity: 0, y: 10 },
        { opacity: 0.55, y: 0, duration: 0.6, ease: 'power2.out' }, 1.65)

      // Garland pill
      .fromTo(garland,
        { opacity: 0, scale: 0.9, y: 6 },
        { opacity: 1, scale: 1, y: 0, duration: 0.55, ease: 'back.out(1.8)' }, 1.82)

      // Petals scatter in
      .to(petals, {
        opacity: () => 0.12 + Math.random() * 0.3,
        duration: 0.5,
        stagger: { each: 0.06, from: 'random' },
        ease: 'power2.out'
      }, 0.9)

      // Dust motes
      .to(dustMotes, {
        opacity: () => 0.05 + Math.random() * 0.2,
        duration: 0.4,
        stagger: { each: 0.03, from: 'random' }
      }, 1.0)

      // CTA
      .fromTo(cta,
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 2.05);

    // 2. AMBIENT LOOPS

    // Gentle name bloom breathe
    gsap.to(nameBloom, {
      opacity: 0.06, scale: 1.08,
      duration: 3.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2
    });

    // Wreath sway
    gsap.to(wreathL, {
      x: clamp(5, 2, 10), y: clamp(-4, -2, -6), rotation: 1.5,
      duration: 4, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.5
    });
    gsap.to(wreathR, {
      x: clamp(-5, -2, -10), y: clamp(-3, -2, -5), rotation: -1.5,
      duration: 4.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1
    });

    // Corner sprig gentle rotation
    corners.forEach((c, i) => {
      gsap.to(c, {
        rotation: `+=${i % 2 === 0 ? 8 : -8}`,
        duration: 3.5 + i * 0.3,
        ease: 'sine.inOut', yoyo: true, repeat: -1,
        delay: 0.5 * i + 2
      });
    });

    // Petal drift
    petals.forEach((p, i) => {
      gsap.to(p, {
        y: () => (Math.random() - 0.5) * 35,
        x: () => (Math.random() - 0.5) * 18,
        rotation: () => (Math.random() - 0.5) * 25,
        opacity: () => 0.08 + Math.random() * 0.28,
        duration: 3 + Math.random() * 3.5,
        ease: 'sine.inOut', yoyo: true, repeat: -1,
        delay: Math.random() * 2.5
      });
    });

    // Dust mote float
    dustMotes.forEach(d => {
      gsap.to(d, {
        y: () => (Math.random() - 0.5) * 50,
        x: () => (Math.random() - 0.5) * 30,
        opacity: () => 0.03 + Math.random() * 0.15,
        duration: 4 + Math.random() * 5,
        ease: 'sine.inOut', yoyo: true, repeat: -1,
        delay: Math.random() * 3
      });
    });

    // Divider flowers pulse
    section.querySelectorAll('.hcc1-divider-flower').forEach((f, i) => {
      gsap.to(f, {
        scale: 1.3, opacity: 0.4,
        duration: 1.8, ease: 'sine.inOut', yoyo: true, repeat: -1,
        delay: i * 0.3 + 2
      });
    });

    // Garland glow breathe
    gsap.to(garland, {
      boxShadow: '0 0 clamp(12px,2vw,24px) var(--accent)',
      duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2.2
    });

    // CTA flower spin
    gsap.to(document.getElementById('hcc1-cta-flower'), {
      rotation: 360, duration: 8, ease: 'linear', repeat: -1, delay: 2.5
    });

    // 3. SPORADIC PETAL RELEASE
    function scheduleBloom() {
      gsap.delayedCall(2.5 + Math.random() * 4, function () {
        const idx = Math.floor(Math.random() * petals.length);
        gsap.timeline({ onComplete: scheduleBloom })
          .to(petals[idx], { scale: 2.2, opacity: 0.7, duration: 0.2, ease: 'power2.out' })
          .to(petals[idx], { scale: 1, opacity: 0.15 + Math.random() * 0.25, duration: 0.8, ease: 'elastic.out(1, 0.4)' });
      });
    }
    gsap.delayedCall(2.5, scheduleBloom);
  });

  // 4. INTERACTION REACTION
  section.addEventListener('click', function () {
    const nameEl = document.getElementById('hcc1-name');
    const nameBloom = document.getElementById('hcc1-name-bloom');
    const wreathL = document.getElementById('hcc1-wreath-left');
    const wreathR = document.getElementById('hcc1-wreath-right');

    gsap.timeline()
      .to(nameBloom, { opacity: 0.45, scale: 1.15, duration: 0.18, ease: 'power2.out' })
      .to(nameBloom, { opacity: 0.12, scale: 1, duration: 0.7, ease: 'power2.out' })
      .to(nameEl, { y: -clamp(5, 2, 8), duration: 0.18, ease: 'power2.out' }, 0)
      .to(nameEl, { y: 0, duration: 0.5, ease: 'elastic.out(1, 0.4)' }, 0.18)
      .to(wreathL, { x: clamp(-8, -4, -14), duration: 0.15, ease: 'power2.out' }, 0)
      .to(wreathL, { x: 0, duration: 0.6, ease: 'elastic.out(1, 0.35)' }, 0.15)
      .to(wreathR, { x: clamp(8, 4, 14), duration: 0.15, ease: 'power2.out' }, 0)
      .to(wreathR, { x: 0, duration: 0.6, ease: 'elastic.out(1, 0.35)' }, 0.15);

    petals.forEach(p => {
      gsap.to(p, {
        scale: 1.8, opacity: 0.65, y: '-=' + clamp(15, 6, 25),
        duration: 0.2, ease: 'power2.out',
        onComplete: () => {
          gsap.to(p, { scale: 1, opacity: 0.1 + Math.random() * 0.25, y: '+=' + clamp(15, 6, 25), duration: 0.7, ease: 'power2.out' });
        }
      });
    });

    if (window.glitchEvents && window.glitchEvents.advance) {
      gsap.delayedCall(0.18, () => window.glitchEvents.advance());
    }
  });

  function clamp(mid, min, max) {
    return Math.max(min, Math.min(max, mid));
  }
})();
</script>
