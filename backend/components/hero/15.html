<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .hero-ghibli-001-root {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    cursor: none;
    background: #0d1a2e;
  }

  .hero-ghibli-001-sky {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: linear-gradient(
      180deg,
      #0a1628 0%,
      #1a2d4a 28%,
      #2d4a6e 52%,
      #4a6e8a 70%,
      #7a9eb5 82%,
      #c4b8a0 92%,
      #e8d5b0 100%
    );
  }

  .hero-ghibli-001-stars-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .hero-ghibli-001-clouds-canvas {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .hero-ghibli-001-hills {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 4;
    pointer-events: none;
  }

  .hero-ghibli-001-tree-layer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 5;
    pointer-events: none;
  }

  .hero-ghibli-001-particles {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
  }

  .hero-ghibli-001-spore {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 248, 220, 0.9);
    pointer-events: none;
    opacity: 0;
  }

  .hero-ghibli-001-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: clamp(0.5rem, 1.3vw, 1.1rem);
    padding: clamp(1.5rem, 4vw, 3rem);
    pointer-events: none;
    margin-top: clamp(-6rem, -10vh, -4rem);
  }

  .hero-ghibli-001-eyebrow {
    font-size: clamp(0.58rem, 1.1vw, 0.75rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255, 248, 220, 0.7);
    opacity: 0;
    display: flex;
    align-items: center;
    gap: 0.8em;
  }

  .hero-ghibli-001-eyebrow-glyph {
    font-size: 0.7em;
    opacity: 0.6;
  }

  .hero-ghibli-001-title {
    font-family: var(--font-heading);
    font-size: clamp(2.8rem, 8.5vw, 7.5rem);
    line-height: 1.05;
    color: #fdf6e3;
    letter-spacing: 0.01em;
    opacity: 0;
    text-shadow:
      0 2px 40px rgba(200, 160, 80, 0.35),
      0 0 80px rgba(120, 180, 255, 0.15);
  }

  .hero-ghibli-001-accent {
    color: var(--accent);
    display: inline-block;
    text-shadow:
      0 0 30px var(--accent),
      0 2px 60px rgba(200, 160, 80, 0.4);
  }

  .hero-ghibli-001-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
  }

  .hero-ghibli-001-divider-wing {
    width: 50px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,248,200,0.5));
  }

  .hero-ghibli-001-divider-wing.right {
    background: linear-gradient(to left, transparent, rgba(255,248,200,0.5));
  }

  .hero-ghibli-001-divider-leaf {
    width: 8px;
    height: 8px;
    background: rgba(255, 248, 200, 0.5);
    transform: rotate(45deg);
    border-radius: 1px;
  }

  .hero-ghibli-001-subtitle {
    font-size: clamp(0.82rem, 2vw, 1.15rem);
    color: rgba(253, 246, 227, 0.72);
    opacity: 0;
    letter-spacing: 0.03em;
    max-width: 460px;
    line-height: 1.8;
  }

  .hero-ghibli-001-recipient {
    margin-top: clamp(0.3rem, 1vw, 0.7rem);
    font-family: var(--font-heading);
    font-size: clamp(1rem, 2.8vw, 1.9rem);
    color: #fdf6e3;
    letter-spacing: 0.1em;
    opacity: 0;
    display: flex;
    align-items: center;
    gap: 0.5em;
    text-shadow: 0 2px 20px rgba(200, 160, 80, 0.3);
  }

  .hero-ghibli-001-recipient::before,
  .hero-ghibli-001-recipient::after {
    content: '';
    display: inline-block;
    width: 18px;
    height: 1px;
    background: rgba(255, 248, 200, 0.5);
  }

  .hero-ghibli-001-totoro {
    position: absolute;
    bottom: clamp(6rem, 14vh, 12rem);
    right: clamp(2rem, 6vw, 7rem);
    z-index: 7;
    width: clamp(60px, 9vw, 120px);
    opacity: 0;
    pointer-events: none;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
  }

  .hero-ghibli-001-kodama {
    position: absolute;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
  }

  .hero-ghibli-001-hint {
    position: absolute;
    bottom: clamp(1.2rem, 3vh, 2.2rem);
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
  }

  .hero-ghibli-001-hint-text {
    font-size: clamp(0.52rem, 1vw, 0.67rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255, 248, 220, 0.35);
  }

  .hero-ghibli-001-hint-line {
    width: 1px;
    height: 30px;

<script>
(function () {

  // ─── Star field ───────────────────────────────────────────────────
  const starCanvas = document.getElementById('hero-ghibli-001-stars');
  const sCtx = starCanvas.getContext('2d');
  let W, H, stars = [];

  function resizeAll() {
    W = window.innerWidth;
    H = window.innerHeight;
    starCanvas.width = W;
    starCanvas.height = H;
    cloudCanvas.width = W;
    cloudCanvas.height = H;
  }

  function buildStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.55,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random() * 0.7 + 0.2,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.003 + 0.001
      });
    }
  }

  function drawStars(t) {
    sCtx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const tw = s.a * (0.65 + 0.35 * Math.sin(t * s.speed * 60 + s.phase));
      sCtx.beginPath();
      sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      sCtx.fillStyle = `rgba(255,248,220,${tw})`;
      sCtx.fill();
    });
  }

  // ─── Cloud layer ──────────────────────────────────────────────────
  const cloudCanvas = document.getElementById('hero-ghibli-001-clouds');
  const cCtx = cloudCanvas.getContext('2d');

  const clouds = [];
  function buildClouds() {
    clouds.length = 0;
    const baseY = [H * 0.32, H * 0.42, H * 0.27, H * 0.38, H * 0.22];
    const widths = [200, 140, 180, 120, 160];
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * W,
        y: baseY[i % baseY.length],
        w: widths[i % widths.length] * (0.8 + Math.random() * 0.5),
        h: 40 + Math.random() * 30,
        speed: 0.08 + Math.random() * 0.06,
        alpha: 0.12 + Math.random() * 0.1
      });
    }
  }

  function drawCloud(c) {
    const g = cCtx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.w * 0.6);
    g.addColorStop(0, `rgba(255,248,230,${c.alpha})`);
    g.addColorStop(1, 'rgba(200,220,255,0)');
    cCtx.beginPath();
    cCtx.ellipse(c.x, c.y, c.w * 0.6, c.h * 0.5, 0, 0, Math.PI * 2);
    cCtx.fillStyle = g;
    cCtx.fill();
    cCtx.beginPath();
    cCtx.ellipse(c.x - c.w * 0.2, c.y + c.h * 0.1, c.w * 0.4, c.h * 0.4, 0, 0, Math.PI * 2);
    cCtx.fill();
    cCtx.beginPath();
    cCtx.ellipse(c.x + c.w * 0.2, c.y + c.h * 0.12, c.w * 0.38, c.h * 0.38, 0, 0, Math.PI * 2);
    cCtx.fill();
  }

  function drawClouds() {
    cCtx.clearRect(0, 0, W, H);
    clouds.forEach(c => {
      c.x += c.speed;
      if (c.x - c.w > W) c.x = -c.w;
      drawCloud(c);
    });
  }

  // ─── Main loop ────────────────────────────────────────────────────
  let t = 0;
  function loop() {
    t += 0.016;
    drawStars(t);
    drawClouds();
    requestAnimationFrame(loop);
  }

  resizeAll();
  buildStars();
  buildClouds();
  loop();
  window.addEventListener('resize', () => { resizeAll(); buildStars(); buildClouds(); });

  // ─── Floating spores / soot sprites ───────────────────────────────
  const particlesEl = document.getElementById('hero-ghibli-001-particles');
  const SPORE_COUNT = 22;
  const sporePool = [];

  for (let i = 0; i < SPORE_COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'hero-ghibli-001-spore';
    const sz = Math.random() * 5 + 2;
    el.style.width = sz + 'px';
    el.style.height = sz + 'px';
    particlesEl.appendChild(el);
    sporePool.push({ el, busy: false });
  }

  function getFreeSpore() { return sporePool.find(s => !s.busy) || null; }

  function launchSpore() {
    const s = getFreeSpore();
    if (!s) return;
    s.busy = true;
    const x = Math.random() * window.innerWidth;
    const startY = window.innerHeight * (0.5 + Math.random() * 0.4);
    const isLight = Math.random() > 0.4;
    const col = isLight ? 'rgba(255,248,200,0.85)' : 'rgba(80,60,40,0.7)';
    s.el.style.cssText = `left:${x}px;top:${startY}px;background:${col};opacity:0;`;
    if (window.gsap) {
      const drift = (Math.random() - 0.5) * 120;
      gsap.fromTo(s.el,
        { opacity: 0, y: 0, x: 0 },
        {
          opacity: 0.85,
          y: -(Math.random() * 200 + 100),
          x: drift,
          duration: 4 + Math.random() * 4,
          ease: 'power1.inOut',
          onComplete: () => {
            gsap.to(s.el, { opacity: 0, duration: 0.6, onComplete: () => { s.busy = false; } });
          }
        }
      );
    }
    setTimeout(launchSpore, Math.random() * 700 + 200);
  }

  // ─── Cursor leaf ──────────────────────────────────────────────────
  const cursor = document.getElementById('hero-ghibli-001-cursor');
  document.getElementById('hero-ghibli-001-root').style.cursor = 'none';

  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    if (window.gsap) {
      const angle = 15 * ((e.clientX / window.innerWidth) - 0.5);
      gsap.to(cursor, { rotate: angle, duration: 0.4, ease: 'power1.out' });
    }
  });

  // ─── Parallax ─────────────────────────────────────────────────────
  document.addEventListener('mousemove', e => {
    if (!window.gsap) return;
    const dx = (e.clientX / window.innerWidth - 0.5) * 18;
    const dy = (e.clientY / window.innerHeight - 0.5) * 10;
    gsap.to('#hero-ghibli-001-content', { x: dx * 0.4, y: dy * 0.3, duration: 1.6, ease: 'power1.out' });
    gsap.to('.hero-ghibli-001-hills', { x: dx * 0.8, duration: 2.2, ease: 'power1.out' });
    gsap.to('.hero-ghibli-001-tree-layer', { x: dx * 1.3, duration: 2.5, ease: 'power1.out' });
    gsap.to('#hero-ghibli-001-totoro', { x: dx * 1.8, duration: 2, ease: 'power1.out' });
  });

  // ─── Kodama head-rattle ───────────────────────────────────────────
  function rattleKodama(id) {
    const el = document.getElementById(id);
    if (!el || !window.gsap) return;
    gsap.to(el, {
      rotate: 6, duration: 0.12, ease: 'none', yoyo: true, repeat: 5,
      onComplete: () => {
        gsap.set(el, { rotate: 0 });
        setTimeout(() => rattleKodama(id), 3000 + Math.random() * 4000);
      }
    });
  }

  // ─── ENTRANCE ─────────────────────────────────────────────────────
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 1) return;

    const tl = gsap.timeline();

    // Hills rise
    gsap.set('.hero-ghibli-001-hills', { y: 60, opacity: 0 });
    tl.to('.hero-ghibli-001-hills', { y: 0, opacity: 1, duration: 1.8, ease: 'power3.out' }, 0);

    // Trees rise slightly after
    gsap.set('.hero-ghibli-001-tree-layer', { y: 40, opacity: 0 });
    tl.to('.hero-ghibli-001-tree-layer', { y: 0, opacity: 1, duration: 1.4, ease: 'power2.out' }, 0.3);

    // Totoro waddle in
    gsap.set('#hero-ghibli-001-totoro', { x: 80, opacity: 0 });
    tl.to('#hero-ghibli-001-totoro', { x: 0, opacity: 1, duration: 1.1, ease: 'back.out(1.4)' }, 0.8);

    // Kodamas appear
    gsap.set(['#hero-ghibli-001-kodama-1','#hero-ghibli-001-kodama-2'], { scale: 0, opacity: 0 });
    tl.to('#hero-ghibli-001-kodama-1', { scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(2)' }, 1.1);
    tl.to('#hero-ghibli-001-kodama-2', { scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(2)' }, 1.3);

    // Eyebrow
    gsap.set('#hero-ghibli-001-eyebrow', { y: 10 });
    tl.to('#hero-ghibli-001-eyebrow', { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out' }, 0.9);

    // Title
    gsap.set('#hero-ghibli-001-title', { y: 28, opacity: 0 });
    tl.to('#hero-ghibli-001-title', { y: 0, opacity: 1, duration: 1.1, ease: 'expo.out' }, 1.1);

    // Accent pop
    tl.fromTo('.hero-ghibli-001-accent',
      { scale: 0.85, opacity: 0 },
      { scale: 1, opacity: 1, duration: 0.7, ease: 'back.out(2)' },
      1.6
    );

    // Divider
    gsap.set('#hero-ghibli-001-divider', { scaleX: 0, transformOrigin: 'center' });
    tl.to('#hero-ghibli-001-divider', { opacity: 1, scaleX: 1, duration: 0.6, ease: 'power2.out' }, 1.6);

    // Subtitle
    gsap.set('#hero-ghibli-001-subtitle', { y: 12 });
    tl.to('#hero-ghibli-001-subtitle', { opacity: 0.72, y: 0, duration: 0.8, ease: 'power2.out' }, 1.75);

    // Recipient
    gsap.set('#hero-ghibli-001-recipient', { y: 14 });
    tl.to('#hero-ghibli-001-recipient', { opacity: 1, y: 0, duration: 0.8, ease: 'back.out(1.5)' }, 1.95);

    // Hint
    tl.to('#hero-ghibli-001-hint', { opacity: 1, duration: 0.6, ease: 'power2.out' }, 2.6);

    // Ambient systems start
    tl.call(() => {
      launchSpore();

      // Totoro gentle float
      gsap.to('#hero-ghibli-001-totoro', {
        y: -10, duration: 2.8, ease: 'sine.inOut', yoyo: true, repeat: -1
      });

      // Accent soft glow pulse
      gsap.to('.hero-ghibli-001-accent', {
        textShadow: '0 0 50px var(--accent), 0 2px 80px rgba(200,160,80,0.5)',
        duration: 2.2, ease: 'sine.inOut', yoyo: true, repeat: -1
      });

      // Kodama rattle
      setTimeout(() => rattleKodama('hero-ghibli-001-kodama-1'), 2000);
      setTimeout(() => rattleKodama('hero-ghibli-001-kodama-2'), 3500);

      // Divider leaf rotate
      gsap.to('.hero-ghibli-001-divider-leaf', {
        rotate: 225, duration: 4, ease: 'sine.inOut', yoyo: true, repeat: -1
      });

      // Trees gentle sway
      gsap.to('.hero-ghibli-001-tree-layer', {
        x: 6, duration: 5, ease: 'sine.inOut', yoyo: true, repeat: -1
      });

    }, [], 1.2);

  });

})();
</script>
