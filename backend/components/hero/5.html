    <div class="ts1-trail-star"></div>
  </div>

<script>
(function () {
  const INDEX = 1;

  // ── Glitter / sparkle canvas ───────────────────────────────────
  const canvas = document.getElementById('ts1-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const TOTAL = 140;
  const pool  = [];

  function mkPt(boot) {
    const warm = Math.random();
    return {
      x:  Math.random() * (W || 800),
      y:  boot ? Math.random() * (H || 800) : (H || 800) + 8,
      r:  Math.random() * 1.8 + 0.2,
      vx: (Math.random() - 0.5) * 0.14,
      vy: -(Math.random() * 0.22 + 0.04),
      op: Math.random() * 0.52 + 0.08,
      ts: Math.random() * 0.014 + 0.005,
      tp: Math.random() * Math.PI * 2,
      // colour palette: gold, rose, violet, white
      hue: warm < 0.3 ? 0 : warm < 0.55 ? 1 : warm < 0.78 ? 2 : 3
    };
  }

  const COLOURS = [
    '255,210,80,',   // gold
    '255,160,180,',  // rose
    '190,140,255,',  // violet
    '240,230,255,'   // white
  ];

  for (let i = 0; i < TOTAL; i++) pool.push(mkPt(true));

  let running = false;

  function tick() {
    ctx.clearRect(0, 0, W, H);
    const t = performance.now() * 0.001;
    for (let i = 0; i < pool.length; i++) {
      const p = pool[i];
      p.x += p.vx; p.y += p.vy;
      if (p.y < -8) { pool[i] = mkPt(false); continue; }
      const fl = 0.35 + 0.65 * Math.sin(t * p.ts * 60 + p.tp);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.2832);
      ctx.fillStyle = 'rgba(' + COLOURS[p.hue] + (p.op * fl).toFixed(3) + ')';
      ctx.fill();
    }
    if (running) requestAnimationFrame(tick);
  }

  // ── SVG sparkle burst helper ───────────────────────────────────
  function spawnSparkle(x, y, size) {
    const section = document.getElementById('hero-taylorswift-001');
    const el = document.createElement('div');
    el.className = 'ts1-sparkle';
    const s = size || (clamp(12, 2, 28));
    el.style.cssText = 'left:' + x + 'px;top:' + y + 'px;width:' + s + 'px;height:' + s + 'px;transform:translate(-50%,-50%)';
    el.innerHTML = '<svg viewBox="0 0 20 20" fill="none"><path d="M10 1 L11.2 8.8 L19 10 L11.2 11.2 L10 19 L8.8 11.2 L1 10 L8.8 8.8 Z" fill="color-mix(in srgb,var(--accent) 80%,transparent)"/></svg>';
    section.appendChild(el);
    gsap.fromTo(el,
      { opacity: 0, scale: 0, rotation: 0 },
      {
        opacity: 1, scale: 1, rotation: 45,
        duration: 0.35, ease: 'back.out(2)',
        yoyo: true, repeat: 1,
        onComplete: function () { el.remove(); }
      }
    );
  }

  function clamp(min, vw, max) {
    return Math.min(max, Math.max(min, window.innerWidth * vw / 100));
  }

  function burstSparkles() {
    const positions = [
      [W * 0.18, H * 0.22], [W * 0.82, H * 0.18],
      [W * 0.12, H * 0.65], [W * 0.88, H * 0.72],
      [W * 0.35, H * 0.12], [W * 0.65, H * 0.88],
      [W * 0.50, H * 0.15], [W * 0.25, H * 0.85]
    ];
    positions.forEach(function (p, i) {
      setTimeout(function () {
        spawnSparkle(p[0], p[1], clamp(10, 1.8, 22));
      }, i * 120);
    });
  }

  // ── Bracelet bead stagger entrance ────────────────────────────
  function animateBeads() {
    const beads = document.querySelectorAll('#hero-taylorswift-001 .ts1-bead, #hero-taylorswift-001 .ts1-bead-letter');
    gsap.fromTo(beads,
      { opacity: 0, scale: 0, y: 6 },
      {
        opacity: 1, scale: 1, y: 0,
        duration: 0.4,
        ease: 'back.out(2)',
        stagger: 0.055,
        delay: 0.1
      }
    );
  }

  // ── Trail stars stagger twinkle ────────────────────────────────
  function animateTrail() {
    const stars = document.querySelectorAll('#hero-taylorswift-001 .ts1-trail-star');
    stars.forEach(function (s, i) {
      gsap.to(s, {
        opacity: 0.8,
        scale: 1.6,
        duration: 0.6 + i * 0.08,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: i * 0.18
      });
    });
  }

  // ── Entrance ───────────────────────────────────────────────────
  function enterSection() {
    running = true;
    tick();

    gsap.set([
      '#ts1-eyebrow','#ts1-name-row','#ts1-lyric-strip',
      '#ts1-bracelet','#ts1-cta','#ts1-era-ribbon','#ts1-star-trail'
    ], { opacity: 0, y: 14 });

    gsap.set('#ts1-sigil', { opacity: 0, scale: 0.8, rotation: -8 });
    gsap.set(['#ts1-star-l','#ts1-star-r'], { opacity: 0, scale: 0 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#ts1-sigil', {
        opacity: 1, scale: 1, rotation: 0,
        duration: 1.8, ease: 'power2.out'
      }, 0)

      .to('#ts1-era-ribbon',  { opacity: 1, y: 0, duration: 0.7 }, 0.4)
      .to('#ts1-eyebrow',     { opacity: 1, y: 0, duration: 0.7 }, 0.65)
      .to('#ts1-name-row',    { opacity: 1, y: 0, duration: 1.0, ease: 'power4.out' }, 0.9)

      .to('#ts1-star-l', {
          opacity: 0.7, scale: 1,
          duration: 0.5, ease: 'back.out(2)'
        }, 1.05)
      .to('#ts1-star-r', {
          opacity: 0.7, scale: 1,
          duration: 0.5, ease: 'back.out(2)'
        }, 1.15)

      .to('#ts1-lyric-strip', { opacity: 1, y: 0, duration: 0.75 }, 1.35)
      .to('#ts1-bracelet',    { opacity: 1, y: 0, duration: 0.1  }, 1.6)
      .call(animateBeads, [], 1.65)
      .to('#ts1-star-trail',  { opacity: 1, y: 0, duration: 0.6  }, 1.75)
      .call(animateTrail, [], 1.8)
      .to('#ts1-cta',         { opacity: 1, y: 0, duration: 0.7  }, 2.0)
      .call(burstSparkles, [], 1.4);

    // ── Ambient: sigil slow rotation ──────────────────────────────
    gsap.to('#ts1-sigil', {
      rotation: 360,
      duration: 70,
      repeat: -1,
      ease: 'none',
      transformOrigin: '50% 50%',
      delay: 2
    });

    // ── Ambient: name shimmer ──────────────────────────────────────
    gsap.to('#ts1-name', {
      opacity: 0.86,
      duration: 3.5,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 2.5
    });

    // ── Ambient: inline stars pulse ────────────────────────────────
    gsap.to(['#ts1-star-l','#ts1-star-r'], {
      scale: 1.4,
      opacity: 1,
      duration: 1.6,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 2,
      stagger: 0.3
    });

    // ── Ambient: era ribbon fade ───────────────────────────────────
    gsap.to('#ts1-era-ribbon', {
      opacity: 0.5,
      duration: 3,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 3
    });

    // recurring sparkle burst every 3.5s
    setInterval(function () {
      if (running) burstSparkles();
    }, 3500);
  }

  // ── Interaction: tap name ─────────────────────────────────────
  document.getElementById('ts1-name').addEventListener('click', function (e) {
    e.stopPropagation();
    gsap.to('#ts1-name', {
      scale: 1.06,
      duration: 0.22,
      ease: 'power2.out',
      yoyo: true,
      repeat: 1,
      onComplete: function () { gsap.set('#ts1-name', { scale: 1 }); }
    });
    burstSparkles();
    for (let i = 0; i < 16; i++) {
      const p = mkPt(false);
      p.x  = W / 2 + (Math.random() - 0.5) * 120;
      p.y  = H / 2 + (Math.random() - 0.5) * 60;
      p.vy = -(Math.random() * 2.5 + 1);
      pool.push(p);
      if (pool.length > TOTAL + 40) pool.shift();
    }
  });

  // ── Hover: name lifts ──────────────────────────────────────────
  document.getElementById('ts1-name').addEventListener('mouseenter', function () {
    gsap.to('#ts1-name', { y: -5, duration: 0.4, ease: 'power2.out' });
  });
  document.getElementById('ts1-name').addEventListener('mouseleave', function () {
    gsap.to('#ts1-name', { y: 0,  duration: 0.5, ease: 'power1.out' });
  });

  // ── Advance ────────────────────────────────────────────────────
  document.getElementById('hero-taylorswift-001').addEventListener('click', function () {
    gsap.to('#hero-taylorswift-001', {
      opacity: 0,
      duration: 0.85,
      ease: 'power2.in',
      onComplete: function () {
        running = false;
        if (window.glitchEvents) window.glitchEvents.advance();
      }
    });
  });

  // ── glitch:enter ──────────────────────────────────────────────
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== INDEX) return;
    enterSection();
  });

})();
</script>
