<script>
(function() {
  function initHeroKpop001() {
    const section = document.getElementById('hero-kpop-001');
    if (!section) return;

    // Build particles
    const container = document.getElementById('hk1-particles-container');
    const particleCount = 28;
    const particles = [];
    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('div');
      p.className = 'hk1-particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.opacity = 0;
      container.appendChild(p);
      particles.push(p);
    }

    // Build ticker
    const tickerInner = document.getElementById('hk1-ticker-inner');
    const tickerWords = ['--RECIPIENT_NAME--', '--ACCENT_WORD--', '✦', '--TITLE--', '★', '--ACCENT_WORD--', '✦'];
    const repeatCount = 8;
    for (let i = 0; i < repeatCount; i++) {
      tickerWords.forEach(w => {
        const span = document.createElement('span');
        span.className = 'hk1-ticker-item';
        span.textContent = w;
        tickerInner.appendChild(span);
      });
    }

    document.addEventListener('glitch:enter', function(e) {
      if (e.detail.index !== 1) return;

      const tl = gsap.timeline();
      const nameEl = document.getElementById('hk1-main-name');
      const glowEl = section.querySelector('.hk1-name-glow');
      const eyebrow = section.querySelector('.hk1-eyebrow');
      const titleLine = section.querySelector('.hk1-title-line');
      const subtitle = section.querySelector('.hk1-subtitle');
      const pill = section.querySelector('.hk1-accent-pill');
      const cta = document.getElementById('hk1-cta');
      const corners = section.querySelectorAll('.hk1-corner');
      const badge = section.querySelector('.hk1-idol-badge');
      const ticker = document.getElementById('hk1-ticker');
      const grid = section.querySelector('.hk1-bg-grid');
      const glitchClone = document.getElementById('hk1-glitch-clone');

      // 1. ENTRANCE ANIMATION
      tl.set(grid, { scale: 1.08 })
        .to(grid, { scale: 1, duration: 1.8, ease: 'power3.out' }, 0)

        .to(corners, { opacity: 1, duration: 0.3, stagger: 0.06, ease: 'power2.out' }, 0.1)
        .to(badge, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.3)

        // Glitch flash on name before reveal
        .set(glitchClone, { opacity: 1 }, 0.5)
        .to(glitchClone, {
          x: -6, duration: 0.05, ease: 'none',
          yoyo: true, repeat: 5
        }, 0.5)
        .to(glitchClone, { opacity: 0, duration: 0.08 }, 0.85)

        .fromTo(nameEl,
          { opacity: 0, y: clampVal(30, 5, 60), skewX: 4 },
          { opacity: 1, y: 0, skewX: 0, duration: 0.9, ease: 'expo.out' }, 0.7)
        .to(glowEl, { opacity: 0.45, duration: 1, ease: 'power2.out' }, 0.85)

        .fromTo(eyebrow,
          { opacity: 0, y: -10, letterSpacing: '20px' },
          { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }, 1.0)

        .fromTo(titleLine,
          { opacity: 0, scaleX: 0.85 },
          { opacity: 1, scaleX: 1, duration: 0.6, ease: 'power2.out' }, 1.2)

        .fromTo(subtitle,
          { opacity: 0, y: 12 },
          { opacity: 0.6, y: 0, duration: 0.7, ease: 'power2.out' }, 1.35)

        .fromTo(pill,
          { opacity: 0, scale: 0.88, y: 8 },
          { opacity: 1, scale: 1, y: 0, duration: 0.6, ease: 'back.out(1.8)' }, 1.52)

        // Particles entrance
        .to(particles, {
          opacity: () => Math.random() * 0.7 + 0.2,
          duration: 0.4,
          stagger: { each: 0.04, from: 'random' },
          ease: 'power2.out'
        }, 1.0)

        .fromTo(ticker,
          { opacity: 0, y: 6 },
          { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, 1.7)

        .fromTo(cta,
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 1.9);

      // 2. AMBIENT LOOP ANIMATIONS
      // Orb drift
      gsap.to(section.querySelector('.hk1-orb-1'), {
        x: '8%', y: '5%', duration: 7, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2
      });
      gsap.to(section.querySelector('.hk1-orb-2'), {
        x: '-6%', y: '-4%', duration: 9, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1
      });
      gsap.to(section.querySelector('.hk1-orb-3'), {
        x: '-5%', y: '6%', duration: 5.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 0.5
      });

      // Glow pulse
      gsap.to(glowEl, {
        opacity: 0.15, duration: 2.2, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2
      });

      // Particle float
      particles.forEach((p, i) => {
        gsap.to(p, {
          y: () => (Math.random() - 0.5) * 40,
          x: () => (Math.random() - 0.5) * 20,
          opacity: () => Math.random() * 0.6 + 0.1,
          duration: 2.5 + Math.random() * 3,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: -1,
          delay: Math.random() * 2
        });
      });

      // Badge dot pulse
      gsap.to(section.querySelector('.hk1-idol-dot'), {
        scale: 1.6, opacity: 0.4, duration: 0.9, ease: 'sine.inOut', yoyo: true, repeat: -1
      });

      // CTA line pulse
      gsap.to(section.querySelector('.hk1-cta-line'), {
        scaleY: 0.4, opacity: 0.3, duration: 1.1, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2.2, transformOrigin: 'top center'
      });

      // Ticker scroll
      gsap.to(tickerInner, {
        x: '-50%',
        duration: 28,
        ease: 'none',
        repeat: -1,
        delay: 1.8
      });

      // 3. RANDOM GLITCH FLASH
      function scheduleGlitch() {
        gsap.delayedCall(3 + Math.random() * 5, function() {
          const glitchTl = gsap.timeline({ onComplete: scheduleGlitch });
          glitchTl
            .set(glitchClone, { opacity: 0.5, x: 5 })
            .to(glitchClone, { x: -5, duration: 0.04, ease: 'none' })
            .to(glitchClone, { x: 3, duration: 0.04, ease: 'none' })
            .to(glitchClone, { opacity: 0, x: 0, duration: 0.06, ease: 'none' });
        });
      }
      gsap.delayedCall(2.5, scheduleGlitch);
    });

    // 4. INTERACTION REACTION — click/tap ripple on name
    const nameEl = document.getElementById('hk1-main-name');
    nameEl.style.cursor = 'default';
    section.addEventListener('click', function() {
      const glowEl = section.querySelector('.hk1-name-glow');
      gsap.timeline()
        .to(nameEl, { scaleX: 1.03, skewX: -2, duration: 0.08, ease: 'none' })
        .to(nameEl, { scaleX: 1, skewX: 0, duration: 0.35, ease: 'elastic.out(1,0.4)' })
        .to(glowEl, { opacity: 0.8, duration: 0.12, ease: 'none' }, 0)
        .to(glowEl, { opacity: 0.45, duration: 0.5, ease: 'power2.out' }, 0.12);

      // Particle burst
      particles.forEach(p => {
        gsap.to(p, {
          scale: 2.5, opacity: 1, duration: 0.15, ease: 'power3.out',
          onComplete: () => {
            gsap.to(p, { scale: 1, opacity: Math.random() * 0.5 + 0.1, duration: 0.6, ease: 'power2.out' });
          }
        });
      });

      // Advance
      if (window.glitchEvents && window.glitchEvents.advance) {
        gsap.delayedCall(0.15, () => window.glitchEvents.advance());
      }
    });
  }

  function clampVal(mid, min, max) {
    return Math.max(min, Math.min(max, mid));
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initHeroKpop001);
  } else {
    initHeroKpop001();
  }
})();
</script>
