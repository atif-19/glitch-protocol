<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .hero-f1-001-root {

    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    cursor: none;
  }

  .hero-f1-001-track-canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .hero-f1-001-speed-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .hero-f1-001-speed-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    opacity: 0;
    transform-origin: left center;
  }

  .hero-f1-001-grid-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .hero-f1-001-vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.75) 100%);
    pointer-events: none;
  }

  .hero-f1-001-car-wrap {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    width: clamp(500px, 80vw, 1100px);
    pointer-events: none;
    opacity: 0;
  }

  .hero-f1-001-exhaust {
    position: absolute;
    z-index: 3;
    pointer-events: none;
  }

  .hero-f1-001-exhaust-particle {
    position: absolute;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
  }

  .hero-f1-001-number-bg {
    position: absolute;
    bottom: 0;
    right: clamp(-2rem, -2vw, -1rem);
    font-family: var(--font-heading);
    font-size: clamp(16rem, 35vw, 40rem);
    line-height: 0.85;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.04);
    z-index: 2;
    pointer-events: none;
    letter-spacing: -0.05em;
    user-select: none;
  }

  .hero-f1-001-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: clamp(0.5rem, 1.2vw, 1rem);
    padding: clamp(1.5rem, 4vw, 3.5rem);
    width: 100%;
    max-width: 900px;
    pointer-events: none;
    margin-top: clamp(-4rem, -8vh, -6rem);
  }

  .hero-f1-001-eyebrow {
    display: flex;
    align-items: center;
    gap: 0.6em;
    font-size: clamp(0.6rem, 1.1vw, 0.78rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;

  .hero-f1-001-eyebrow-line {
    width: 32px;
    height: 1px;
    background: var(--accent);

  }

  .hero-f1-001-title {
    font-family: var(--font-heading);

    text-transform: uppercase;

    background: rgba(255,255,255,0.18);

  .hero-f1-001-subtitle {

  .hero-f1-001-hint {
    position: absolute;
    bottom: clamp(1.2rem, 3vh, 2.2rem);
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    display: flex;
    flex-direction: column;
    align-items: center;

  .hero-f1-001-hint-text {
    font-size: clamp(0.52rem, 1vw, 0.68rem);
    letter-spacing: 0.35em;

  .hero-f1-001-hint-chevrons {

  .hero-f1-001-chevron {

  .hero-f1-001-cursor {

  .hero-f1-001-rpm {

  .hero-f1-001-rpm-label {

<script>
(function () {

  // ─── Canvas: asphalt + racing line ──────────────────────────────────
  const canvas = document.getElementById('hero-f1-001-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resizeCanvas() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  let lineOffset = 0;

  function drawTrack() {
    ctx.clearRect(0, 0, W, H);

    // Dark asphalt base
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#050505');
    grad.addColorStop(1, '#0e0a08');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Racing line — sweeping curve across screen
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 90;
    ctx.beginPath();
    ctx.moveTo(-100, H * 0.7);
    ctx.bezierCurveTo(W * 0.25, H * 0.8, W * 0.55, H * 0.2, W + 100, H * 0.5);
    ctx.stroke();
    ctx.restore();

    // Dashed centre line
    ctx.save();
    ctx.strokeStyle = 'rgba(255,200,0,0.12)';
    ctx.lineWidth = 2;
    ctx.setLineDash([28, 24]);
    ctx.lineDashOffset = -lineOffset;
    ctx.beginPath();
    ctx.moveTo(-100, H * 0.72);
    ctx.bezierCurveTo(W * 0.25, H * 0.82, W * 0.55, H * 0.22, W + 100, H * 0.52);
    ctx.stroke();
    ctx.restore();

    lineOffset = (lineOffset + 1.4) % 52;
    requestAnimationFrame(drawTrack);
  }

  resizeCanvas();
  drawTrack();
  window.addEventListener('resize', resizeCanvas);

  // ─── RPM bars setup ─────────────────────────────────────────────────
  const rpmContainer = document.getElementById('hero-f1-001-rpm-bars');
  const BAR_COUNT = 14;
  const barHeights = [8, 10, 12, 14, 16, 18, 20, 22, 22, 20, 18, 14, 10, 8];
  const rpmBars = [];

  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'hero-f1-001-rpm-bar';
    b.style.height = barHeights[i] + 'px';
    rpmContainer.appendChild(b);
    rpmBars.push(b);
  }

  let rpmLevel = 0;
  let rpmDir = 1;
  let rpmRaf;

  function animateRPM() {
    rpmLevel += rpmDir * (0.4 + Math.random() * 0.3);
    if (rpmLevel >= BAR_COUNT) { rpmLevel = BAR_COUNT; rpmDir = -1; }
    if (rpmLevel <= 3) { rpmLevel = 3; rpmDir = 1; }
    const lit = Math.floor(rpmLevel);
    rpmBars.forEach((b, i) => {
      const active = i < lit;
      b.style.opacity = active ? (i >= 10 ? '1' : '0.7') : '0.12';
      b.style.background = active
        ? (i >= 12 ? '#ff2020' : i >= 10 ? '#ffaa00' : 'var(--accent)')
        : 'rgba(255,255,255,0.1)';
    });
    rpmRaf = setTimeout(animateRPM, 90);
  }

  // ─── Speed lines ────────────────────────────────────────────────────
  const linesContainer = document.getElementById('hero-f1-001-speed-lines');
  const LINE_POOL = 18;
  const linePool = [];

  for (let i = 0; i < LINE_POOL; i++) {
    const el = document.createElement('div');
    el.className = 'hero-f1-001-speed-line';
    el.style.width = (Math.random() * 120 + 60) + 'px';
    linesContainer.appendChild(el);
    linePool.push({ el, busy: false });
  }

  function fireSpeedLine() {
    const s = linePool.find(l => !l.busy);
    if (!s) return;
    s.busy = true;
    const y = Math.random() * window.innerHeight;
    const x = -200;
    const w = Math.random() * 180 + 60;
    s.el.style.cssText = `top:${y}px;left:${x}px;width:${w}px;opacity:0;`;
    if (window.gsap) {
      gsap.fromTo(s.el,
        { opacity: 0, x: 0 },
        { opacity: 0.6, x: window.innerWidth + 300,
          duration: Math.random() * 0.4 + 0.2,
          ease: 'power2.in',
          onComplete: () => { s.el.style.opacity = '0'; s.busy = false; }
        }
      );
    }
  }

  let speedLineInterval;

  function startSpeedLines() {
    speedLineInterval = setInterval(() => {
      const bursts = Math.floor(Math.random() * 3) + 1;
      for (let i = 0; i < bursts; i++) {
        setTimeout(fireSpeedLine, i * 40);
      }
    }, 280);
  }

  // ─── Exhaust heat shimmer particles ─────────────────────────────────
  const exhaustEl = document.getElementById('hero-f1-001-exhaust');
  const EXHAUST_POOL = 16;
  const exhaustPool = [];

  for (let i = 0; i < EXHAUST_POOL; i++) {
    const el = document.createElement('div');
    el.className = 'hero-f1-001-exhaust-particle';
    const size = Math.random() * 6 + 2;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    exhaustEl.appendChild(el);
    exhaustPool.push({ el, busy: false });
  }

  function fireExhaust() {
    const s = exhaustPool.find(p => !p.busy);
    if (!s) return;
    s.busy = true;
    const hue = Math.random() > 0.6 ? 'rgba(255,120,20,0.9)' : 'rgba(255,200,80,0.7)';
    s.el.style.cssText = `background:${hue};opacity:0;left:0;top:0;`;
    if (window.gsap) {
      gsap.fromTo(s.el,
        { opacity: 0.9, x: 0, y: 0, scale: 1 },
        { opacity: 0,
          x: -(Math.random() * 60 + 20),
          y: (Math.random() - 0.5) * 16,
          scale: 2.5,
          duration: 0.5 + Math.random() * 0.3,
          ease: 'power2.out',
          onComplete: () => { s.el.style.opacity = '0'; s.busy = false; }
        }
      );
    }
  }

  let exhaustInterval;

  function startExhaust() {
    exhaustInterval = setInterval(() => {
      fireExhaust();
      fireExhaust();
    }, 80);
  }

  // ─── Cursor ─────────────────────────────────────────────────────────
  const cursor = document.getElementById('hero-f1-001-cursor');
  const cursorRing = cursor.querySelector('.hero-f1-001-cursor-ring');
  document.getElementById('hero-f1-001-root').style.cursor = 'none';

  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    if (window.gsap) {
      gsap.to(cursorRing, { scale: 1, duration: 0.2, ease: 'power2.out' });
    }
  });

  document.addEventListener('mousedown', () => {
    if (window.gsap) gsap.to(cursorRing, { scale: 0.6, duration: 0.1 });
  });

  document.addEventListener('mouseup', () => {
    if (window.gsap) gsap.to(cursorRing, { scale: 1, duration: 0.2 });
  });

  // ─── Parallax ───────────────────────────────────────────────────────
  document.addEventListener('mousemove', e => {
    if (!window.gsap) return;
    const dx = (e.clientX / window.innerWidth - 0.5) * 20;
    const dy = (e.clientY / window.innerHeight - 0.5) * 12;
    gsap.to('#hero-f1-001-content', { x: dx * 0.5, y: dy * 0.4, duration: 1.4, ease: 'power1.out' });
    gsap.to('#hero-f1-001-car', { x: dx * 1.0, duration: 1.8, ease: 'power1.out' });
    gsap.to('#hero-f1-001-numbg', { x: dx * 1.8, duration: 2.2, ease: 'power1.out' });
  });

  // ─── Lap time ticker ────────────────────────────────────────────────
  const lapTimeEl = document.getElementById('hero-f1-001-laptime');
  const LAP_TIMES = ['1:18.412','1:17.998','1:19.054','1:18.230','1:17.872'];
  let lapIdx = 0;

  function tickLapTime() {
    lapIdx = (lapIdx + 1) % LAP_TIMES.length;
    if (window.gsap) {
      gsap.to(lapTimeEl, { opacity: 0, y: -4, duration: 0.15, ease: 'power1.in', onComplete: () => {
        lapTimeEl.textContent = LAP_TIMES[lapIdx];
        gsap.to(lapTimeEl, { opacity: 1, y: 0, duration: 0.2, ease: 'power2.out' });
      }});
    }
    setTimeout(tickLapTime, 3200 + Math.random() * 1400);
  }

  // ─── ENTRANCE ───────────────────────────────────────────────────────
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 1) return;

    const tl = gsap.timeline();

    // Car screech in from left
    gsap.set('#hero-f1-001-car', { x: -window.innerWidth * 0.8, opacity: 0 });
    tl.to('#hero-f1-001-car', {
      x: 0, opacity: 1,
      duration: 0.9,
      ease: 'power4.out'
    }, 0);

    // Background number count-up feel
    gsap.set('#hero-f1-001-numbg', { opacity: 0 });
    tl.to('#hero-f1-001-numbg', { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.5);

    // HUDs
    tl.to(['#hero-f1-001-lap', '#hero-f1-001-rpm'], {
      opacity: 1, y: 0, stagger: 0.1, duration: 0.6, ease: 'power2.out',
      onStart: () => { gsap.set(['#hero-f1-001-lap', '#hero-f1-001-rpm'], { y: -10 }); }
    }, 0.7);

    // Eyebrow
    gsap.set('#hero-f1-001-eyebrow', { x: -20 });
    tl.to('#hero-f1-001-eyebrow', { opacity: 1, x: 0, duration: 0.6, ease: 'power2.out' }, 0.8);

    // Title lines
    gsap.set('#hero-f1-001-title', { y: 40, skewX: -4 });
    tl.to('#hero-f1-001-title', {
      opacity: 1, y: 0, skewX: 0,
      duration: 0.85,
      ease: 'expo.out'
    }, 1.0);

    // Divider
    gsap.set('#hero-f1-001-divider', { scaleX: 0, transformOrigin: 'left' });
    tl.to('#hero-f1-001-divider', { opacity: 1, scaleX: 1, duration: 0.5, ease: 'power3.out' }, 1.35);

    // Subtitle
    gsap.set('#hero-f1-001-subtitle', { y: 12 });
    tl.to('#hero-f1-001-subtitle', { opacity: 0.65, y: 0, duration: 0.7, ease: 'power2.out' }, 1.5);

    // Recipient
    gsap.set('#hero-f1-001-recipient', { y: 16 });
    tl.to('#hero-f1-001-recipient', { opacity: 1, y: 0, duration: 0.7, ease: 'back.out(1.4)' }, 1.7);

    // Hint
    tl.to('#hero-f1-001-hint', { opacity: 1, duration: 0.5, ease: 'power2.out' }, 2.4);

    // Start ambient systems
    tl.call(() => {
      startSpeedLines();
      startExhaust();
      animateRPM();
      tickLapTime();

      // Car idle vibration
      gsap.to('#hero-f1-001-car', {
        y: -3, duration: 0.08, ease: 'none',
        yoyo: true, repeat: -1
      });

      // Accent word flicker pulse
      gsap.to('.hero-f1-001-title-accent', {
        filter: 'drop-shadow(0 0 40px var(--accent)) brightness(1.3)',
        duration: 0.7,
        ease: 'sine.inOut',
        yoyo: true,
        repeat: -1
      });

      // RPM number-bg subtle drift
      gsap.to('#hero-f1-001-numbg', {
        x: 14, duration: 8, ease: 'sine.inOut',
        yoyo: true, repeat: -1
      });

    }, [], 1.0);

  });

})();
</script>
