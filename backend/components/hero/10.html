<section id="hero-space-001">
  <canvas class="hs1-canvas" id="hs1-canvas"></canvas>

  </div>
  <div class="hs1-telemetry br" id="hs1-tele-br">
    <span class="hs1-tele-line bright">--ACCENT_WORD--</span>
    <span class="hs1-tele-line">Mag +1.33</span>

<script>
(function () {

  // ── Star field canvas ───────────────────────────────────────────
  const canvas = document.getElementById('hs1-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function makeStars() {
    stars = [];
    const count = Math.floor((W * H) / 3200);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        o: Math.random() * 0.7 + 0.1,
        flicker: Math.random() * Math.PI * 2,
        speed: 0.004 + Math.random() * 0.012
      });
    }
  }
  makeStars();

  let rafId;
  function drawStars(timestamp) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.flicker += s.speed;
      const alpha = s.o * (0.55 + 0.45 * Math.sin(s.flicker));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    rafId = requestAnimationFrame(drawStars);
  }
  rafId = requestAnimationFrame(drawStars);

  // ── Shooting stars ──────────────────────────────────────────────
  function spawnShootingStar() {
    const s = document.createElement('div');
    s.className = 'hs1-shooting-star';
    const len = clamp(80, 40, 180) + Math.random() * 120;
    s.style.width = len + 'px';
    s.style.top = (Math.random() * 60) + '%';
    s.style.left = (Math.random() * 50) + '%';
    const angle = 15 + Math.random() * 20;
    s.style.transform = `rotate(${angle}deg)`;
    document.getElementById('hero-space-001').appendChild(s);

    gsap.timeline({
      onComplete: () => { s.remove(); scheduleShoot(); }
    })
      .to(s, { opacity: 0.85, duration: 0.06, ease: 'none' })
      .to(s, { x: len * 2.5, opacity: 0, duration: 0.5, ease: 'power2.in' });
  }

  function scheduleShoot() {
    gsap.delayedCall(3 + Math.random() * 6, spawnShootingStar);
  }

  // ── Main animation ──────────────────────────────────────────────
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 1) return;

    const section  = document.getElementById('hero-space-001');
    const grid     = document.getElementById('hs1-grid');
    const nameEl   = document.getElementById('hs1-name');
    const nameHalo = document.getElementById('hs1-name-halo');
    const outline  = section.querySelector('.hs1-name-outline');
    const coords   = document.getElementById('hs1-coords');
    const titleRow = document.getElementById('hs1-title-row');
    const subtitle = document.getElementById('hs1-subtitle');
    const capsule  = document.getElementById('hs1-capsule');
    const ring1    = document.getElementById('hs1-ring1');
    const ring2    = document.getElementById('hs1-ring2');
    const orbDot   = document.getElementById('hs1-orb-dot');
    const crosshair= document.getElementById('hs1-crosshair');
    const scan     = document.getElementById('hs1-scan');
    const horizon  = document.getElementById('hs1-horizon');
    const teleTL   = document.getElementById('hs1-tele-tl');
    const teleBR   = document.getElementById('hs1-tele-br');
    const cta      = document.getElementById('hs1-cta');
    const nebulae  = section.querySelectorAll('.hs1-nebula-blob');

    const tl = gsap.timeline();

    // 1. ENTRANCE ─────────────────────────────────────────────────

    // Scan sweep top → bottom
    tl.set(scan, { top: '0%', opacity: 0 })
      .to(scan, { opacity: 0.6, duration: 0.08, ease: 'none' }, 0)
      .to(scan, { top: '100%', duration: 0.9, ease: 'power1.inOut' }, 0.08)
      .to(scan, { opacity: 0, duration: 0.15, ease: 'none' }, 0.88)

    // Grid materialise
      .fromTo(grid,
        { opacity: 0, scale: 1.06 },
        { opacity: 1, scale: 1, duration: 1.4, ease: 'power2.out' }, 0.05)

    // Nebulae drift in
      .fromTo(nebulae,
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: (i) => [0.07,0.06,0.05,0.08][i],
          duration: 2, ease: 'power2.out', stagger: 0.12 }, 0.1)

    // Orbit rings appear
      .fromTo(ring1,
        { opacity: 0, scale: 0.6 },
        { opacity: 0.12, scale: 1, duration: 1.0, ease: 'expo.out' }, 0.35)
      .fromTo(ring2,
        { opacity: 0, scale: 0.7 },
        { opacity: 0.07, scale: 1, duration: 1.1, ease: 'expo.out' }, 0.5)
      .to(orbDot, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.8)

    // Crosshair flash
      .to(crosshair, { opacity: 0.35, duration: 0.2, ease: 'power2.out' }, 0.65)
      .to(crosshair, { opacity: 0.12, duration: 0.5, ease: 'power2.out' }, 0.85)

    // Telemetry data
      .to(teleTL, { opacity: 1, x: 0, duration: 0.55, ease: 'power3.out' }, 0.7)
      .to(teleBR, { opacity: 1, x: 0, duration: 0.55, ease: 'power3.out' }, 0.82)

    // Coords label
      .fromTo(coords,
        { opacity: 0, y: -10 },
        { opacity: 1, y: 0, duration: 0.55, ease: 'power3.out' }, 0.9)

    // Name outline flash then fill
      .fromTo(outline,
        { opacity: 0.5 },
        { opacity: 0, duration: 0.35, ease: 'power2.in' }, 1.0)
      .fromTo(nameEl,
        { opacity: 0, y: clamp(20, 8, 36), filter: 'blur(10px)' },
        { opacity: 1, y: 0, filter: 'blur(0px)', duration: 1.0, ease: 'expo.out' }, 1.05)
      .to(nameHalo, { opacity: 0.22, duration: 0.8, ease: 'power2.out' }, 1.15)

    // Title row
      .fromTo(titleRow,
        { opacity: 0, scaleX: 0.88 },
        { opacity: 1, scaleX: 1, duration: 0.55, ease: 'back.out(1.5)' }, 1.5)

    // Subtitle
      .fromTo(subtitle,
        { opacity: 0, y: 10 },
        { opacity: 0.5, y: 0, duration: 0.55, ease: 'power2.out' }, 1.65)

    // Capsule
      .fromTo(capsule,
        { opacity: 0, scale: 0.88, y: 8 },
        { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: 'back.out(2)' }, 1.82)

    // Horizon line
      .fromTo(horizon,
        { opacity: 0, scaleX: 0 },
        { opacity: 0.35, scaleX: 1, duration: 0.7, ease: 'power3.out', transformOrigin: 'center' }, 1.9)

    // CTA
      .fromTo(cta,
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out' }, 2.1);

    // Start shooting stars after entrance
    gsap.delayedCall(2.5, scheduleShoot);

    // 2. AMBIENT LOOPS ────────────────────────────────────────────

    // Nebula drift
    nebulae.forEach((n, i) => {
      const dur = 8 + i * 1.5;
      gsap.to(n, {
        x: () => (Math.random() - 0.5) * 40,
        y: () => (Math.random() - 0.5) * 30,
        scale: 0.95 + Math.random() * 0.1,
        duration: dur, ease: 'sine.inOut', yoyo: true, repeat: -1,
        delay: i * 0.8
      });
    });

    // Orbit ring slow spin
    gsap.to(ring1, { rotation: 360, duration: 28, ease: 'linear', repeat: -1, transformOrigin: '50% 50%' });
    gsap.to(ring2, { rotation: -360, duration: 42, ease: 'linear', repeat: -1, transformOrigin: '50% 50%' });

    // Orbit dot spin on its ring
    gsap.to(orbDot, {
      rotation: 360, duration: 14,
      ease: 'linear', repeat: -1,
      transformOrigin: `50% calc(50% + clamp(90px, 16vw, 220px))`
    });

    // Dot pulse
    gsap.to(orbDot, {
      scale: 1.8, opacity: 0.4,
      duration: 1.2, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.2
    });

    // Name halo breathe
    gsap.to(nameHalo, {
      opacity: 0.1, scale: 1.06,
      duration: 3.2, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2.5
    });

    // Grid subtle zoom
    gsap.to(grid, {
      scale: 1.04, opacity: 0.7,
      duration: 9, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2
    });

    // Horizon shimmer
    gsap.to(horizon, {
      opacity: 0.18, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 3
    });

    // Capsule glow pulse
    gsap.to(capsule, {
      boxShadow: '0 0 clamp(10px,2vw,24px) var(--accent)',
      duration: 2.2, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2.8
    });

    // CTA pip pulse
    gsap.to(document.getElementById('hs1-cta-pip'), {
      scale: 1.7, opacity: 0.25,
      duration: 1.0, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2.5
    });

    // Telemetry flicker
    function flickerTele() {
      gsap.delayedCall(3 + Math.random() * 5, function () {
        const lines = section.querySelectorAll('.hs1-tele-line');
        const pick = lines[Math.floor(Math.random() * lines.length)];
        gsap.timeline({ onComplete: flickerTele })
          .to(pick, { opacity: 0.05, duration: 0.05 })
          .to(pick, { opacity: pick.classList.contains('bright') ? 0.55 : 0.35, duration: 0.12 });
      });
    }
    gsap.delayedCall(3.5, flickerTele);
  });

  // 3. INTERACTION REACTION ─────────────────────────────────────
  document.getElementById('hero-space-001').addEventListener('click', function () {
    const section  = document.getElementById('hero-space-001');
    const nameEl   = document.getElementById('hs1-name');
    const nameHalo = document.getElementById('hs1-name-halo');
    const ring1    = document.getElementById('hs1-ring1');
    const ring2    = document.getElementById('hs1-ring2');
    const scan     = document.getElementById('hs1-scan');
    const capsule  = document.getElementById('hs1-capsule');

    // Ripple outward
    gsap.timeline()
      .to(scan, { top: '0%', opacity: 0.5, duration: 0 })
      .to(scan, { top: '100%', opacity: 0, duration: 0.55, ease: 'power2.inOut' }, 0)
      .to(nameHalo, { opacity: 0.6, scale: 1.18, duration: 0.12, ease: 'power2.out' }, 0)
      .to(nameHalo, { opacity: 0.18, scale: 1, duration: 0.6, ease: 'power2.out' }, 0.12)
      .to(nameEl, { scale: 1.03, duration: 0.09, ease: 'none' }, 0)
      .to(nameEl, { scale: 1, duration: 0.45, ease: 'elastic.out(1, 0.38)' }, 0.09)
      .to(ring1, { opacity: 0.35, scale: 1.06, duration: 0.12, ease: 'power2.out' }, 0)
      .to(ring1, { opacity: 0.12, scale: 1, duration: 0.55, ease: 'power2.out' }, 0.12)
      .to(ring2, { opacity: 0.22, scale: 1.04, duration: 0.15, ease: 'power2.out' }, 0.06)
      .to(ring2, { opacity: 0.07, scale: 1, duration: 0.6, ease: 'power2.out' }, 0.21)
      .to(capsule, { scale: 1.05, duration: 0.1, ease: 'none' }, 0)
      .to(capsule, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.4)' }, 0.1);

    // Spawn burst stars
    for (let i = 0; i < 8; i++) {
      const s = document.createElement('div');
      s.className = 'hs1-star-particle';
      const size = 1.5 + Math.random() * 3;
      s.style.cssText = `width:${size}px;height:${size}px;top:50%;left:50%;position:absolute;z-index:11;border-radius:50%;pointer-events:none;`;
      section.appendChild(s);
      const angle = (i / 8) * Math.PI * 2;
      const dist = clamp(80, 40, 160) + Math.random() * 80;
      gsap.timeline({ onComplete: () => s.remove() })
        .set(s, { opacity: 0.9, x: 0, y: 0 })
        .to(s, {
          x: Math.cos(angle) * dist,
          y: Math.sin(angle) * dist,
          opacity: 0,
          duration: 0.6 + Math.random() * 0.3,
          ease: 'power2.out'
        });
    }

    if (window.glitchEvents && window.glitchEvents.advance) {
      gsap.delayedCall(0.16, () => window.glitchEvents.advance());
    }
  });

  function clamp(mid, min, max) {
    return Math.max(min, Math.min(max, mid));
  }

})();
</script>
