  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

  .mem-space-001-root {

  /* ── Star canvas ── */

  /* ── Nebula bg ── */

      radial-gradient(ellipse 50% 40% at 80% 70%, rgba(0,30,70,0.5) 0%, transparent 65%),
      radial-gradient(ellipse 35% 30% at 55% 20%, rgba(80,10,60,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 40% 35% at 30% 80%, rgba(5,20,60,0.4) 0%, transparent 60%);
  }

  /* ── Vignette ── */
  .mem-space-001-vignette {
    position: absolute;

    pointer-events: none;
    background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 35%, rgba(0,0,0,0.92) 100%);

  /* ── Grain ── */
  .mem-space-001-grain {
    position: absolute;
    inset: 0;
    z-index: 21;

    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");

    animation: mem-space-001-grainShift 0.4s steps(1) infinite;
  }
  @keyframes mem-space-001-grainShift {
    0%   { background-position: 0 0; }

  /* ── Memory cards arranged in triangle ── */

  /* Corner marks on card */

  .mem-space-001-card-corner::before,

</style>

<script>
(function () {

  /* ── Cursor ── */
  const cur  = document.getElementById('mem-space-001-cursor');
  const ring = document.getElementById('mem-space-001-cursor-ring');
  let mx = innerWidth / 2, my = innerHeight / 2;
  let rx = mx, ry = my;
  document.addEventListener('mousemove', function (e) {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px';
    cur.style.top  = my + 'px';
  });
  (function trackRing() {
    rx += (mx - rx) * 0.09;
    ry += (my - ry) * 0.09;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(trackRing);
  })();

  /* ── Star canvas ── */
  const canvas = document.getElementById('mem-space-001-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function mkStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      base: Math.random() * 0.6 + 0.1,
      alpha: 0,
      speed: Math.random() * 0.008 + 0.003,
      phase: Math.random() * Math.PI * 2,
      color: Math.random() > 0.85
        ? 'rgba(200,180,255,' : 'rgba(255,255,255,'
    };
  }
  for (let i = 0; i < 220; i++) stars.push(mkStar());

  let tick = 0;
  function drawStars() {
    ctx.clearRect(0, 0, W, H);
    tick += 0.012;
    stars.forEach(function (s) {
      s.alpha = s.base * (0.5 + 0.5 * Math.sin(tick * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color + s.alpha + ')';
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();

  /* ── Mouse parallax ── */
  document.addEventListener('mousemove', function (e) {
    const ox = (e.clientX / innerWidth  - 0.5) * 20;
    const oy = (e.clientY / innerHeight - 0.5) * 12;
    gsap.to('#mem-space-001-canvas', { x: ox * 0.4, y: oy * 0.4, duration: 1.4, ease: 'power2.out', overwrite: 'auto' });
    gsap.to('#mem-space-001-constellation', { x: ox * 0.2, y: oy * 0.2, duration: 1.6, ease: 'power2.out', overwrite: 'auto' });
  });

  /* ── Flicker ── */
  function flicker() {
    const fl = document.getElementById('mem-space-001-flicker');
    gsap.timeline()
      .to(fl, { opacity: 0.08, duration: 0.04 })
      .to(fl, { opacity: 0,    duration: 0.05 })
      .to(fl, { opacity: 0.04, duration: 0.03 })
      .to(fl, { opacity: 0,    duration: 0.06 });
  }

  /* ── Shooting star ── */
  function shootingStar() {
    const el = document.getElementById('mem-space-001-shoot');
    const startX = Math.random() * 60;
    const startY = Math.random() * 40;
    gsap.set(el, { left: startX + '%', top: startY + '%', opacity: 0 });
    gsap.timeline()
      .to(el, { opacity: 1, duration: 0.08 })
      .to(el, { left: (startX + 18) + '%', top: (startY + 10) + '%', opacity: 0, duration: 0.55, ease: 'power2.in' });
    setTimeout(shootingStar, 4000 + Math.random() * 9000);
  }

  /* ── Update SVG lines to card positions ── */
  function updateLines() {
    const svg = document.getElementById('mem-space-001-lines');
    const svgRect = svg.getBoundingClientRect();
    const cx = svgRect.width / 2;
    const cy = svgRect.height / 2;

    function cardCenter(id) {
      const el = document.getElementById(id);
      const r  = el.getBoundingClientRect();
      return {
        x: ((r.left + r.width  / 2) / svgRect.width)  * 1000,
        y: ((r.top  + r.height / 2) / svgRect.height) * 1000
      };
    }

    const pts = [
      cardCenter('mem-space-001-c1'),
      cardCenter('mem-space-001-c2'),
      cardCenter('mem-space-001-c3')
    ];

    ['mem-space-001-line1','mem-space-001-line2','mem-space-001-line3'].forEach(function(id, i) {
      const ln = document.getElementById(id);
      const cx500 = 500, cy500 = 500;
      ln.setAttribute('x1', cx500);
      ln.setAttribute('y1', cy500);
      ln.setAttribute('x2', pts[i].x);
      ln.setAttribute('y2', pts[i].y);
    });
  }

  /* ── ENTER ANIMATION ── */
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 3) return;

    flicker();

    const orbits  = ['mem-space-001-o1','mem-space-001-o2','mem-space-001-o3'].map(function(id){ return document.getElementById(id); });
    const center  = document.getElementById('mem-space-001-center');
    const header  = document.getElementById('mem-space-001-header');
    const linesEl = document.getElementById('mem-space-001-lines');
    const caption = document.getElementById('mem-space-001-caption');
    const cards   = [
      document.getElementById('mem-space-001-c1'),
      document.getElementById('mem-space-001-c2'),
      document.getElementById('mem-space-001-c3'),
    ];

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    /* Orbits expand */
    tl.to(orbits, {
      scale: 1,
      opacity: 1,
      duration: 1.4,
      stagger: 0.18,
      ease: 'expo.out'
    }, 0)

    /* Center star core */
    .to(center, { opacity: 1, scale: 1, duration: 0.8 }, 0.3)

    /* Header */
    .fromTo(header,
      { opacity: 0, y: -18 },
      { opacity: 1, y: 0, duration: 0.7 }, 0.5)

    /* Cards stagger in */
    .fromTo(cards,
      { opacity: 0, scale: 0.82, y: 20 },
      { opacity: 1, scale: 1, y: 0, duration: 0.8, stagger: 0.18, ease: 'expo.out' }, 0.75)

    /* Fix c3 transform after animation */
    .call(function () {
      cards[2].classList.add('visible');
    }, [], 1.5)

    /* Lines appear */
    .call(updateLines, [], 1.0)
    .to(linesEl, { opacity: 1, duration: 0.8 }, 1.05)

    /* Caption */
    .fromTo(caption,
      { opacity: 0, y: 10 },
      { opacity: 1, y: 0, duration: 0.6 }, 1.5)

    /* Shooting star after entrance */
    .call(function () { setTimeout(shootingStar, 1200); }, [], 1.6);

    /* ── Ambient: orbits slow rotate ── */
    gsap.to(orbits[0], { rotation: 360,  duration: 40, repeat: -1, ease: 'none', transformOrigin: '50% 50%', delay: 1.5 });
    gsap.to(orbits[1], { rotation: -360, duration: 65, repeat: -1, ease: 'none', transformOrigin: '50% 50%', delay: 1.5 });
    gsap.to(orbits[2], { rotation: 360,  duration: 90, repeat: -1, ease: 'none', transformOrigin: '50% 50%', delay: 1.5 });

    /* ── Ambient: center core pulse ── */
    gsap.to('.mem-space-001-center-core', {
      boxShadow: '0 0 28px 8px rgba(200,180,255,1), 0 0 70px 24px rgba(120,80,200,0.6)',
      duration: 2.2,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 1.5
    });

    /* ── Ambient: cards subtle float ── */
    gsap.to(cards[0], { y: -10, duration: 4.2, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.3 });
    gsap.to(cards[1], { y: 10,  duration: 3.8, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.8 });
    gsap.to(cards[2], { y: -7,  duration: 5.0, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.6 });

    /* Periodic flicker */
    function schedFlicker() {
      setTimeout(function () { flicker(); schedFlicker(); }, 6000 + Math.random() * 12000);
    }
    setTimeout(schedFlicker, 3500);
  });

  /* Preview auto-fire */
  setTimeout(function () {
    document.dispatchEvent(new CustomEvent('glitch:enter', { detail: { index: 3 } }));
  }, 300);

})();
</script>
