<script>
(function() {

  /* ── Cursor ── */
  const cur  = document.getElementById('mem-cin-001-cursor');
  const ring = document.getElementById('mem-cin-001-cursor-ring');
  let mx = innerWidth / 2, my = innerHeight / 2;
  let rx = mx, ry = my;

  document.addEventListener('mousemove', function(e) {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px';
    cur.style.top  = my + 'px';
  });

  (function trackRing() {
    rx += (mx - rx) * 0.1;
    ry += (my - ry) * 0.1;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(trackRing);
  })();

  /* ── Sprocket holes ── */
  function buildSprockets(id) {
    const el = document.getElementById(id);
    const count = Math.ceil(window.innerWidth / 26) + 4;
    for (let i = 0; i < count; i++) {
      const h = document.createElement('div');
      h.className = 'mem-cin-001-hole';
      el.appendChild(h);
    }
  }
  buildSprockets('mem-cin-001-sprocket-top');
  buildSprockets('mem-cin-001-sprocket-bot');

  /* ── Scanline ambient ── */
  const scanline = document.getElementById('mem-cin-001-scanline');
  gsap.to(scanline, {
    top: '100%',
    duration: 6,
    repeat: -1,
    ease: 'none',
    delay: 2
  });

  /* ── Flicker helper ── */
  function flicker() {
    const fl = document.getElementById('mem-cin-001-flicker');
    gsap.timeline()
      .to(fl, { opacity: 0.06, duration: 0.04 })
      .to(fl, { opacity: 0,    duration: 0.04 })
      .to(fl, { opacity: 0.03, duration: 0.03 })
      .to(fl, { opacity: 0,    duration: 0.05 });
  }

  /* ── Mouse parallax on track ── */
  const track = document.getElementById('mem-cin-001-track');
  document.addEventListener('mousemove', function(e) {
    const ox = (e.clientX / innerWidth  - 0.5) * 24;
    const oy = (e.clientY / innerHeight - 0.5) * 10;
    gsap.to(track, { x: 'calc(-50% + ' + ox + 'px)', y: 'calc(-50% + ' + oy + 'px)', duration: 1.2, ease: 'power2.out', overwrite: 'auto' });
  });

  /* ── ENTER ANIMATION ── */
  document.addEventListener('glitch:enter', function(e) {
    if (e.detail.index !== 3) return;

    const barTop    = document.getElementById('mem-cin-001-bar-top');
    const barBot    = document.getElementById('mem-cin-001-bar-bot');
    const spTop     = document.getElementById('mem-cin-001-sprocket-top');
    const spBot     = document.getElementById('mem-cin-001-sprocket-bot');
    const counter   = document.getElementById('mem-cin-001-counter');
    const scene     = document.getElementById('mem-cin-001-scene');
    const heading   = document.getElementById('mem-cin-001-heading');
    const caption   = document.getElementById('mem-cin-001-caption');
    const frames    = [
      document.getElementById('mem-cin-001-f0'),
      document.getElementById('mem-cin-001-f1'),
      document.getElementById('mem-cin-001-f2'),
      document.getElementById('mem-cin-001-f3'),
      document.getElementById('mem-cin-001-f4'),
    ];

    flicker();

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    /* Letterbox slam */
    tl.to([barTop, barBot], { scaleY: 1, duration: 0.35, ease: 'expo.out' }, 0)

    /* Sprocket holes appear */
    .to([spTop, spBot], { opacity: 1, duration: 0.4 }, 0.2)

    /* Counter / scene labels */
    .to([counter, scene], { opacity: 1, duration: 0.5, stagger: 0.08 }, 0.4)

    /* Heading drop */
    .fromTo(heading,
      { opacity: 0, y: -20 },
      { opacity: 1, y: 0, duration: 0.6 }, 0.55)

    /* Track reveal */
    .fromTo(track,
      { opacity: 0, scale: 0.92 },
      { opacity: 1, scale: 1, duration: 0.9, ease: 'expo.out' }, 0.65)

    /* Frames stagger in */
    .fromTo(frames,
      { opacity: 0, y: 28, rotateY: 8 },
      {
        opacity: function(i) { return i === 0 || i === 4 ? 0.45 : 1; },
        y: 0,
        rotateY: 0,
        duration: 0.75,
        stagger: 0.1,
        ease: 'expo.out'
      }, 0.8)

    /* Caption */
    .fromTo(caption,
      { opacity: 0, y: 12 },
      { opacity: 1, y: 0, duration: 0.6 }, 1.4)

    /* Glitch flash at end */
    .call(flicker, [], 1.6);

    /* ── Ambient: sprocket crawl ── */
    gsap.to(spTop, {
      backgroundPosition: '200px 0',
      duration: 12,
      repeat: -1,
      ease: 'none',
      delay: 1
    });
    gsap.to(spBot, {
      backgroundPosition: '-200px 0',
      duration: 14,
      repeat: -1,
      ease: 'none',
      delay: 1
    });

    /* ── Ambient: center frame breathe ── */
    gsap.to(frames[2], {
      boxShadow: '0 0 60px rgba(255,255,255,0.07), 0 0 0 1px rgba(255,255,255,0.14)',
      duration: 2.8,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 1.8
    });

    /* ── Ambient: side frames subtle float ── */
    gsap.to(frames[1], {
      y: -8,
      duration: 3.5,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 0.4
    });
    gsap.to(frames[3], {
      y: 8,
      duration: 4,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 1
    });

    /* ── Periodic flicker ── */
    function schedFlicker() {
      setTimeout(function() { flicker(); schedFlicker(); }, 5000 + Math.random() * 10000);
    }
    setTimeout(schedFlicker, 3000);
  });

  /* Preview auto-fire */
  setTimeout(function() {
    document.dispatchEvent(new CustomEvent('glitch:enter', { detail: { index: 3 } }));
  }, 300);

})();
</script>
