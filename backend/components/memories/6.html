  .mem-d002-memories-list {

  .mem-d002-memory-item {
    display: flex;
    align-items: flex-start;
    gap: clamp(12px, 2vw, 22px);
    padding: clamp(12px, 1.8vh, 20px) clamp(14px, 2vw, 24px);
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
    position: relative;
    cursor: default;
    transition: background 0.4s ease, border-color 0.4s ease;
  }

  .mem-d002-memory-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .mem-d002-memory-item:hover::before {
    transform: scaleY(1);
  }

  .mem-d002-memory-item:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.12);
  }

  .mem-d002-memory-index {
    font-family: var(--font-body);

  }

  .mem-d002-memory-text {

  }

  .mem-d002-bottom-rule {
    width: 100%;

  }

  .mem-d002-rule-line {

    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .mem-d002-rule-dot {
    width: 4px;

    border-radius: 50%;

    opacity: 0.5;
  }

  .mem-d002-rule-text {
    font-family: var(--font-body);
    font-size: clamp(9px, 0.85vw, 11px);

    color: rgba(255,255,255,0.2);
  }

  .mem-d002-cursor-glow {
    position: fixed;
    width: 200px;
    height: 200px;
    border-radius: 50%;

    pointer-events: none;
    z-index: 0;
    transform: translate(-50%, -50%);

  }

  .mem-d002-ambient-particle {
    position: absolute;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 3;
  }
</style>

<script>
(function() {
  const SECTION_INDEX = 3;

  function buildConstellation() {
    const svg = document.getElementById('mem-d002-svg-constellation');
    if (!svg) return;
    const stars = [
      [80,60],[200,120],[340,80],[480,150],[600,90],[160,220],[300,190],[440,240],[560,180],[100,300],
      [240,310],[380,280],[520,320],[650,260],[140,160],[420,100],[260,340],[620,350],[50,200],[700,150]
    ];
    const lines = [
      [0,1],[1,2],[2,3],[3,4],[1,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[2,6],[3,7],[14,1],[2,15],[10,16],[8,17]
    ];
    lines.forEach(([a,b]) => {
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', stars[a][0]);
      line.setAttribute('y1', stars[a][1]);
      line.setAttribute('x2', stars[b][0]);
      line.setAttribute('y2', stars[b][1]);
      line.setAttribute('stroke','rgba(255,255,255,0.07)');
      line.setAttribute('stroke-width','0.8');
      svg.appendChild(line);
    });
    stars.forEach(([cx,cy], i) => {
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('r', i % 5 === 0 ? 2.5 : 1.5);
      circle.setAttribute('fill','rgba(255,255,255,0.5)');
      svg.appendChild(circle);
    });
  }

  function checkPhoto() {
    const photo = document.getElementById('mem-d002-photo');
    const placeholder = document.getElementById('mem-d002-placeholder');
    if (!photo || !placeholder) return;
    const src = photo.getAttribute('src') || '';
    if (src === 'NONE' || src === '' || src.includes('--PHOTO_1--')) {
      photo.style.display = 'none';
      placeholder.style.display = 'flex';
      buildConstellation();
    }
  }

  checkPhoto();

  document.addEventListener('glitch:enter', function(e) {
    if (e.detail.index !== SECTION_INDEX) return;

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    gsap.set('#mem-d002-strip-left', { x: -40, opacity: 0 });
    gsap.set('#mem-d002-strip-right', { x: 40, opacity: 0 });
    gsap.set('#mem-d002-label', { opacity: 0, y: -12 });
    gsap.set('#mem-d002-frame', { opacity: 0, scaleX: 0.96, filter: 'blur(8px)' });
    gsap.set('#mem-d002-caption', { opacity: 0, y: 10 });
    gsap.set('#mem-d002-memories-list', { opacity: 0 });
    gsap.set('.mem-d002-memory-item', { opacity: 0, x: -20 });
    gsap.set('#mem-d002-bottom-rule', { opacity: 0 });

    tl
      .to(['#mem-d002-strip-left','#mem-d002-strip-right'], {
        x: 0, opacity: 1, duration: 0.9, stagger: 0.1
      })
      .to('#mem-d002-label', { opacity: 1, y: 0, duration: 0.7 }, '-=0.5')
      .to('#mem-d002-frame', {
        opacity: 1, scaleX: 1,
        filter: 'blur(0px)',
        duration: 1.1,
        ease: 'power2.out'
      }, '-=0.3')
      .to('#mem-d002-caption', { opacity: 1, y: 0, duration: 0.6 }, '-=0.4')
      .to('#mem-d002-memories-list', { opacity: 1, duration: 0.01 }, '-=0.1')
      .to('.mem-d002-memory-item', {
        opacity: 1, x: 0, duration: 0.6, stagger: 0.18, ease: 'power2.out'
      })
      .to('#mem-d002-bottom-rule', { opacity: 1, duration: 0.5 }, '-=0.2');

    // Ambient flicker on frame
    gsap.to('#mem-d002-frame', {
      filter: 'brightness(0.97)',
      duration: 0.08,
      yoyo: true,
      repeat: -1,
      repeatDelay: gsap.utils.random(4, 9),
      ease: 'none',
      delay: 2
    });

    // Film strip idle drift
    gsap.to(['#mem-d002-strip-left','#mem-d002-strip-right'], {
      y: -8,
      duration: 6,
      yoyo: true,
      repeat: -1,
      ease: 'sine.inOut',
      stagger: 0.5,
      delay: 1.5
    });

    // Ambient particles float
    ['#mem-d002-p1','#mem-d002-p2','#mem-d002-p3','#mem-d002-p4'].forEach((id, i) => {
      gsap.to(id, {
        opacity: gsap.utils.random(0.3, 0.7),
        y: gsap.utils.random(-18, 18),
        x: gsap.utils.random(-10, 10),
        duration: gsap.utils.random(4, 7),
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
        delay: i * 0.6 + 2
      });
    });

    // Constellation star pulse if visible
    const svgStars = document.querySelectorAll('#mem-d002-svg-constellation circle');
    if (svgStars.length) {
      svgStars.forEach((star, i) => {
        gsap.to(star, {
          opacity: gsap.utils.random(0.3, 1),
          duration: gsap.utils.random(2, 5),
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.15
        });
      });
    }
  });

  // Cursor glow
  const glow = document.getElementById('mem-d002-cursor-glow');
  const root = document.getElementById('mem-d002-root');
  if (root && glow) {
    root.addEventListener('mousemove', function(e) {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
      glow.style.opacity = '1';
    });
    root.addEventListener('mouseleave', function() {
      glow.style.opacity = '0';
    });
  }
})();
</script>
