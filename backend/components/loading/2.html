<style>
  .lts002-root {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    cursor: none;
  }

  .lts002-noise {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    pointer-events: none;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .lts002-scanlines {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    opacity: 0;
  }

  .lts002-vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 40%,
      rgba(0,0,0,0.7) 100%
    );
  }

  .lts002-snake-field {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .lts002-snake {
    position: absolute;
    pointer-events: none;
    opacity: 0;
  }

  .lts002-glitch-bar {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    z-index: 20;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  .lts002-center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(14px, 2.8vh, 28px);
    text-align: center;
    padding: 0 clamp(24px, 8vw, 100px);
  }

  .lts002-crown-wrap {
    width: clamp(40px, 5.5vw, 72px);
    height: clamp(40px, 5.5vw, 72px);
    opacity: 0;
    position: relative;
  }

  .lts002-crown-wrap svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 10px var(--accent));
  }

  .lts002-eyebrow {
    font-family: var(--font-body);
    font-size: clamp(0.5rem, 1.1vw, 0.68rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    margin: 0;
  }

  .lts002-title {
    font-family: var(--font-heading);
    font-size: clamp(2rem, 5.5vw, 4.4rem);
    color: var(--text);
    letter-spacing: 0.06em;
    margin: 0;
    line-height: 1.05;
    opacity: 0;
    position: relative;
  }

  .lts002-title-ghost {
    position: absolute;
    inset: 0;
    font-family: var(--font-heading);
    font-size: clamp(2rem, 5.5vw, 4.4rem);
    color: var(--accent);
    letter-spacing: 0.06em;
    line-height: 1.05;
    opacity: 0;
    clip-path: inset(0 0 100% 0);
    pointer-events: none;
    white-space: nowrap;
  }

  .lts002-title span {
    color: var(--accent);
    position: relative;
  }

  .lts002-divider {
    width: clamp(40px, 8vw, 100px);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
  }

  .lts002-loading-line {
    font-family: var(--font-body);
    font-size: clamp(0.72rem, 1.5vw, 0.95rem);
    color: var(--text);
    opacity: 0;
    letter-spacing: 0.08em;
    font-style: italic;
    max-width: 400px;
    line-height: 1.6;
  }

  .lts002-bar-outer {
    width: clamp(180px, 32vw, 340px);
    height: 1px;
    background: rgba(255,255,255,0.1);
    position: relative;
    opacity: 0;
  }

  .lts002-bar-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent), 0 0 30px var(--accent);
  }

  .lts002-bar-dot {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    right: -2px;
    box-shadow: 0 0 8px var(--accent);
  }

  .lts002-bar-percent {
    position: absolute;
    right: 0;
    top: 8px;
    font-size: clamp(0.5rem, 0.9vw, 0.6rem);
    letter-spacing: 0.2em;
    color: var(--accent);
    opacity: 0.6;
    font-family: var(--font-body);
  }

  .lts002-tagline {
    font-family: var(--font-body);
    font-size: clamp(0.5rem, 0.95vw, 0.65rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0;
    margin: 0;
  }

  .lts002-corner {
    position: absolute;
    width: clamp(18px, 2.5vw, 30px);
    height: clamp(18px, 2.5vw, 30px);
    opacity: 0;
    z-index: 10;
  }

  .lts002-corner svg {
    width: 100%;
    height: 100%;
  }

  .lts002-corner-tl { top: clamp(16px,3vh,32px); left: clamp(16px,3vw,36px); }
  .lts002-corner-tr { top: clamp(16px,3vh,32px); right: clamp(16px,3vw,36px); transform: scaleX(-1); }
  .lts002-corner-bl { bottom: clamp(16px,3vh,32px); left: clamp(16px,3vw,36px); transform: scaleY(-1); }
  .lts002-corner-br { bottom: clamp(16px,3vh,32px); right: clamp(16px,3vw,36px); transform: scale(-1,-1); }

  .lts002-rep-word {
    position: absolute;
    font-family: var(--font-heading);
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    z-index: 1;
    font-size: clamp(0.55rem, 1vw, 0.8rem);
    white-space: nowrap;
  }

  .lts002-cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
    transform: translate(-50%, -50%);
    opacity: 0;
    box-shadow: 0 0 10px var(--accent);
  }

  .lts002-cursor-ring {
    position: fixed;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    opacity: 0;
  }

  .lts002-sig {
    position: absolute;
    bottom: clamp(14px, 2.5vh, 28px);
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.48rem, 0.85vw, 0.62rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0;
    white-space: nowrap;
    z-index: 10;
  }
</style>

<p class="lts002-tagline" id="lts002-tagline">loading your story &nbsp;/&nbsp; do not look away</p></div>
  <div class="lts002-sig" id="lts002-sig">The Glitch Protocol &nbsp;·&nbsp; Reputation Edition</div>
  <div class="lts002-cursor" id="lts002-cursor"></div>
  <div class="lts002-cursor-ring" id="lts002-cursor-ring"></div>
</div>
<script>
(function () {

  const REP_WORDS = [
    'reputation','look what you made me do','i don\'t trust nobody',
    'the old taylor can\'t come to the phone','i\'m sorry','call it what you want',
    'delicate','gorgeous','so it goes','dancing with our hands tied',
    'new year\'s day','this is why we can\'t have nice things','end game',
  ];

  const SNAKE_PATHS = [
    'M-20,100 C80,60 160,140 280,80 C380,30 460,120 580,70',
    'M-20,200 C60,160 140,240 260,180 C360,130 480,200 600,150',
    'M580,50 C460,90 380,20 260,80 C140,130 60,50 -20,100',
    'M-20,300 C100,260 200,330 300,280 C400,230 500,310 620,260',
    'M620,350 C500,310 400,380 300,330 C200,280 80,360 -20,300',
  ];

  // --- Spawn SVG snakes ---
  const snakeField = document.getElementById('lts002-snakes');

  function buildSnakes() {
    SNAKE_PATHS.forEach((d, i) => {
      const ns = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 600 400');
      svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      svg.style.cssText = `
        position:absolute;inset:0;width:100%;height:100%;
        opacity:0;pointer-events:none;overflow:visible;
      `;
      svg.dataset.idx = i;

      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', 'var(--accent)');
      path.setAttribute('stroke-width', '0.8');
      path.setAttribute('opacity', '0.25');
      path.setAttribute('stroke-dasharray', '6 10');

      svg.appendChild(path);
      snakeField.appendChild(svg);
    });
  }

  buildSnakes();

  // --- Floating rep words ---
  function spawnRepWord() {
    const el = document.createElement('div');
    el.className = 'lts002-rep-word';
    el.textContent = REP_WORDS[Math.floor(Math.random() * REP_WORDS.length)];
    el.style.left  = Math.random() * 80 + 5 + '%';
    el.style.top   = Math.random() * 70 + 10 + '%';
    el.style.fontSize = `clamp(0.45rem, ${0.5 + Math.random() * 0.8}vw, 0.85rem)`;
    document.getElementById('lts002-root').appendChild(el);

    gsap.fromTo(el,
      { opacity: 0, y: 8, scale: 0.9 },
      {
        opacity: 0.06 + Math.random() * 0.07,
        y: -10,
        scale: 1,
        duration: 3 + Math.random() * 2,
        ease: 'power1.out',
        onComplete: () => {
          gsap.to(el, { opacity: 0, duration: 1.2, onComplete: () => el.remove() });
        }
      }
    );
  }

  // --- Glitch effect ---
  function triggerGlitch() {
    const bar  = document.getElementById('lts002-gbar');
    const bar2 = document.getElementById('lts002-gbar2');
    const title = document.getElementById('lts002-title');
    const ghost = document.getElementById('lts002-title-ghost');

    const tl = gsap.timeline();
    const yPct = Math.random() * 80 + 10;
    const y2   = Math.random() * 80 + 10;

    tl.set(bar,  { top: yPct + '%', opacity: 0.7, scaleX: Math.random() * 0.5 + 0.5 })
      .set(bar2, { top: y2   + '%', opacity: 0.4, scaleX: Math.random() * 0.3 + 0.2 })
      .to(title, { x: 4, skewX: 2, duration: 0.06, ease: 'none' })
      .to(ghost, { opacity: 0.3, clipPath: 'inset(30% 0 20% 0)', duration: 0.06 }, '<')
      .to(title, { x: -3, skewX: -1, duration: 0.06, ease: 'none' })
      .to(title, { x: 0, skewX: 0, duration: 0.08 })
      .to(ghost, { opacity: 0, clipPath: 'inset(0 0 100% 0)', duration: 0.12 }, '<')
      .to([bar, bar2], { opacity: 0, duration: 0.12 });

    // scanline flash
    gsap.fromTo('#lts002-scanlines', { opacity: 0.18 }, { opacity: 0, duration: 0.25 });
  }

  // --- Cursor ---
  const cursor     = document.getElementById('lts002-cursor');
  const cursorRing = document.getElementById('lts002-cursor-ring');
  let   cursorOn   = false;

  document.addEventListener('mousemove', (e) => {
    if (!cursorOn) return;
    gsap.to(cursor,     { x: e.clientX, y: e.clientY, duration: 0.08, ease: 'none' });
    gsap.to(cursorRing, { x: e.clientX, y: e.clientY, duration: 0.22, ease: 'power2.out' });
  });

  // --- Bar counter ---
  let pct = 0;
  const pctEl = document.getElementById('lts002-bar-pct');

  function animatePercent(duration) {
    gsap.to({ v: 0 }, {
      v: 100,
      duration,
      ease: 'power1.inOut',
      onUpdate: function() {
        pct = Math.round(this.targets()[0].v);
        if (pctEl) pctEl.textContent = pct + '%';
      }
    });
  }

  // --- Main entrance ---
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 0) return;

    cursorOn = true;

    gsap.to(cursor,     { opacity: 1, duration: 0.4, delay: 0.3 });
    gsap.to(cursorRing, { opacity: 0.5, duration: 0.4, delay: 0.5 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Corners snap in
    tl.to(['#lts002-c-tl','#lts002-c-tr','#lts002-c-bl','#lts002-c-br'], {
      opacity: 1, duration: 0.5, stagger: 0.08,
    }, 0);

    tl.from(['#lts002-c-tl','#lts002-c-tr','#lts002-c-bl','#lts002-c-br'], {
      scale: 0.3, duration: 0.5, stagger: 0.08, ease: 'back.out(2)',
    }, 0);

    // Snakes appear
    tl.call(() => {
      document.querySelectorAll('#lts002-snakes svg').forEach((svg, i) => {
        gsap.to(svg, { opacity: 1, duration: 1.2, delay: i * 0.18, ease: 'power2.out' });
        // idle drift
        gsap.to(svg, {
          y: (i % 2 === 0 ? -12 : 10),
          duration: 5 + i * 0.7,
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.3,
        });
        // dash animation
        const path = svg.querySelector('path');
        if (path) {
          const len = 300;
          gsap.fromTo(path,
            { strokeDashoffset: len },
            { strokeDashoffset: 0, duration: 3 + i * 0.5, ease: 'power1.inOut', delay: i * 0.2 }
          );
          gsap.to(path, {
            strokeDashoffset: -len,
            duration: 6 + i * 0.8,
            ease: 'none',
            repeat: -1,
            delay: 3 + i * 0.5,
          });
        }
      });
    }, [], 0.2);

    // Crown
    tl.to('#lts002-crown', { opacity: 1, duration: 0.5 }, 0.5);
    tl.from('#lts002-crown', { scale: 0.2, rotation: -20, transformOrigin: 'center center', duration: 1, ease: 'elastic.out(1,0.55)' }, 0.5);

    // Eyebrow
    tl.to('#lts002-eyebrow', { opacity: 0.55, duration: 0.6 }, 1.0);
    tl.from('#lts002-eyebrow', { y: 6, duration: 0.6 }, 1.0);

    // Title
    tl.to('#lts002-title', { opacity: 1, duration: 0.7 }, 1.3);
    tl.from('#lts002-title', { y: 22, duration: 0.7 }, 1.3);

    // Divider
    tl.to('#lts002-divider', { opacity: 0.7, scaleX: 1, duration: 0.6 }, 1.8);
    tl.from('#lts002-divider', { scaleX: 0, transformOrigin: 'center', duration: 0.6 }, 1.8);

    // Loading line
    tl.to('#lts002-loading-line', { opacity: 0.65, duration: 0.7 }, 2.1);
    tl.from('#lts002-loading-line', { y: 10, duration: 0.7 }, 2.1);

    // Bar
    tl.to('#lts002-bar-outer', { opacity: 1, duration: 0.5 }, 2.4);
    tl.to('#lts002-bar-fill',  { width: '100%', duration: 3.4, ease: 'power1.inOut' }, 2.5);
    tl.call(() => animatePercent(3.4), [], 2.5);

    // Tagline
    tl.to('#lts002-tagline', { opacity: 0.3, duration: 0.6 }, 2.7);

    // Sig
    tl.to('#lts002-sig', { opacity: 0.2, duration: 0.5 }, 2.9);

    // Start glitch loop
    tl.call(() => {
      function scheduleGlitch() {
        const delay = 2.8 + Math.random() * 4;
        gsap.delayedCall(delay, () => { triggerGlitch(); scheduleGlitch(); });
      }
      scheduleGlitch();
    }, [], 2.0);

    // Start rep word spawns
    tl.call(() => {
      spawnRepWord();
      setInterval(spawnRepWord, 2600);
    }, [], 1.5);

    // --- Ambient / idle ---

    // Crown idle float
    tl.call(() => {
      gsap.to('#lts002-crown', {
        y: -6,
        duration: 3,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
      // crown glow pulse
      gsap.to('#lts002-crown svg', {
        filter: 'drop-shadow(0 0 18px var(--accent))',
        duration: 2,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.0);

    // Corner bracket breathe
    tl.call(() => {
      ['#lts002-c-tl','#lts002-c-tr','#lts002-c-bl','#lts002-c-br'].forEach((id, i) => {
        gsap.to(id, {
          opacity: 0.4,
          duration: 1.5 + i * 0.2,
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.3,
        });
      });
    }, [], 2.2);

    // Accent name glow
    tl.call(() => {
      const span = document.querySelector('#lts002-title span');
      if (!span) return;
      gsap.to(span, {
        textShadow: '0 0 30px var(--accent), 0 0 60px var(--accent)',
        duration: 2,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.5);

    // Cursor ring pulse
    tl.call(() => {
      gsap.to(cursorRing, {
        scale: 1.4,
        opacity: 0.15,
        duration: 1.2,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 1.0);

  });

})();
</script>
