</style>

<script>
(function () {

  const NEON_COLORS = ['#ff32b4','#50c8ff','#b450ff','#ffdc32','#50ffb4','#ff5064'];
  const NOTES       = ['♪','♫','♩','♬','✦','★','⟡'];
  const HANGUL_IDS  = ['lkp001-h1','lkp001-h2','lkp001-h3','lkp001-h4'];

  // --- Build perspective grid via canvas ---
  const canvas = document.getElementById('lkp001-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resizeCanvas() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  function drawGrid(alpha) {
    ctx.clearRect(0, 0, W, H);
    const vp = { x: W / 2, y: H * 0.72 };
    const rows = 10, cols = 16;
    const bot  = H;
    const top  = H * 0.52;
    ctx.save();
    ctx.globalAlpha = alpha;

    for (let r = 0; r <= rows; r++) {
      const t = r / rows;
      const y = top + (bot - top) * t;
      const spread = W * 0.9 * t;
      const x0 = vp.x - spread / 2;
      const x1 = vp.x + spread / 2;
      ctx.beginPath();
      ctx.moveTo(x0, y);
      ctx.lineTo(x1, y);
      ctx.strokeStyle = NEON_COLORS[r % NEON_COLORS.length];
      ctx.lineWidth   = 0.5;
      ctx.globalAlpha = alpha * (0.06 + 0.12 * t);
      ctx.stroke();
    }

    for (let c = 0; c <= cols; c++) {
      const t = c / cols;
      const bx = W * 0.05 + W * 0.9 * t;
      ctx.beginPath();
      ctx.moveTo(vp.x, top);
      ctx.lineTo(bx, bot);
      ctx.strokeStyle = NEON_COLORS[c % NEON_COLORS.length];
      ctx.lineWidth   = 0.5;
      ctx.globalAlpha = alpha * 0.07;
      ctx.stroke();
    }

    ctx.restore();
  }

  let gridAlpha  = 0;
  let gridTarget = 0;

  function animGrid() {
    gridAlpha += (gridTarget - gridAlpha) * 0.04;
    drawGrid(gridAlpha);
    requestAnimationFrame(animGrid);
  }

  resizeCanvas();
  animGrid();
  window.addEventListener('resize', resizeCanvas);

  // --- Build lightsticks ---
  function buildSticks() {
    const container = document.getElementById('lkp001-sticks');
    const count     = Math.floor(window.innerWidth / clamp(20, 2.5, 40)) ;
    const safeCount = Math.min(Math.max(count, 14), 40);
    for (let i = 0; i < safeCount; i++) {
      const stick = document.createElement('div');
      stick.className = 'lkp001-stick';
      const bulb = document.createElement('div');
      bulb.className = 'lkp001-stick-bulb';
      const color = NEON_COLORS[i % NEON_COLORS.length];
      bulb.style.background  = color;
      bulb.style.boxShadow   = `0 0 8px ${color}, 0 0 16px ${color}`;
      const rod = document.createElement('div');
      rod.className = 'lkp001-stick-rod';
      stick.appendChild(bulb);
      stick.appendChild(rod);
      container.appendChild(stick);
    }
  }

  function clamp(val, min, max) {
    return Math.min(Math.max(val, min), max);
  }

  buildSticks();

  // --- Particle burst ---
  function spawnParticle() {
    const field = document.getElementById('lkp001-particles');
    const el    = document.createElement('div');
    el.className = 'lkp001-particle';
    const size   = Math.random() * 4 + 1.5;
    const color  = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
    el.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random() * 100}%;
      top:${Math.random() * 100}%;
      background:${color};
      box-shadow:0 0 ${size * 3}px ${color};
      border-radius:50%;
    `;
    field.appendChild(el);
    gsap.fromTo(el,
      { opacity: 0, scale: 0, y: 0 },
      {
        opacity: 0.8,
        scale: 1,
        y: -(40 + Math.random() * 80),
        x: (Math.random() - 0.5) * 60,
        duration: 1.4 + Math.random() * 1,
        ease: 'power2.out',
        onComplete: () => {
          gsap.to(el, { opacity: 0, scale: 0, duration: 0.6, onComplete: () => el.remove() });
        }
      }
    );
  }

  // --- Floating music notes ---
  function spawnNote() {
    const root = document.getElementById('lkp001-root');
    const el   = document.createElement('div');
    el.className  = 'lkp001-note';
    el.textContent = NOTES[Math.floor(Math.random() * NOTES.length)];
    el.style.left  = Math.random() * 88 + 4 + '%';
    el.style.top   = Math.random() * 65 + 15 + '%';
    el.style.color = NEON_COLORS[Math.floor(Math.random() * NEON_COLORS.length)];
    root.appendChild(el);
    gsap.fromTo(el,
      { opacity: 0, y: 0, scale: 0.6 },
      {
        opacity: 0.55,
        y: -30,
        scale: 1,
        duration: 2.5 + Math.random() * 1.5,
        ease: 'power1.out',
        onComplete: () => {
          gsap.to(el, {
            opacity: 0, y: '-=20', duration: 1,
            onComplete: () => el.remove()
          });
        }
      }
    );
  }

  // --- Cursor ---
  const cursor     = document.getElementById('lkp001-cursor');
  const cursorRing = document.getElementById('lkp001-cursor-ring');
  let   cursorOn   = false;

  document.addEventListener('mousemove', (e) => {
    if (!cursorOn) return;
    gsap.to(cursor,     { x: e.clientX, y: e.clientY, duration: 0.08, ease: 'none' });
    gsap.to(cursorRing, { x: e.clientX, y: e.clientY, duration: 0.2,  ease: 'power2.out' });
  });

  // --- Percent counter ---
  const pctEl = document.getElementById('lkp001-pct');
  function animatePercent(dur) {
    gsap.to({ v: 0 }, {
      v: 100, duration: dur, ease: 'power1.inOut',
      onUpdate: function () {
        if (pctEl) pctEl.textContent = Math.round(this.targets()[0].v) + '%';
      }
    });
  }

  // --- Hangul cycler ---
  let hangulCycle;
  function startHangulCycle() {
    let idx = 0;
    hangulCycle = setInterval(() => {
      HANGUL_IDS.forEach(id => document.getElementById(id)?.classList.remove('lkp001-active'));
      const el = document.getElementById(HANGUL_IDS[idx % HANGUL_IDS.length]);
      if (el) el.classList.add('lkp001-active');
      idx++;
    }, 600);
  }

  // --- Spotlight wave ---
  function startSpotWave() {
    const spots = document.querySelectorAll('.lkp001-spot');
    spots.forEach((spot, i) => {
      gsap.to(spot, {
        rotation: `random(-12, 12)`,
        duration: 1.8 + i * 0.2,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
        delay: i * 0.22,
      });
      gsap.to(spot, {
        opacity: `random(0.4, 0.85)`,
        duration: 1.2 + i * 0.15,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
        delay: i * 0.18,
      });
    });
  }

  // --- Main entrance ---
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 0) return;

    cursorOn = true;
    gsap.to(cursor,     { opacity: 1, duration: 0.4, delay: 0.2 });
    gsap.to(cursorRing, { opacity: 0.5, duration: 0.4, delay: 0.4 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Rail flash
    tl.to('#lkp001-rail', { opacity: 1, duration: 0.3 }, 0);
    tl.to('.lkp001-rail-cell', {
      scaleY: 1,
      opacity: 1,
      duration: 0.5,
      stagger: { each: 0.04, from: 'center' },
      ease: 'back.out(2)',
    }, 0.1);

    // Grid fade in
    tl.call(() => { gridTarget = 1; }, [], 0.3);
    tl.to('#lkp001-floor', { opacity: 1, duration: 0.8 }, 0.3);
    tl.call(() => document.getElementById('lkp001-floor').classList.add('lkp001-lit'), [], 0.6);

    // Spotlights
    tl.to('.lkp001-spot', {
      opacity: 0.6,
      duration: 0.9,
      stagger: { each: 0.12, from: 'edges' },
      ease: 'power2.out',
    }, 0.5);
    tl.call(() => startSpotWave(), [], 1.4);

    // Badge
    tl.to('#lkp001-badge', { opacity: 1, duration: 0.6 }, 0.8);
    tl.from('#lkp001-badge', { y: 10, duration: 0.6 }, 0.8);

    // Title neon glow under
    tl.to('#lkp001-title-neon', { opacity: 0.25, duration: 0.5 }, 1.1);

    // Title
    tl.to('#lkp001-title', { opacity: 1, duration: 0.7 }, 1.1);
    tl.from('#lkp001-title', { y: 28, scale: 0.94, duration: 0.8, ease: 'expo.out' }, 1.1);

    // Hangul row
    tl.to('#lkp001-hangul-row', { opacity: 1, duration: 0.6 }, 1.7);
    tl.call(() => startHangulCycle(), [], 1.9);

    // Loading line
    tl.to('#lkp001-loading-line', { opacity: 0.65, duration: 0.7 }, 2.0);
    tl.from('#lkp001-loading-line', { y: 10, duration: 0.7 }, 2.0);

    // Bar
    tl.to('#lkp001-bar-system', { opacity: 1, duration: 0.5 }, 2.3);
    tl.to('#lkp001-bar-fill',   { width: '100%', duration: 3.2, ease: 'power1.inOut' }, 2.4);
    tl.call(() => animatePercent(3.2), [], 2.4);

    // Lightsticks
    tl.to('#lkp001-sticks', { opacity: 1, duration: 0.7 }, 2.2);
    tl.from('.lkp001-stick', {
      y: 20, opacity: 0, duration: 0.6,
      stagger: { each: 0.04, from: 'center' },
    }, 2.2);

    // Sig
    tl.to('#lkp001-sig', { opacity: 0.25, duration: 0.5 }, 2.8);

    // Particle bursts
    tl.call(() => {
      for (let i = 0; i < 8; i++) {
        gsap.delayedCall(i * 0.12, spawnParticle);
      }
      setInterval(spawnParticle, 700);
    }, [], 1.2);

    // Notes
    tl.call(() => {
      spawnNote();
      setInterval(spawnNote, 1800);
    }, [], 1.5);

    // --- Idle / ambient ---

    // Lightstick wave
    tl.call(() => {
      document.querySelectorAll('.lkp001-stick-bulb').forEach((b, i) => {
        gsap.to(b, {
          opacity: 0.25,
          scale: 0.7,
          duration: 0.5 + Math.random() * 0.5,
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.06,
        });
        gsap.to(b.parentElement, {
          y: -6,
          duration: 0.8 + Math.random() * 0.4,
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.07,
        });
      });
    }, [], 2.8);

    // Rail color loop
    tl.call(() => {
      document.querySelectorAll('.lkp001-rail-cell').forEach((cell, i) => {
        gsap.to(cell, {
          opacity: 0.3,
          duration: 0.4 + Math.random() * 0.4,
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.08,
        });
      });
    }, [], 1.2);

    // Title name pulse
    tl.call(() => {
      const span = document.querySelector('#lkp001-title span');
      if (!span) return;
      gsap.to(span, {
        textShadow: '0 0 30px var(--accent), 0 0 60px var(--accent)',
        duration: 1.2,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.2);

    // Neon title glow breathe
    tl.call(() => {
      gsap.to('#lkp001-title-neon', {
        opacity: 0.12,
        filter: 'blur(14px)',
        duration: 1.8,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.0);

    // Cursor ring color cycle
    tl.call(() => {
      let ci = 0;
      setInterval(() => {
        const c = NEON_COLORS[ci++ % NEON_COLORS.length];
        gsap.to(cursorRing, { borderColor: c, duration: 0.4 });
      }, 600);
      gsap.to(cursorRing, {
        scale: 1.5,
        opacity: 0.15,
        duration: 1,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 1.0);

  });

})();
</script>
