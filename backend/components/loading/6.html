<!--
  Component: loading_kdrama_001
  Type: loading
  Aesthetic: K-Drama Episode Start Card
  Obsession: K-Drama
  Tone: cinematic, emotional, romantic
  Occasion: both
  Variables: --RECIPIENT_NAME-- --LOADING_LINE--
-->
<style>
  :root {
    --primary: #c9a96e;
    --accent: #e8c97e;
    --bg: #080808;
    --text: #f0ece4;
    --font-heading: 'Noto Serif KR', 'Noto Serif', Georgia, serif;
    --font-body: 'Noto Sans KR', 'Noto Sans', sans-serif;
  }

    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
.lk001-root {
position: relative;
width: 100vw;
height: 100vh;
background: var(--bg);
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
font-family: var(--font-body);
}
.lk001-bar-top,
.lk001-bar-bottom {
position: absolute;
left: 0;
width: 100%;
background: #000;
z-index: 20;
}
.lk001-bar-top    { top: 0;    height: clamp(40px, 8vh, 80px); transform-origin: top; }
.lk001-bar-bottom { bottom: 0; height: clamp(40px, 8vh, 80px); transform-origin: bottom; }
.lk001-grain {
position: absolute;
inset: 0;
z-index: 18;
pointer-events: none;
opacity: 0.04;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
background-size: 200px 200px;
animation: lk001-grain-shift 0.08s steps(1) infinite;
}
@keyframes lk001-grain-shift {
0%   { transform: translate(0,0); }
20%  { transform: translate(-2px,1px); }
40%  { transform: translate(2px,-1px); }
60%  { transform: translate(-1px,2px); }
80%  { transform: translate(1px,-2px); }
100% { transform: translate(0,0); }
}
.lk001-vignette {
position: absolute;
inset: 0;
z-index: 17;
pointer-events: none;
background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 40%, rgba(0,0,0,0.85) 100%);
}
.lk001-ambient {
position: absolute;
inset: 0;
z-index: 1;
pointer-events: none;
background:
radial-gradient(ellipse 55% 35% at 50% 50%, rgba(201,169,110,0.06) 0%, transparent 70%),
radial-gradient(ellipse 80% 80% at 20% 80%, rgba(100,60,80,0.08) 0%, transparent 60%),
radial-gradient(ellipse 80% 80% at 80% 20%, rgba(60,80,120,0.08) 0%, transparent 60%);
animation: lk001-ambient-breathe 6s ease-in-out infinite alternate;
}
@keyframes lk001-ambient-breathe {
from { opacity: 0.6; }
to   { opacity: 1; }
}
.lk001-petals {
position: absolute;
inset: 0;
z-index: 2;
pointer-events: none;
overflow: hidden;
}
.lk001-petal {
position: absolute;
top: -40px;
width: clamp(4px, 0.7vw, 10px);
height: clamp(6px, 1vw, 14px);
border-radius: 50% 50% 50% 0;
opacity: 0;
animation: lk001-petal-fall linear infinite;
}
@keyframes lk001-petal-fall {
0%   { transform: translateY(-40px) rotate(0deg) scale(1); opacity: 0; }
10%  { opacity: 0.25; }
90%  { opacity: 0.15; }
100% { transform: translateY(105vh) rotate(360deg) scale(0.6); opacity: 0; }
}
.lk001-scanline {
position: absolute;
left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(201,169,110,0.15), transparent);
z-index: 3;
pointer-events: none;
animation: lk001-scan 8s linear infinite;
top: 0;
}
@keyframes lk001-scan {
0%   { top: 0%;   opacity: 0; }
5%   { opacity: 1; }
95%  { opacity: 0.3; }
100% { top: 100%; opacity: 0; }
}
.lk001-rule-top,
.lk001-rule-bottom {
position: absolute;
left: clamp(24px, 6vw, 80px);
right: clamp(24px, 6vw, 80px);
height: 1px;
background: linear-gradient(90deg, transparent, var(--primary), transparent);
z-index: 10;
opacity: 0;
}
.lk001-rule-top    { top: clamp(80px, 14vh, 140px); }
.lk001-rule-bottom { bottom: clamp(80px, 14vh, 140px); }
.lk001-corner {
position: absolute;
width: clamp(20px, 3vw, 36px);
height: clamp(20px, 3vw, 36px);
z-index: 10;
opacity: 0;
}
.lk001-corner::before,
.lk001-corner::after {
content: '';
position: absolute;
background: var(--primary);
}
.lk001-corner::before { width: 100%; height: 1px; top: 0; left: 0; }
.lk001-corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
.lk001-corner.tl { top: clamp(52px,10vh,100px);    left: clamp(24px,5vw,60px); }
.lk001-corner.tr { top: clamp(52px,10vh,100px);    right: clamp(24px,5vw,60px); transform: scaleX(-1); }
.lk001-corner.bl { bottom: clamp(52px,10vh,100px); left: clamp(24px,5vw,60px); transform: scaleY(-1); }
.lk001-corner.br { bottom: clamp(52px,10vh,100px); right: clamp(24px,5vw,60px); transform: scale(-1,-1); }
.lk001-center {
position: relative;
z-index: 15;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: clamp(16px, 4vw, 48px);
gap: clamp(12px, 2.5vh, 28px);
}
.lk001-network {
font-family: var(--font-body);
font-size: clamp(9px, 1vw, 12px);
letter-spacing: 0.35em;
color: var(--primary);
text-transform: uppercase;
opacity: 0;
}
.lk001-ep-wrap {
display: flex;
align-items: center;
gap: clamp(8px, 1.5vw, 18px);
opacity: 0;
}
.lk001-ep-line {
width: clamp(24px, 4vw, 50px);
height: 1px;
background: var(--primary);
opacity: 0.5;
}
.lk001-ep-label {
font-family: var(--font-body);
font-size: clamp(9px, 1vw, 11px);
letter-spacing: 0.4em;
color: var(--primary);
text-transform: uppercase;
opacity: 0.7;
}
.lk001-title {
font-family: var(--font-heading);
font-size: clamp(36px, 8vw, 110px);
font-weight: 700;
color: var(--text);
line-height: 1;
letter-spacing: -0.02em;
opacity: 0;
position: relative;
}
.lk001-title-glow {
position: absolute;
inset: -10px;
background: radial-gradient(ellipse at center, rgba(201,169,110,0.18) 0%, transparent 70%);
filter: blur(12px);
z-index: -1;
animation: lk001-glow-pulse 3s ease-in-out infinite alternate;
}
@keyframes lk001-glow-pulse {
from { opacity: 0.5; transform: scale(0.95); }
to   { opacity: 1;   transform: scale(1.05); }
}
.lk001-hangul {
font-family: var(--font-heading);
font-size: clamp(12px, 2vw, 22px);
color: var(--primary);
letter-spacing: 0.15em;
opacity: 0;
font-weight: 400;
}
.lk001-loading-line {
font-family: var(--font-body);
font-size: clamp(11px, 1.3vw, 15px);
color: var(--text);
letter-spacing: 0.2em;
opacity: 0;
max-width: clamp(240px, 55vw, 560px);
line-height: 1.8;
}
.lk001-progress-wrap {
width: clamp(140px, 28vw, 320px);
height: 2px;
background: rgba(201,169,110,0.15);
border-radius: 2px;
overflow: hidden;
opacity: 0;
}
.lk001-progress-fill {
height: 100%;
width: 0%;
background: linear-gradient(90deg, var(--primary), var(--accent));
border-radius: 2px;
box-shadow: 0 0 8px rgba(201,169,110,0.6);
}
.lk001-recipient {
font-family: var(--font-heading);
font-size: clamp(10px, 1.2vw, 14px);
letter-spacing: 0.4em;
color: var(--primary);
text-transform: uppercase;
opacity: 0;
}
.lk001-timestamp {
position: absolute;
bottom: clamp(90px, 13vh, 120px);
right: clamp(32px, 5vw, 70px);
font-family: var(--font-body);
font-size: clamp(8px, 0.9vw, 11px);
letter-spacing: 0.2em;
color: rgba(201,169,110,0.4);
z-index: 10;
opacity: 0;
}
.lk001-flash {
position: absolute;
inset: 0;
z-index: 30;
background: #fff;
opacity: 0;
pointer-events: none;
}
</style>
<body>
<div class="lk001-root" id="lk001-root">
  <div class="lk001-bar-top"></div>
  <div class="lk001-bar-bottom"></div>
  <div class="lk001-grain"></div>
  <div class="lk001-vignette"></div>
  <div class="lk001-ambient"></div>
  <div class="lk001-scanline"></div>
  <div class="lk001-flash" id="lk001-flash"></div>
  <div class="lk001-petals" id="lk001-petals"></div>
  <div class="lk001-rule-top" id="lk001-rule-top"></div>
  <div class="lk001-rule-bottom" id="lk001-rule-bottom"></div>
  <div class="lk001-corner tl" id="lk001-tl"></div>
  <div class="lk001-corner tr" id="lk001-tr"></div>
  <div class="lk001-corner bl" id="lk001-bl"></div>
  <div class="lk001-corner br" id="lk001-br"></div>
  <div class="lk001-timestamp" id="lk001-ts">ORIGINAL ✦ SERIES ✦ EP.01</div>
  <div class="lk001-center">
    <div class="lk001-network" id="lk001-network">THE GLITCH PROTOCOL ORIGINALS</div><div class="lk001-ep-wrap" id="lk001-ep">
  <div class="lk001-ep-line"></div>
  <div class="lk001-ep-label">Episode 01 · Special Presentation</div>
  <div class="lk001-ep-line"></div>
</div>

<div class="lk001-title" id="lk001-title">
  --RECIPIENT_NAME--
  <div class="lk001-title-glow"></div>
</div>

<div class="lk001-hangul" id="lk001-hangul">당신을 위해 만든 이야기</div>

<div class="lk001-recipient" id="lk001-recipient">FOR ✦ --RECIPIENT_NAME-- ✦ ONLY</div>

<div class="lk001-loading-line" id="lk001-loadline">--LOADING_LINE--</div>

<div class="lk001-progress-wrap" id="lk001-pwrap">
  <div class="lk001-progress-fill" id="lk001-pfill"></div>
</div></div>
</div>
<script>
(function() {

  const petalContainer = document.getElementById('lk001-petals');
  const PETAL_COUNT = 22;
  const hues = [0, 10, 340, 350, 355];
  for (let i = 0; i < PETAL_COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'lk001-petal';
    const h = hues[Math.floor(Math.random() * hues.length)];
    const s = 40 + Math.random() * 30;
    const l = 55 + Math.random() * 20;
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.animationDuration = (7 + Math.random() * 9) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.background = `hsl(${h},${s}%,${l}%)`;
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    petalContainer.appendChild(p);
  }

  document.addEventListener('glitch:enter', function(e) {
    if (e.detail.index !== 0) return;
    runEntrance();
  });

  let didRun = false;
  function runEntrance() {
    if (didRun) return;
    didRun = true;

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.fromTo('#lk001-flash', { opacity: 1 }, { opacity: 0, duration: 0.6, ease: 'power2.in' }, 0);
    tl.from('.lk001-bar-top',    { scaleY: 3, duration: 1.2, ease: 'power4.inOut' }, 0.2);
    tl.from('.lk001-bar-bottom', { scaleY: 3, duration: 1.2, ease: 'power4.inOut' }, 0.2);
    tl.to(['#lk001-tl','#lk001-tr','#lk001-bl','#lk001-br'],
      { opacity: 1, duration: 0.5, stagger: 0.08 }, 0.8);
    tl.to(['#lk001-rule-top','#lk001-rule-bottom'],
      { opacity: 1, duration: 0.8, stagger: 0.1, ease: 'power2.out' }, 0.9);
    tl.to('#lk001-network',
      { opacity: 1, duration: 0.5 }, '<0.2');
    tl.to('#lk001-ep',
      { opacity: 1, duration: 0.5 }, '<0.15');
    tl.fromTo('#lk001-title',
      { opacity: 0, y: 24 },
      { opacity: 1, y: 0, duration: 0.9, ease: 'power3.out' }, '<0.3');
    tl.fromTo('#lk001-hangul',
      { opacity: 0, y: 14 },
      { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }, '<0.3');
    tl.to('#lk001-recipient',
      { opacity: 1, duration: 0.5 }, '<0.25');
    tl.to('#lk001-loadline',
      { opacity: 0.75, duration: 0.6 }, '<0.3');
    tl.to('#lk001-pwrap',
      { opacity: 1, duration: 0.3 }, '<0.2');
    tl.to('#lk001-pfill',
      { width: '100%', duration: 3.2, ease: 'power1.inOut' }, '<0.2');
    tl.to('#lk001-ts',
      { opacity: 1, duration: 0.4 }, '<0.4');

    tl.call(() => {
      gsap.to('#lk001-title', {
        y: -6, duration: 3.5, repeat: -1, yoyo: true, ease: 'sine.inOut'
      });
      gsap.to(['#lk001-rule-top','#lk001-rule-bottom'], {
        opacity: 0.4, duration: 2.5, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.4
      });
      gsap.to('.lk001-corner', {
        opacity: 0.5, duration: 1.8, repeat: -1, yoyo: true, ease: 'sine.inOut', stagger: 0.3
      });
      gsap.to('#lk001-hangul', {
        opacity: 0.5, duration: 4, repeat: -1, yoyo: true, ease: 'sine.inOut'
      });
    });
  }

  setTimeout(function() { if (!didRun) runEntrance(); }, 300);

  document.addEventListener('mousemove', function(ev) {
    const cx = (ev.clientX / window.innerWidth  - 0.5) * 2;
    const cy = (ev.clientY / window.innerHeight - 0.5) * 2;
    gsap.to('#lk001-title', {
      x: cx * 8, y: cy * 5, duration: 1.2, ease: 'power2.out', overwrite: 'auto'
    });
    gsap.to('.lk001-ambient', {
      x: cx * 20, y: cy * 15, duration: 2, ease: 'power2.out'
    });
    gsap.to('.lk001-petals', {
      x: cx * 10, y: cy * 6, duration: 2.5, ease: 'power2.out'
    });
  });

})();
</script>
</body>
