<!--
  Component: loading_anime_001
  Type: loading
  Aesthetic: Manga Panel Load
  Obsession: Anime
  Tone: kinetic, expressive, cinematic
  Occasion: both
  Variables: --RECIPIENT_NAME-- --LOADING_LINE--
-->
<style>
  .lan001-root {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    cursor: none;
  }

  .lan001-paper {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.012) 3px,
        rgba(255,255,255,0.012) 4px
      );
    pointer-events: none;
    z-index: 1;
  }

  .lan001-halftone {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.03;
    background-image: radial-gradient(circle, var(--text) 1px, transparent 1px);
    background-size: 8px 8px;
  }

  .lan001-vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.75) 100%
    );
  }

  /* Speed lines canvas */
  .lan001-speed-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
  }

  /* Panel grid */
  .lan001-panels {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .lan001-panel {
    position: absolute;
    border: 1.5px solid rgba(255,255,255,0.07);
    background: transparent;
    opacity: 0;
    overflow: hidden;
  }

  .lan001-panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left;
  }

  .lan001-panel-flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
  }

  /* Action text bursts */
  .lan001-action-burst {
    position: absolute;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transform-origin: center;
  }

  .lan001-action-burst svg {
    width: 100%;
    height: 100%;
  }

  /* Screentone overlays */
  .lan001-tone {
    position: absolute;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
    background-size: 5px 5px;
    border-radius: 50%;
  }

  /* Center content */
  .lan001-center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(12px, 2.4vh, 24px);
    text-align: center;
    padding: 0 clamp(24px, 8vw, 100px);
  }

  .lan001-panel-label {
    font-family: var(--font-body);
    font-size: clamp(0.48rem, 0.9vw, 0.62rem);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    margin: 0;
    position: relative;
  }

  .lan001-panel-label::before,
  .lan001-panel-label::after {
    content: '[ ';
    color: var(--accent);
    opacity: 0.5;
  }

  .lan001-panel-label::after {
    content: ' ]';
  }

  .lan001-title-wrap {
    position: relative;
    overflow: visible;
  }

  .lan001-title {
    font-family: var(--font-heading);
    font-size: clamp(2.4rem, 6.5vw, 5.5rem);
    color: var(--text);
    letter-spacing: 0.03em;
    margin: 0;
    line-height: 1.0;
    opacity: 0;
    position: relative;
    z-index: 2;
  }

  .lan001-title span.lan001-accent-name {
    color: var(--accent);
    position: relative;
  }

  .lan001-title-outline {
    position: absolute;
    inset: 0;
    font-family: var(--font-heading);
    font-size: clamp(2.4rem, 6.5vw, 5.5rem);
    letter-spacing: 0.03em;
    line-height: 1.0;
    color: transparent;
    -webkit-text-stroke: 2px var(--accent);
    opacity: 0;
    pointer-events: none;
    transform: translate(3px, 3px);
    z-index: 1;
  }

  .lan001-furigana {
    display: block;
    font-size: clamp(0.5rem, 0.9vw, 0.65rem);
    letter-spacing: 0.5em;
    text-align: center;
    color: var(--text);
    opacity: 0;
    margin-bottom: 4px;
    text-transform: uppercase;
    font-family: var(--font-body);
  }

  .lan001-subtitle-row {
    display: flex;
    align-items: center;
    gap: clamp(10px, 2vw, 22px);
    opacity: 0;
  }

  .lan001-sub-line {
    width: clamp(24px, 4vw, 56px);
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent));
  }

  .lan001-sub-line:last-child {
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .lan001-subtitle-text {
    font-family: var(--font-body);
    font-size: clamp(0.65rem, 1.3vw, 0.88rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.6;
    white-space: nowrap;
  }

  .lan001-loading-line {
    font-family: var(--font-body);
    font-size: clamp(0.72rem, 1.5vw, 0.95rem);
    color: var(--text);
    opacity: 0;
    letter-spacing: 0.06em;
    font-style: italic;
    max-width: 400px;
    line-height: 1.65;
  }

  /* Manga-style progress */
  .lan001-progress-wrap {
    width: clamp(200px, 36vw, 380px);
    opacity: 0;
    position: relative;
  }

  .lan001-progress-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.07);
    position: relative;
    overflow: visible;
  }

  .lan001-progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent);
    position: relative;
    transition: none;
  }

  .lan001-progress-notch {
    position: absolute;
    top: -3px;
    right: -1px;
    width: 9px;
    height: 9px;
    background: var(--text);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    box-shadow: 0 0 10px var(--accent);
  }

  .lan001-progress-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  .lan001-progress-label {
    font-size: clamp(0.44rem, 0.8vw, 0.57rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.3;
    font-family: var(--font-body);
  }

  .lan001-progress-pct {
    font-size: clamp(0.44rem, 0.8vw, 0.57rem);
    letter-spacing: 0.2em;
    color: var(--accent);
    font-family: var(--font-body);
  }

  /* Chapter tag */
  .lan001-chapter {
    position: absolute;
    top: clamp(16px, 3vh, 32px);
    left: clamp(20px, 4vw, 48px);
    z-index: 12;
    opacity: 0;
  }

  .lan001-chapter-inner {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .lan001-chapter-num {
    font-family: var(--font-heading);
    font-size: clamp(1.4rem, 3vw, 2.6rem);
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
    -webkit-text-stroke: 1px var(--accent);
  }

  .lan001-chapter-word {
    font-family: var(--font-body);
    font-size: clamp(0.44rem, 0.8vw, 0.58rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
  }

  /* Volume tag */
  .lan001-volume {
    position: absolute;
    top: clamp(16px, 3vh, 32px);
    right: clamp(20px, 4vw, 48px);
    z-index: 12;
    opacity: 0;
    text-align: right;
  }

  .lan001-volume-text {
    font-family: var(--font-body);
    font-size: clamp(0.44rem, 0.8vw, 0.58rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.35;
    display: block;
  }

  .lan001-volume-title {
    font-family: var(--font-heading);
    font-size: clamp(0.7rem, 1.4vw, 1rem);
    color: var(--accent);
    letter-spacing: 0.1em;
    display: block;
    margin-top: 2px;
  }

  /* Sig */
  .lan001-sig {
    position: absolute;
    bottom: clamp(12px, 2.2vh, 24px);
    right: clamp(16px, 3vw, 36px);
    font-size: clamp(0.44rem, 0.78vw, 0.58rem);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0;
    white-space: nowrap;
    z-index: 12;
    font-family: var(--font-body);
  }

  /* Cursor */
  .lan001-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    opacity: 0;
    width: 14px;
    height: 14px;
  }

  .lan001-cursor svg {
    width: 100%;
    height: 100%;
  }

  .lan001-cursor-trail-dot {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    background: var(--accent);
    z-index: 9997;
    transform: translate(-50%, -50%);
    opacity: 0;
  }

  /* Floating kanji */
  .lan001-kanji {
    position: absolute;
    font-family: var(--font-heading);
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    z-index: 4;
    line-height: 1;
  }

  /* Impact lines */
  .lan001-impact {
    position: absolute;
    pointer-events: none;
    z-index: 6;
    opacity: 0;
  }
</style>
<div class="lan001-root" id="lan001-root">

  <!-- Background panel borders -->

<script>
(function () {

  const KANJI_LIST = ['愛','夢','力','心','魂','星','運命','永遠','希望','勇気','絆','光'];
  const ACTION_WORDS = ['！','ドキドキ','キラキラ','ズキュン','ﾜｸﾜｸ'];
  const IMPACT_ANGLES = [15, -20, 8, -14, 22, -7];

  // --- Speed lines canvas ---
  const sc  = document.getElementById('lan001-speed-canvas');
  const sctx = sc.getContext('2d');
  let SW, SH;
  let speedAlpha = 0, speedTarget = 0;
  let lineAngle = 0;

  function resizeSC() {
    SW = sc.width  = sc.offsetWidth;
    SH = sc.height = sc.offsetHeight;
  }

  function drawSpeedLines() {
    sctx.clearRect(0, 0, SW, SH);
    if (speedAlpha < 0.002) { requestAnimationFrame(drawSpeedLines); return; }
    speedAlpha += (speedTarget - speedAlpha) * 0.03;
    const cx = SW / 2, cy = SH / 2;
    const count = 90;
    sctx.save();
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + lineAngle;
      const len   = Math.random() * 0.38 * Math.max(SW, SH) + 0.08 * Math.max(SW, SH);
      const x0    = cx + Math.cos(angle) * (Math.random() * 60 + 20);
      const y0    = cy + Math.sin(angle) * (Math.random() * 40 + 15);
      const x1    = cx + Math.cos(angle) * len;
      const y1    = cy + Math.sin(angle) * len;
      sctx.beginPath();
      sctx.moveTo(x0, y0);
      sctx.lineTo(x1, y1);
      sctx.strokeStyle = i % 7 === 0 ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.18)';
      sctx.lineWidth = Math.random() * 1.2 + 0.3;
      sctx.globalAlpha = speedAlpha * (0.4 + Math.random() * 0.6);
      sctx.stroke();
    }
    sctx.restore();
    requestAnimationFrame(drawSpeedLines);
  }

  resizeSC();
  drawSpeedLines();
  window.addEventListener('resize', resizeSC);

  // --- Panel flash helper ---
  function flashPanel(index, delay) {
    const panels = document.querySelectorAll('.lan001-panel');
    if (!panels[index]) return;
    const flash = panels[index].querySelector('.lan001-panel-flash');
    gsap.to(panels[index], { opacity: 1, duration: 0.01, delay });
    gsap.fromTo(flash,
      { opacity: 0.7 },
      { opacity: 0, duration: 0.45, delay, ease: 'power2.out' }
    );
    gsap.to(panels[index], {
      borderColor: 'rgba(255,255,255,0.18)',
      duration: 0.3, delay: delay + 0.1
    });
  }

  // --- Spawn floating kanji ---
  function spawnKanji() {
    const root = document.getElementById('lan001-root');
    const el   = document.createElement('div');
    el.className = 'lan001-kanji';
    el.textContent = KANJI_LIST[Math.floor(Math.random() * KANJI_LIST.length)];
    el.style.left     = Math.random() * 82 + 5 + '%';
    el.style.top      = Math.random() * 70 + 10 + '%';
    el.style.fontSize = `clamp(0.9rem, ${1.2 + Math.random() * 2}vw, 2.2rem)`;
    el.style.color    = Math.random() > 0.5 ? 'var(--accent)' : 'var(--text)';
    root.appendChild(el);
    gsap.fromTo(el,
      { opacity: 0, y: 10, rotation: (Math.random() - 0.5) * 20, scale: 0.7 },
      {
        opacity: 0.12 + Math.random() * 0.1,
        y: -18, scale: 1,
        rotation: (Math.random() - 0.5) * 8,
        duration: 2.8 + Math.random() * 1.5,
        ease: 'power1.out',
        onComplete: () => {
          gsap.to(el, { opacity: 0, duration: 1, onComplete: () => el.remove() });
        }
      }
    );
  }

  // --- Spawn action burst ---
  function spawnActionBurst(x, y) {
    const root = document.getElementById('lan001-root');
    const word = ACTION_WORDS[Math.floor(Math.random() * ACTION_WORDS.length)];
    const el   = document.createElement('div');
    el.className = 'lan001-action-burst';
    el.style.cssText = `
      position:absolute;
      left:${x}px; top:${y}px;
      font-family:var(--font-heading);
      font-size:clamp(0.9rem,1.8vw,1.4rem);
      color:var(--accent);
      text-shadow:0 0 14px var(--accent);
      letter-spacing:0.05em;
      pointer-events:none;
      z-index:15;
      transform-origin:center;
      white-space:nowrap;
    `;
    el.textContent = word;
    root.appendChild(el);
    gsap.fromTo(el,
      { opacity: 0, scale: 0.3, rotation: (Math.random() - 0.5) * 30 },
      {
        opacity: 1, scale: 1.2, rotation: (Math.random() - 0.5) * 10,
        duration: 0.25, ease: 'back.out(3)',
        onComplete: () => {
          gsap.to(el, {
            opacity: 0, scale: 1.6, y: -20,
            duration: 0.6, ease: 'power2.out',
            onComplete: () => el.remove()
          });
        }
      }
    );
  }

  // --- Cursor ---
  const cursor = document.getElementById('lan001-cursor');
  let   cursorOn = false;
  let   trailPool = [];

  for (let i = 0; i < 5; i++) {
    const dot = document.createElement('div');
    dot.className = 'lan001-cursor-trail-dot';
    const sz = 3 - i * 0.4;
    dot.style.width  = sz + 'px';
    dot.style.height = sz + 'px';
    document.getElementById('lan001-root').appendChild(dot);
    trailPool.push({ el: dot, x: 0, y: 0 });
  }

  let mx = 0, my = 0;
  const trailHistory = [];

  document.addEventListener('mousemove', (e) => {
    if (!cursorOn) return;
    mx = e.clientX; my = e.clientY;
    gsap.to(cursor, { x: mx, y: my, duration: 0.05, ease: 'none' });
    trailHistory.unshift({ x: mx, y: my });
    if (trailHistory.length > 20) trailHistory.pop();
    trailPool.forEach((t, i) => {
      const hist = trailHistory[Math.min(i * 3 + 2, trailHistory.length - 1)] || { x: mx, y: my };
      gsap.to(t.el, { x: hist.x, y: hist.y, opacity: 0.35 - i * 0.06, duration: 0.12 + i * 0.04 });
    });
  });

  document.addEventListener('click', (e) => {
    if (!cursorOn) return;
    spawnActionBurst(e.clientX, e.clientY);
  });

  // --- Percent counter ---
  const pctEl = document.getElementById('lan001-pct');
  function animatePercent(dur) {
    gsap.to({ v: 0 }, {
      v: 100, duration: dur, ease: 'power1.inOut',
      onUpdate: function () {
        if (pctEl) pctEl.textContent = Math.round(this.targets()[0].v) + '%';
      }
    });
  }

  // --- Impact diagonal lines ---
  function buildImpactLines() {
    const root = document.getElementById('lan001-root');
    IMPACT_ANGLES.forEach((angle, i) => {
      const el = document.createElement('div');
      el.className = 'lan001-impact';
      const isLeft = i % 2 === 0;
      el.style.cssText = `
        width:${40 + Math.random() * 30}vw;
        height:1px;
        background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
        top:${15 + i * 12}%;
        ${isLeft ? 'left:0' : 'right:0'};
        transform:rotate(${angle}deg);
        transform-origin:${isLeft ? 'left' : 'right'} center;
      `;
      root.appendChild(el);
      gsap.to(el, {
        opacity: 1,
        duration: 0.8,
        delay: 0.8 + i * 0.1,
        ease: 'power2.out'
      });
    });
  }

  // --- Main entrance ---
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 0) return;

    cursorOn = true;
    gsap.to(cursor, { opacity: 1, duration: 0.3, delay: 0.2 });
    trailPool.forEach(t => gsap.to(t.el, { opacity: 0.2, duration: 0.4, delay: 0.4 }));

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Speed lines burst in
    tl.call(() => {
      speedTarget = 0.8;
      gsap.to(sc, { opacity: 1, duration: 0.3 });
      gsap.delayedCall(0.7, () => {
        speedTarget = 0;
        gsap.to(sc, { opacity: 0, duration: 1.2, delay: 0.3 });
      });
    }, [], 0);

    // Panels flash in sequence
    [0, 1, 2, 3, 6, 4, 5].forEach((idx, order) => {
      tl.call(() => flashPanel(idx, 0), [], 0.05 + order * 0.07);
    });

    // Impact lines
    tl.call(() => buildImpactLines(), [], 0.4);

    // Chapter / volume
    tl.to('#lan001-chapter', { opacity: 1, duration: 0.5, x: 0 }, 0.5);
    tl.from('#lan001-chapter', { x: -30, duration: 0.5 }, 0.5);
    tl.to('#lan001-volume',   { opacity: 1, duration: 0.5, x: 0 }, 0.6);
    tl.from('#lan001-volume',  { x: 30, duration: 0.5 }, 0.6);

    // Furigana
    tl.to('#lan001-furigana', { opacity: 0.45, duration: 0.5 }, 0.75);
    tl.from('#lan001-furigana', { y: 8, duration: 0.5 }, 0.75);

    // Panel label
    tl.to('#lan001-panel-label', { opacity: 0.7, duration: 0.5 }, 0.85);

    // Title outline shadow (comic offset)
    tl.to('#lan001-title-outline', { opacity: 0.35, duration: 0.4 }, 1.0);

    // Title slam in
    tl.to('#lan001-title', { opacity: 1, duration: 0.01 }, 1.05);
    tl.from('#lan001-title', {
      scale: 1.35,
      y: 15,
      duration: 0.5,
      ease: 'expo.out'
    }, 1.05);

    // Speed line burst on title hit
    tl.call(() => {
      speedTarget = 0.6;
      gsap.to(sc, { opacity: 1, duration: 0.1 });
      gsap.delayedCall(0.35, () => {
        speedTarget = 0;
        gsap.to(sc, { opacity: 0, duration: 0.9 });
      });
    }, [], 1.05);

    // Subtitle row
    tl.to('#lan001-subtitle-row', { opacity: 1, duration: 0.55 }, 1.55);
    tl.from('#lan001-subtitle-row', { y: 10, duration: 0.55 }, 1.55);

    // Loading line
    tl.to('#lan001-loading-line', { opacity: 0.65, duration: 0.6 }, 1.8);
    tl.from('#lan001-loading-line', { y: 10, duration: 0.6 }, 1.8);

    // Progress
    tl.to('#lan001-progress-wrap', { opacity: 1, duration: 0.5 }, 2.1);
    tl.to('#lan001-progress-fill', { width: '100%', duration: 3.3, ease: 'power1.inOut' }, 2.2);
    tl.call(() => animatePercent(3.3), [], 2.2);

    // Sig
    tl.to('#lan001-sig', { opacity: 0.2, duration: 0.5 }, 2.6);

    // Kanji spawner
    tl.call(() => {
      spawnKanji();
      setInterval(spawnKanji, 2000);
    }, [], 1.2);

    // --- Ambient / idle ---

    // Title offset throb (manga impact)
    tl.call(() => {
      gsap.to('#lan001-title-outline', {
        x: 4, y: 4,
        duration: 0.08,
        yoyo: true,
        repeat: -1,
        repeatDelay: 3.5,
        ease: 'none',
      });
    }, [], 2.0);

    // Accent name glow
    tl.call(() => {
      const span = document.querySelector('.lan001-accent-name');
      if (!span) return;
      gsap.to(span, {
        textShadow: '0 0 24px var(--accent), 0 0 50px var(--accent)',
        duration: 1.4,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.2);

    // Panel border flicker
    tl.call(() => {
      document.querySelectorAll('.lan001-panel').forEach((p, i) => {
        gsap.to(p, {
          borderColor: `rgba(255,255,255,${0.04 + Math.random() * 0.1})`,
          duration: 1.5 + Math.random(),
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.2,
        });
      });
    }, [], 1.5);

    // Chapter number pulse
    tl.call(() => {
      gsap.to('.lan001-chapter-num', {
        webkitTextStroke: '1.5px var(--accent)',
        textShadow: '0 0 16px var(--accent)',
        duration: 1.8,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.0);

    // Periodic speed flash
    tl.call(() => {
      function scheduleFlash() {
        const delay = 4 + Math.random() * 5;
        gsap.delayedCall(delay, () => {
          speedTarget = 0.4;
          gsap.to(sc, { opacity: 1, duration: 0.1 });
          gsap.delayedCall(0.3, () => {
            speedTarget = 0;
            gsap.to(sc, { opacity: 0, duration: 0.8 });
          });
          scheduleFlash();
        });
      }
      scheduleFlash();
    }, [], 3.5);

    // Halftone breathe
    tl.call(() => {
      gsap.to('.lan001-halftone', {
        opacity: 0.07,
        duration: 2.5,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 1.0);

  });

})();
</script>
