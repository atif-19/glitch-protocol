  .lmv001-vignette {

  .lmv001-hud-label {

<script>
(function () {

  const DATA_FRAGS = [
    'SHIELD-7734','AVENGERS INIT','CLEARANCE: ALPHA',
    'STARK PROTOCOL','MISSION BRIEF','ENCODING...',
    'ID VERIFIED','AGENT FILE','DECRYPT OK',
    'S.H.I.E.L.D.','PRIORITY ONE','ASSEMBLY',
  ];

  // --- Particle canvas ---
  const canvas = document.getElementById('lmv001-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;
  const particles = [];

  function resizeCanvas() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  function addDebris(count, cx, cy, burst) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = burst ? (2 + Math.random() * 5) : (0.2 + Math.random() * 0.8);
      particles.push({
        x: cx + (Math.random() - 0.5) * 20,
        y: cy + (Math.random() - 0.5) * 20,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Math.random() * 2.5 + 0.8,
        alpha: 0.8 + Math.random() * 0.2,
        decay: 0.008 + Math.random() * 0.015,
        color: Math.random() > 0.5 ? 'var(--accent)' : '#ffffff',
        colorHex: Math.random() > 0.5 ? '#64c8ff' : '#ffffff',
      });
    }
  }

  function tickParticles() {
    ctx.clearRect(0, 0, W, H);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.alpha -= p.decay;
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.colorHex;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tickParticles);
  }

  resizeCanvas();
  tickParticles();
  window.addEventListener('resize', resizeCanvas);

  // --- Spawn data fragment ---
  function spawnDataFrag() {
    const root = document.getElementById('lmv001-root');
    const el   = document.createElement('div');
    el.className = 'lmv001-data-frag';
    el.textContent = DATA_FRAGS[Math.floor(Math.random() * DATA_FRAGS.length)];
    el.style.left = Math.random() * 80 + 5 + '%';
    el.style.top  = Math.random() * 70 + 10 + '%';
    root.appendChild(el);
    gsap.fromTo(el,
      { opacity: 0, y: 6 },
      {
        opacity: 0.12,
        y: -10,
        duration: 2.5 + Math.random() * 2,
        ease: 'power1.out',
        onComplete: () => {
          gsap.to(el, { opacity: 0, duration: 1, onComplete: () => el.remove() });
        }
      }
    );
  }

  // --- Spark burst at shield center ---
  function shieldSparkBurst(cx, cy, count) {
    addDebris(count, cx, cy, true);
  }

  // --- Scan line sweep ---
  function runScan() {
    const scan = document.getElementById('lmv001-scan');
    gsap.fromTo(scan,
      { top: '0%', opacity: 0.7 },
      { top: '100%', opacity: 0, duration: 1.4, ease: 'power1.inOut',
        onComplete: () => gsap.delayedCall(3 + Math.random() * 2, runScan)
      }
    );
  }

  // --- Cursor ---
  const cursor     = document.getElementById('lmv001-cursor');
  const cursorRing = document.getElementById('lmv001-cursor-ring');
  let   cursorOn   = false;

  document.addEventListener('mousemove', (e) => {
    if (!cursorOn) return;
    gsap.to(cursor,     { x: e.clientX, y: e.clientY, duration: 0.06, ease: 'none' });
    gsap.to(cursorRing, { x: e.clientX, y: e.clientY, duration: 0.18, ease: 'power2.out' });
    addDebris(1, e.clientX, e.clientY, false);
  });

  // --- Percent counter ---
  const pctEl = document.getElementById('lmv001-pct');
  function animatePercent(dur) {
    gsap.to({ v: 0 }, {
      v: 100, duration: dur, ease: 'power1.inOut',
      onUpdate: function () {
        if (pctEl) pctEl.textContent = Math.round(this.targets()[0].v) + '%';
      }
    });
  }

  // --- Main entrance ---
  document.addEventListener('glitch:enter', function (e) {
    if (e.detail.index !== 0) return;

    cursorOn = true;
    gsap.to(cursor,     { opacity: 1, duration: 0.3, delay: 0.2 });
    gsap.to(cursorRing, { opacity: 0.45, duration: 0.4, delay: 0.4 });

    const root  = document.getElementById('lmv001-root');
    const rootW = root.offsetWidth;
    const rootH = root.offsetHeight;
    const cx    = rootW / 2;
    const cy    = rootH * 0.28;

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Banners
    tl.to(['#lmv001-top-banner','#lmv001-bottom-banner'], {
      opacity: 1, scaleX: 1, duration: 0.6, stagger: 0.08,
    }, 0);
    tl.from(['#lmv001-top-banner','#lmv001-bottom-banner'], {
      scaleX: 0, transformOrigin: 'center', duration: 0.6, stagger: 0.08,
    }, 0);

    // Brackets
    tl.to(['#lmv001-br-tl','#lmv001-br-tr','#lmv001-br-bl','#lmv001-br-br'], {
      opacity: 1, duration: 0.4, stagger: 0.07,
    }, 0.2);
    tl.from(['#lmv001-br-tl','#lmv001-br-tr','#lmv001-br-bl','#lmv001-br-br'], {
      scale: 0.3, ease: 'back.out(2)', duration: 0.4, stagger: 0.07,
    }, 0.2);

    // Reactor glow
    tl.to('#lmv001-reactor', { opacity: 1, duration: 1.2 }, 0.3);

    // Energy rings expand
    ['#lmv001-ring-a','#lmv001-ring-b','#lmv001-ring-c'].forEach((id, i) => {
      tl.to(id, { opacity: 0.25, scale: 1, duration: 0.01 }, 0.4 + i * 0.15);
      tl.from(id, { scale: 0.1, duration: 0.8, ease: 'expo.out' }, 0.4 + i * 0.15);
      tl.call(() => shieldSparkBurst(cx, cy, 6), [], 0.4 + i * 0.15);
    });

    // Shield assembly — ring by ring
    // Outer stroke dash
    tl.to('#lmv001-ring1', { opacity: 1, strokeDashoffset: 0, duration: 1.2, ease: 'power2.inOut' }, 0.6);
    tl.call(() => shieldSparkBurst(cx, cy, 12), [], 0.6);

    tl.to('#lmv001-ring2', { opacity: 0.85, duration: 0.4, ease: 'expo.out' }, 1.0);
    tl.from('#lmv001-ring2', { scale: 0.3, transformOrigin: '90px 90px', duration: 0.4 }, 1.0);
    tl.call(() => shieldSparkBurst(cx, cy, 18), [], 1.0);

    tl.to('#lmv001-ring3', { opacity: 0.9, duration: 0.35 }, 1.35);
    tl.from('#lmv001-ring3', { scale: 0.3, transformOrigin: '90px 90px', duration: 0.35 }, 1.35);
    tl.call(() => shieldSparkBurst(cx, cy, 14), [], 1.35);

    tl.to('#lmv001-ring4', { opacity: 0.9, duration: 0.3 }, 1.65);
    tl.from('#lmv001-ring4', { scale: 0.1, transformOrigin: '90px 90px', duration: 0.3 }, 1.65);

    // Star slam
    tl.to('#lmv001-star', { opacity: 1, duration: 0.01 }, 1.88);
    tl.from('#lmv001-star', { scale: 0, transformOrigin: '90px 90px', duration: 0.45, ease: 'back.out(2.5)' }, 1.88);
    tl.call(() => shieldSparkBurst(cx, cy, 30), [], 1.88);

    // Center glow flash on star hit
    tl.to('#lmv001-center-glow', { opacity: 0.5, duration: 0.12 }, 1.88);
    tl.to('#lmv001-center-glow', { opacity: 0, duration: 0.5 }, 2.0);

    // HUD lines
    tl.to(['#lmv001-hud-l','#lmv001-hud-r'], { opacity: 1, scaleX: 1, duration: 0.5 }, 1.5);
    tl.from(['#lmv001-hud-l','#lmv001-hud-r'], { scaleX: 0, transformOrigin: 'center', duration: 0.5 }, 1.5);
    tl.to(['#lmv001-hud-ll','#lmv001-hud-rl'], { opacity: 0.7, duration: 0.4 }, 1.9);

    // Classified label
    tl.to('#lmv001-classified', { opacity: 0.7, duration: 0.5 }, 2.0);
    tl.from('#lmv001-classified', { y: 8, duration: 0.5 }, 2.0);

    // Title
    tl.to('#lmv001-title-glow', { opacity: 0.2, duration: 0.4 }, 2.15);
    tl.to('#lmv001-title', { opacity: 1, duration: 0.7 }, 2.15);
    tl.from('#lmv001-title', { y: 24, scale: 0.95, ease: 'expo.out', duration: 0.7 }, 2.15);

    // Codename
    tl.to('#lmv001-codename', { opacity: 0.5, duration: 0.5 }, 2.7);
    tl.from('#lmv001-codename', { y: 8, duration: 0.5 }, 2.7);

    // Loading line
    tl.to('#lmv001-loading-line', { opacity: 0.65, duration: 0.6 }, 2.9);
    tl.from('#lmv001-loading-line', { y: 10, duration: 0.6 }, 2.9);

    // Progress
    tl.to('#lmv001-progress-outer', { opacity: 1, duration: 0.5 }, 3.1);
    tl.to('#lmv001-track-inner', { width: '100%', duration: 3.0, ease: 'power1.inOut' }, 3.2);
    tl.call(() => animatePercent(3.0), [], 3.2);

    // Status row
    tl.to('#lmv001-status-row', { opacity: 1, duration: 0.5 }, 3.4);

    // Sig
    tl.to('#lmv001-sig', { opacity: 0.22, duration: 0.5 }, 3.5);

    // Scan line
    tl.call(() => { gsap.delayedCall(1, runScan); }, [], 2.0);

    // Data frag spawner
    tl.call(() => {
      spawnDataFrag();
      setInterval(spawnDataFrag, 2400);
    }, [], 1.4);

    // --- Ambient / idle ---

    // Shield slow rotation
    tl.call(() => {
      gsap.to('#lmv001-shield-svg', {
        rotation: 360,
        transformOrigin: 'center',
        duration: 18,
        repeat: -1,
        ease: 'none',
      });
    }, [], 2.5);

    // Star counter-rotate to stay upright
    tl.call(() => {
      gsap.to('#lmv001-star', {
        rotation: -360,
        transformOrigin: '90px 90px',
        duration: 18,
        repeat: -1,
        ease: 'none',
      });
    }, [], 2.5);

    // Energy ring pulse
    tl.call(() => {
      ['#lmv001-ring-a','#lmv001-ring-b','#lmv001-ring-c'].forEach((id, i) => {
        gsap.to(id, {
          opacity: 0.06,
          scale: 1.08,
          duration: 1.8 + i * 0.4,
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.5,
        });
      });
    }, [], 2.8);

    // Reactor breathe
    tl.call(() => {
      gsap.to('#lmv001-reactor', {
        opacity: 0.4,
        duration: 2.2,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.5);

    // Shield center glow throb
    tl.call(() => {
      gsap.to('#lmv001-center-glow', {
        opacity: 0.2,
        duration: 1.5,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.8);

    // Name glow pulse
    tl.call(() => {
      const span = document.querySelector('#lmv001-title span');
      if (!span) return;
      gsap.to(span, {
        textShadow: '0 0 30px var(--accent), 0 0 60px var(--accent)',
        duration: 1.6,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 2.8);

    // Banner shimmer
    tl.call(() => {
      ['#lmv001-top-banner','#lmv001-bottom-banner'].forEach((id, i) => {
        gsap.to(id, {
          opacity: 0.5,
          duration: 1.4 + i * 0.3,
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
          delay: i * 0.6,
        });
      });
    }, [], 1.5);

    // Status dots blink
    tl.call(() => {
      document.querySelectorAll('.lmv001-status-dot').forEach((dot, i) => {
        gsap.to(dot, {
          opacity: 0.2,
          duration: 0.5 + i * 0.15,
          yoyo: true,
          repeat: -1,
          ease: 'power1.inOut',
          delay: i * 0.4,
        });
      });
    }, [], 3.8);

    // Cursor ring idle
    tl.call(() => {
      gsap.to(cursorRing, {
        scale: 1.5,
        opacity: 0.12,
        duration: 1.0,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut',
      });
    }, [], 1.0);

  });

})();
</script>
