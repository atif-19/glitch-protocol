<!--
  Component: loading-harrypotter-001
  Type: loading
  Aesthetic: dark magical
  Obsession: Harry Potter
  Tone: dreamy, cinematic, playful
  Occasion: birthday, apology
  Variables: --RECIPIENT_NAME-- --LOADING_LINE--
-->
<style>
  #loading-harrypotter-001 {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: var(--font-body);
    z-index: 9999;
  }

  #loading-harrypotter-001 .lhp-bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 55%, color-mix(in srgb, var(--primary) 22%, transparent), transparent 70%),
      radial-gradient(ellipse 30% 35% at 25% 75%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 60%),
      radial-gradient(ellipse 25% 30% at 78% 22%, color-mix(in srgb, var(--primary) 9%, transparent), transparent 55%);
    pointer-events: none;
  }

  #loading-harrypotter-001 .lhp-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 30%, color-mix(in srgb, var(--bg) 90%, transparent) 100%);
    pointer-events: none;
    z-index: 2;
  }

  #loading-harrypotter-001 .lhp-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  #loading-harrypotter-001 .lhp-center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(1rem, 2.5vw, 1.8rem);
    text-align: center;
    padding: clamp(1.5rem, 5vw, 3rem);
  }

  #loading-harrypotter-001 .lhp-orb-wrap {
    position: relative;
    width: clamp(88px, 14vw, 130px);
    height: clamp(88px, 14vw, 130px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #loading-harrypotter-001 .lhp-orb-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  }

  #loading-harrypotter-001 .lhp-orb-ring-mid {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    border: 0.5px solid color-mix(in srgb, var(--accent) 18%, transparent);
  }

  #loading-harrypotter-001 .lhp-orb-core {
    width: clamp(44px, 7vw, 66px);
    height: clamp(44px, 7vw, 66px);
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%,
      color-mix(in srgb, var(--accent) 70%, white),
      color-mix(in srgb, var(--primary) 80%, transparent) 60%,
      transparent 100%);
    box-shadow:
      0 0 clamp(12px,2.5vw,22px) color-mix(in srgb, var(--accent) 35%, transparent),
      0 0 clamp(28px,5vw,50px) color-mix(in srgb, var(--primary) 20%, transparent);
    position: relative;
    z-index: 2;
  }

  #loading-harrypotter-001 .lhp-orb-spark {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--accent);
    top: 50%;
    left: 50%;
    transform-origin: 0 0;
  }

  #loading-harrypotter-001 .lhp-spell-text {
    font-family: var(--font-heading);
    font-size: clamp(0.55rem, 1.3vw, 0.72rem);
    letter-spacing: clamp(0.28em, 0.5vw, 0.44em);
    text-transform: uppercase;
    color: color-mix(in srgb, var(--accent) 70%, transparent);
    opacity: 0;
  }

  #loading-harrypotter-001 .lhp-recipient {
    font-family: var(--font-heading);
    font-size: clamp(1.6rem, 5.5vw, 3.8rem);
    font-weight: 400;
    color: var(--text);
    letter-spacing: clamp(0.04em, 0.4vw, 0.1em);
    line-height: 1.1;
    opacity: 0;
  }

  #loading-harrypotter-001 .lhp-loading-line {
    font-family: var(--font-body);
    font-size: clamp(0.68rem, 1.5vw, 0.88rem);
    color: color-mix(in srgb, var(--text) 45%, transparent);
    letter-spacing: 0.06em;
    font-style: italic;
    opacity: 0;
    max-width: min(480px, 88vw);
  }

  #loading-harrypotter-001 .lhp-progress-wrap {
    width: clamp(140px, 32vw, 260px);
    height: 1px;
    background: color-mix(in srgb, var(--primary) 18%, transparent);
    position: relative;
    overflow: hidden;
    opacity: 0;
  }

  #loading-harrypotter-001 .lhp-progress-fill {
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg,
      transparent,
      color-mix(in srgb, var(--accent) 80%, transparent),
      color-mix(in srgb, var(--accent) 50%, transparent));
  }

  #loading-harrypotter-001 .lhp-runes {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
  }

  #loading-harrypotter-001 .lhp-rune {
    position: absolute;
    font-family: var(--font-heading);
    font-size: clamp(0.55rem, 1.1vw, 0.8rem);
    color: color-mix(in srgb, var(--accent) 22%, transparent);
    user-select: none;
    opacity: 0;
  }

  #loading-harrypotter-001 .lhp-dot-row {
    display: flex;
    gap: clamp(6px, 1vw, 10px);
    align-items: center;
    opacity: 0;
  }

  #loading-harrypotter-001 .lhp-dot {
    width: clamp(3px, 0.6vw, 5px);
    height: clamp(3px, 0.6vw, 5px);
    border-radius: 50%;
    background: color-mix(in srgb, var(--accent) 55%, transparent);
  }
</style>
<section id="loading-harrypotter-001">
  <div class="lhp-bg-glow"></div>
  <div class="lhp-vignette"></div>
  <canvas class="lhp-canvas" id="lhp-dust-canvas"></canvas>
  <div class="lhp-runes" id="lhp-runes-layer"></div>
  <div class="lhp-center">
    <div class="lhp-orb-wrap" id="lhp-orb-wrap">
  <div class="lhp-orb-ring" id="lhp-ring-outer"></div>
  <div class="lhp-orb-ring-mid" id="lhp-ring-mid"></div>
  <div class="lhp-orb-core" id="lhp-orb-core"></div>
  <div class="lhp-orb-spark" id="lhp-spark-a"></div>
  <div class="lhp-orb-spark" id="lhp-spark-b"></div>
  <div class="lhp-orb-spark" id="lhp-spark-c"></div>
  <div class="lhp-orb-spark" id="lhp-spark-d"></div>
</div>

<div class="lhp-spell-text" id="lhp-spell">Preparing something magical</div>

<div class="lhp-recipient" id="lhp-recipient">--RECIPIENT_NAME--</div>

<div class="lhp-loading-line" id="lhp-loading-line">--LOADING_LINE--</div>

<div class="lhp-dot-row" id="lhp-dot-row">
  <div class="lhp-dot" id="lhp-d1"></div>
  <div class="lhp-dot" id="lhp-d2"></div>
  <div class="lhp-dot" id="lhp-d3"></div>
</div>

<div class="lhp-progress-wrap" id="lhp-progress-wrap">
  <div class="lhp-progress-fill" id="lhp-progress-fill"></div>
</div></div>
</section>
<script>
(function () {
  const INDEX = 0;

  // ── Dust / star particles ──────────────────────────────────────
  const canvas = document.getElementById('lhp-dust-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const PCOUNT = 130;
  const pts = [];

  function mkPt(boot) {
    return {
      x: Math.random() * (W || 800),
      y: boot ? Math.random() * (H || 800) : (H || 800) + 8,
      r: Math.random() * 1.5 + 0.25,
      vx: (Math.random() - 0.5) * 0.15,
      vy: -(Math.random() * 0.22 + 0.04),
      op: Math.random() * 0.5 + 0.08,
      ts: Math.random() * 0.014 + 0.004,
      tp: Math.random() * Math.PI * 2
    };
  }

  for (let i = 0; i < PCOUNT; i++) pts.push(mkPt(true));

  let running = false;

  function dustTick() {
    ctx.clearRect(0, 0, W, H);
    const t = performance.now() * 0.001;
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -8) { pts[i] = mkPt(false); continue; }
      const fl = 0.45 + 0.55 * Math.sin(t * p.ts * 60 + p.tp);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.2832);
      ctx.fillStyle = 'rgba(178,140,255,' + (p.op * fl).toFixed(3) + ')';
      ctx.fill();
    }
    if (running) requestAnimationFrame(dustTick);
  }

  // ── Floating rune symbols ──────────────────────────────────────
  const RUNES = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛜ','ᛞ','ᛟ'];
  const runesLayer = document.getElementById('lhp-runes-layer');
  const runeEls = [];

  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'lhp-rune';
    el.textContent = RUNES[Math.floor(Math.random() * RUNES.length)];
    el.style.left = (Math.random() * 90 + 2) + '%';
    el.style.top  = (Math.random() * 88 + 2) + '%';
    runesLayer.appendChild(el);
    runeEls.push(el);
  }

  function animateRunes() {
    runeEls.forEach(function(el, i) {
      gsap.to(el, {
        opacity: Math.random() * 0.6 + 0.1,
        y: (Math.random() - 0.5) * 28,
        duration: Math.random() * 3 + 2.5,
        delay: i * 0.18,
        ease: 'sine.inOut',
        repeat: -1,
        yoyo: true
      });
    });
  }

  // ── Orb sparks orbiting ────────────────────────────────────────
  function animateSparks() {
    const sparks = ['#lhp-spark-a','#lhp-spark-b','#lhp-spark-c','#lhp-spark-d'];
    const radii  = [38, 30, 44, 34];
    const speeds = [3.2, 5.1, 4.4, 6.8];
    const starts = [0, 1.57, 3.14, 4.71];

    sparks.forEach(function(sel, i) {
      const el = document.querySelector(sel);
      if (!el) return;
      const r = radii[i];
      const spd = speeds[i];
      const off = starts[i];
      let t0 = null;
      function orbStep(ts) {
        if (!t0) t0 = ts;
        const ang = ((ts - t0) * 0.001 * (Math.PI * 2 / spd)) + off;
        const cx = Math.cos(ang) * r;
        const cy = Math.sin(ang) * r;
        gsap.set(el, { x: cx, y: cy, opacity: 0.55 + 0.45 * Math.sin(ang * 2) });
        if (running) requestAnimationFrame(orbStep);
      }
      requestAnimationFrame(orbStep);
    });
  }

  // ── Pulsing dots ──────────────────────────────────────────────
  function animateDots() {
    ['#lhp-d1','#lhp-d2','#lhp-d3'].forEach(function(sel, i) {
      gsap.to(sel, {
        scale: 1.7,
        opacity: 1,
        duration: 0.55,
        delay: i * 0.22,
        repeat: -1,
        yoyo: true,
        ease: 'power1.inOut'
      });
    });
  }

  // ── Progress sweep ────────────────────────────────────────────
  function runProgress(onDone) {
    gsap.to('#lhp-progress-fill', {
      x: '100%',
      duration: 2.8,
      ease: 'power1.inOut',
      onComplete: onDone
    });
  }

  // ── Main entrance sequence ─────────────────────────────────────
  function enterSection() {
    running = true;
    dustTick();
    animateRunes();
    animateSparks();

    gsap.set(['#lhp-spell','#lhp-recipient','#lhp-loading-line','#lhp-dot-row','#lhp-progress-wrap'], { opacity: 0, y: 14 });
    gsap.set('#lhp-orb-wrap', { opacity: 0, scale: 0.5 });
    gsap.set('#lhp-orb-core', { scale: 0.7 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('#lhp-orb-wrap', { opacity: 1, scale: 1, duration: 1.1, ease: 'back.out(1.6)' }, 0.2)
      .to('#lhp-orb-core', { scale: 1, duration: 1.0, ease: 'elastic.out(1, 0.55)' }, 0.3)
      .to('#lhp-ring-outer', {
          rotation: 360,
          duration: 14,
          repeat: -1,
          ease: 'none',
          transformOrigin: '50% 50%'
        }, 0.5)
      .to('#lhp-ring-mid', {
          rotation: -360,
          duration: 9,
          repeat: -1,
          ease: 'none',
          transformOrigin: '50% 50%'
        }, 0.5)
      .to('#lhp-orb-core', {
          scale: 1.08,
          duration: 2.0,
          repeat: -1,
          yoyo: true,
          ease: 'sine.inOut'
        }, 1.2)
      .to('#lhp-spell', { opacity: 1, y: 0, duration: 0.8 }, 0.9)
      .to('#lhp-recipient', { opacity: 1, y: 0, duration: 0.9 }, 1.3)
      .to('#lhp-loading-line', { opacity: 1, y: 0, duration: 0.8 }, 1.65)
      .to('#lhp-dot-row', { opacity: 1, y: 0, duration: 0.6 }, 1.95)
      .to('#lhp-progress-wrap', { opacity: 1, y: 0, duration: 0.6 }, 2.1)
      .call(animateDots, [], 2.0)
      .call(function() {
        runProgress(function() {
          gsap.to('#lhp-spell', {
            opacity: 0,
            duration: 0.4,
            onComplete: function() {
              document.querySelector('#lhp-spell').textContent = 'The magic is ready ✦';
              gsap.to('#lhp-spell', { opacity: 1, duration: 0.5 });
            }
          });
          setTimeout(function() {
            gsap.to('#loading-harrypotter-001', {
              opacity: 0,
              duration: 1.1,
              ease: 'power2.inOut',
              onComplete: function() {
                running = false;
                document.dispatchEvent(new CustomEvent('glitch:sectionReady'));
              }
            });
          }, 800);
        });
      }, [], 2.3);
  }

  // ── Ambient orb box-shadow pulse via CSS custom property ───────
  function ambientGlow() {
    const core = document.getElementById('lhp-orb-core');
    if (!core) return;
    gsap.to({}, {
      duration: 2.4,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      onUpdate: function() {
        const prog = this.progress();
        const sz1 = 12 + prog * 16;
        const sz2 = 28 + prog * 30;
        core.style.boxShadow =
          '0 0 ' + sz1 + 'px color-mix(in srgb, var(--accent) 45%, transparent),' +
          '0 0 ' + sz2 + 'px color-mix(in srgb, var(--primary) 22%, transparent)';
      }
    });
  }

  // ── glitch:enter listener ──────────────────────────────────────
  document.addEventListener('glitch:enter', function(e) {
    if (e.detail.index !== INDEX) return;
    enterSection();
    ambientGlow();
  });

  // ── Interaction: tap orb to pulse ─────────────────────────────
  document.getElementById('lhp-orb-wrap').addEventListener('click', function(e) {
    e.stopPropagation();
    gsap.to('#lhp-orb-core', {
      scale: 1.35,
      duration: 0.22,
      ease: 'power2.out',
      yoyo: true,
      repeat: 1
    });
    for (let i = 0; i < 12; i++) {
      const p = mkPt(false);
      p.x = window.innerWidth / 2 + (Math.random() - 0.5) * 60;
      p.y = window.innerHeight / 2 + (Math.random() - 0.5) * 60;
      p.vy = -(Math.random() * 1.8 + 0.8);
      p.vx = (Math.random() - 0.5) * 1.2;
      pts.push(p);
      if (pts.length > PCOUNT + 30) pts.shift();
    }
  });

})();
</script>
