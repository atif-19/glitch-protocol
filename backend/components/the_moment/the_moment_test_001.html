<section class="tm-test-001">
  <style>
    .tm-test-001 {
      min-height: 100vh;
      background: var(--primary, #0f0f1a);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(3rem, 8vw, 6rem) clamp(1.5rem, 5vw, 4rem);
      text-align: center;
    }
    .tm-test-001 .tm-label {
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent, #e63946);
      margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
    }
    .tm-test-001 .tm-copy {
      font-family: var(--font-heading, 'Playfair Display'), serif;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      color: var(--text, #ffffff);
      max-width: 700px;
      line-height: 1.6;
      margin-bottom: clamp(2rem, 5vw, 3.5rem);
    }
    .tm-test-001 .tm-cta {
      border: 1px solid var(--accent, #e63946);
      color: var(--accent, #e63946);
      padding: clamp(0.8rem, 2.5vw, 1rem) clamp(2rem, 5vw, 3rem);
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: default;
    }

  <div class="tm-label">The moment</div>
  <div class="tm-copy">--MOMENT_COPY--</div>
  <div class="tm-cta">--MOMENT_CTA--</div>

  <script>
    (function() {
      gsap.fromTo('.tm-test-001 .tm-copy', { opacity: 0, y: 30 }, {
        opacity: 1, y: 0, duration: 1, ease: 'power3.out',
        scrollTrigger: { trigger: '.tm-test-001', start: 'top 70%' }
      })
      gsap.fromTo('.tm-test-001 .tm-cta', { opacity: 0, scale: 0.95 }, {
        opacity: 1, scale: 1, duration: 0.8, delay: 0.4,
        scrollTrigger: { trigger: '.tm-test-001', start: 'top 65%' }
      })
    })()
